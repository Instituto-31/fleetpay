<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>FleetPay — Assinar contrato</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Dancing+Script:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#f8f5ee;--paper:#0f0d09;--gold:#c8922a;--gold-light:#e8b86d;
  --line:rgba(0,0,0,0.08);--sub:#867a68;--sub2:#5a4f3f;
  --sans:'Outfit',sans-serif;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Geist Mono',monospace;
  --green:#2a8a3c;--red:#c73e3e;--blue:#2a6dc8;
}
html,body{font-family:var(--sans);background:var(--ink);color:var(--paper);min-height:100vh}
body{padding-bottom:40px}

/* ─── HEADER ─── */
.header{
  background:#0f0d09;color:#f8f5ee;
  padding:14px 24px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:50;
  border-bottom:1.5px solid var(--gold);
}
.logo{font-family:var(--serif);font-size:22px;font-weight:400;line-height:1}
.logo em{font-style:italic;color:var(--gold)}
.brand-sub{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.empresa-info{text-align:right;font-size:10px;color:rgba(255,255,255,0.55);font-family:var(--mono);line-height:1.5}

/* ─── STEPPER ─── */
.stepper{
  background:#fff;border-bottom:1px solid var(--line);
  padding:18px 24px;
  display:flex;justify-content:center;gap:0;
  position:sticky;top:51px;z-index:40;
}
.step{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  color:var(--sub);font-size:12px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;
  position:relative;
}
.step:not(:last-child)::after{
  content:'';display:block;width:30px;height:1px;background:var(--line);margin-left:14px;
}
.step.active{color:var(--paper);font-weight:600}
.step.done{color:var(--green)}
.step-num{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--line);background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:600;
}
.step.active .step-num{border-color:var(--gold);color:var(--gold);background:rgba(200,146,42,0.08)}
.step.done .step-num{border-color:var(--green);color:#fff;background:var(--green)}

/* ─── CONTEÚDO ─── */
.wrap{max-width:820px;margin:0 auto;padding:24px}

/* Letterhead corporativo */
.letterhead{
  background:#fff;border:1px solid var(--line);border-radius:6px 6px 0 0;
  padding:24px 32px;border-bottom:3px solid var(--gold);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
}
.letterhead-empresa{
  font-family:var(--serif);font-size:18px;font-weight:600;color:var(--paper);letter-spacing:.3px;
}
.letterhead-meta{font-size:10px;color:var(--sub2);font-family:var(--mono);line-height:1.6;text-align:right}
.contract-id{
  font-family:var(--mono);font-size:9px;color:var(--gold);
  letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;background:rgba(200,146,42,0.08);border-radius:100px;display:inline-block;
}

/* Documento */
.documento-wrap{
  background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 6px 6px;
  margin-bottom:20px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
  overflow:hidden;
}
.documento{
  padding:48px 56px;
  font-family:'Calibri','Segoe UI',sans-serif;
  font-size:11pt;line-height:1.6;color:#1a1a1a;
  word-wrap:break-word;
  max-height:70vh;overflow-y:auto;
}
/* Override docx-preview defaults para encaixar no nosso layout */
.documento .docx-wrapper{background:#fff !important;padding:0 !important;box-shadow:none !important}
.documento .docx{box-shadow:none !important;margin:0 !important;padding:0 !important;background:#fff !important;width:100% !important;min-width:auto !important}
.documento section.docx{padding:0 !important;margin:0 !important;width:100% !important}
.documento h1,.documento h2,.documento h3{color:#000}
.documento table{max-width:100% !important}
.documento img{max-width:100% !important;height:auto !important}

/* Continue/Action bars */
.action-bar{
  background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:16px 24px;margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.action-text{font-size:13px;color:var(--sub2)}
.action-text strong{color:var(--paper)}

.btn{
  padding:11px 20px;border-radius:4px;
  font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  font-family:var(--sans);cursor:pointer;border:none;
  transition:all .2s;display:inline-flex;align-items:center;gap:8px;
  text-decoration:none;
}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover:not(:disabled){background:var(--gold-light)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--sub2);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--paper);border-color:var(--gold)}
.btn-large{padding:14px 28px;font-size:12px}

/* ─── STEP 2: Identificar ─── */
.identify-card{
  background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:32px;margin-bottom:20px;
}
.identify-titulo{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:6px}
.identify-sub{font-size:13px;color:var(--sub2);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.field input{
  width:100%;padding:11px 14px;
  border:1px solid var(--line);border-radius:4px;
  font-family:var(--sans);font-size:13px;color:var(--paper);
  background:#fafafa;outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--gold);background:#fff}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin:20px 0;padding:14px;background:rgba(200,146,42,0.05);border:1px solid var(--line);border-radius:4px}
.checkbox-row input[type=checkbox]{margin-top:3px;width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.checkbox-row label{font-size:12px;color:var(--sub2);line-height:1.6;cursor:pointer}
.checkbox-row label strong{color:var(--paper)}

/* ─── STEP 3: Assinar ─── */
.signature-card{
  background:#fff;border:1px solid var(--line);border-radius:6px;
  padding:32px;margin-bottom:20px;
}
.signature-titulo{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:6px}
.signature-sub{font-size:13px;color:var(--sub2);margin-bottom:20px}

.tabs{display:flex;gap:0;border:1px solid var(--line);border-radius:4px;overflow:hidden;margin-bottom:20px}
.tab{
  flex:1;padding:11px 8px;
  font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  font-family:var(--sans);cursor:pointer;background:#fafafa;border:none;color:var(--sub2);
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab.active{background:var(--paper);color:var(--gold)}
.tab:hover:not(.active){background:#f0ece4}

.signature-area{
  background:#fafafa;border:2px dashed var(--line);border-radius:6px;
  padding:24px;min-height:200px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  position:relative;
}

/* Modo desenhar */
.canvas-wrap{
  position:relative;background:#fff;border-radius:4px;
  width:100%;height:180px;overflow:hidden;
  border:1px solid var(--line);
  touch-action:none;
}
#canvas-assinatura{display:block;width:100%;height:100%;cursor:crosshair}
.canvas-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-style:italic;font-size:18px;color:#bbb;
  pointer-events:none;
}
.canvas-placeholder.hidden{display:none}

/* Modo escrever */
.type-input{
  width:100%;padding:24px;text-align:center;
  font-family:'Great Vibes',cursive;font-size:48px;color:#000;
  border:none;background:#fff;border-radius:4px;outline:none;
  border:1px solid var(--line);
}
.type-input:focus{border-color:var(--gold)}
.type-fonts{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.type-font-pick{
  padding:8px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  border:1px solid var(--line);background:#fff;cursor:pointer;border-radius:4px;color:var(--sub2);
  transition:all .15s;
}
.type-font-pick.active{background:var(--paper);color:var(--gold);border-color:var(--paper)}
.type-font-pick.f1{font-family:'Great Vibes',cursive;font-size:18px}
.type-font-pick.f2{font-family:'Dancing Script',cursive;font-size:16px}
.type-font-pick.f3{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px}

/* Modo carregar */
.upload-zone{
  width:100%;padding:32px;text-align:center;
  background:#fff;border:2px dashed var(--line);border-radius:4px;
  cursor:pointer;transition:border-color .2s;
}
.upload-zone:hover{border-color:var(--gold)}
.upload-zone-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.upload-zone-text{font-size:13px;color:var(--sub2);margin-bottom:4px}
.upload-zone-sub{font-size:11px;color:var(--sub);font-family:var(--mono)}
.upload-preview{
  max-width:300px;max-height:120px;
  border:1px solid var(--line);border-radius:4px;background:#fff;padding:12px;
}

/* Action row no signature card */
.signature-actions{
  display:flex;gap:10px;justify-content:space-between;align-items:center;
  margin-top:20px;padding-top:20px;border-top:1px solid var(--line);
  flex-wrap:wrap;
}

/* Legal disclaimer */
.legal{
  font-size:11px;color:var(--sub2);line-height:1.7;
  padding:14px 18px;background:rgba(200,146,42,0.04);border-left:3px solid var(--gold);border-radius:2px;
  margin-bottom:20px;
}
.legal strong{color:var(--paper)}
.legal a{color:var(--gold);text-decoration:none}

/* ─── ESTADOS ─── */
.estado-card{background:#fff;border:1px solid var(--line);border-radius:6px;padding:64px 24px;text-align:center}
.estado-icon{font-size:64px;margin-bottom:16px}
.estado-titulo{font-family:var(--serif);font-size:28px;font-weight:300;margin-bottom:8px;letter-spacing:-.3px}
.estado-sub{font-size:13px;color:var(--sub2);max-width:480px;margin:0 auto;line-height:1.7}
.spinner{width:42px;height:42px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sucesso final */
.sucesso{
  background:#fff;border:1.5px solid rgba(42,138,60,0.2);border-radius:6px;
  padding:48px 32px;text-align:center;margin-top:20px;
}
.sucesso-stamp{
  display:inline-block;padding:12px 24px;
  border:2px solid var(--green);border-radius:6px;
  margin-bottom:20px;background:rgba(42,138,60,0.05);
}
.sucesso-stamp-icon{font-size:36px}
.sucesso-titulo{font-family:var(--serif);font-size:32px;font-weight:300;color:var(--green);margin-bottom:8px}
.sucesso-sub{font-size:14px;color:var(--sub2);max-width:480px;margin:0 auto 24px;line-height:1.6}
.sucesso-detalhes{
  display:inline-block;text-align:left;font-family:var(--mono);font-size:10px;color:var(--sub);
  background:#fafafa;border:1px solid var(--line);border-radius:4px;
  padding:14px 20px;line-height:1.8;margin-bottom:24px;
}
.sucesso-detalhes strong{color:var(--paper)}

/* Mobile */
@media (max-width:680px){
  .header{padding:10px 14px}
  .logo{font-size:18px}
  .empresa-info{font-size:9px}
  .stepper{padding:14px 12px}
  .step{padding:0 6px;font-size:10px}
  .step:not(:last-child)::after{width:14px;margin-left:6px}
  .wrap{padding:14px}
  .documento{padding:24px 20px;font-size:10.5pt;max-height:60vh}
  .letterhead{padding:18px 20px}
  .identify-card,.signature-card{padding:20px}
  .type-input{font-size:36px;padding:18px}
  .canvas-wrap{height:160px}
  .signature-actions{flex-direction:column-reverse;align-items:stretch}
  .signature-actions .btn{justify-content:center}
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="logo" style="display:flex;align-items:center;gap:10px"><svg viewBox="0 0 32 32" width="26" height="26" style="flex-shrink:0"><rect x="2" y="2" width="28" height="28" rx="6" fill="var(--gold)"/><path d="M 11 9 L 11 23 M 11 9 L 21 9 M 11 16 L 19 16" stroke="#0a0905" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><span>Fleet<em>Pay</em></span></div>
    <div class="brand-sub">Assinatura Digital</div>
  </div>
  <div class="empresa-info" id="empresa-info"></div>
</header>

<div class="stepper" id="stepper">
  <div class="step active" data-step="1"><span class="step-num">1</span><span>Ler</span></div>
  <div class="step" data-step="2"><span class="step-num">2</span><span>Confirmar</span></div>
  <div class="step" data-step="3"><span class="step-num">3</span><span>Assinar</span></div>
</div>

<div class="wrap" id="wrap">
  <div class="estado-card">
    <div class="spinner"></div>
    <div class="estado-titulo">A carregar contrato</div>
    <div class="estado-sub">Aguarda enquanto preparamos o teu documento...</div>
  </div>
</div>

<!-- Bibliotecas -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.0/dist/docx-preview.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script src="fleetpay-config.js"></script>
<script>

// Forçar tema claro
document.body.classList.remove('theme-sage','theme-light','light');

const TOKEN = new URLSearchParams(window.location.search).get('t');
let contrato = null;
let template = null;
let docxBlobFinal = null;     // .docx com placeholders substituídos
let signaturePad = null;
let signatureMode = 'desenhar'; // desenhar | escrever | carregar
let typedFont = 'Great Vibes';
let signatureDataUrl = null;
let uploadedSignatureUrl = null;
let pdfBlob = null;
let currentStep = 1;

// ── Init ──
async function init() {
  if (!TOKEN) {
    return mostrarErro('Link inválido', 'Este link não tem o token de assinatura. Contacta o teu operador.');
  }
  try {
    const { data: c, error } = await db.from('contratos_assinados')
      .select('*, motoristas(nome, email), empresas(nome, nipc, morada, codigo_postal, licenca_tvde, telefone, email, logo_path)')
      .eq('link_token', TOKEN)
      .single();
    if (error || !c) return mostrarErro('Link inválido ou expirado', 'Este link de assinatura não foi encontrado ou foi cancelado.');

    contrato = c;
    if (c.empresas) {
      document.getElementById('empresa-info').innerHTML = `
        <strong style="color:#fff">${c.empresas.nome || 'FleetPay'}</strong><br>
        NIPC ${c.empresas.nipc || '—'}<br>
        ${c.empresas.codigo_postal || ''}
      `;
    }

    if (c.estado === 'assinado') return mostrarJaAssinado();

    if (!c.template_id) return mostrarErro('Template em falta', 'Não foi possível carregar o documento.');
    const { data: tpl } = await db.from('contratos_templates').select('*').eq('id', c.template_id).single();
    if (!tpl?.ficheiro_path) return mostrarErro('Template em falta', 'O documento não está disponível.');
    template = tpl;

    await prepararDocxComDados();
    showStep1();
  } catch (e) {
    console.error(e);
    mostrarErro('Erro ao carregar', e.message || 'Tenta novamente.');
  }
}

async function prepararDocxComDados() {
  const { data: file, error } = await db.storage.from('contratos-templates').download(template.ficheiro_path);
  if (error) throw error;
  const zip = await JSZip.loadAsync(await file.arrayBuffer());
  const xmlEntry = zip.file('word/document.xml');
  let xml = await xmlEntry.async('string');
  const valores = contrato.dados_substituidos || {};
  Object.keys(valores).forEach(key => {
    const val = String(valores[key]||'')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const variants = ['«' + key + '»', '&#xAB;' + key + '&#xBB;', '\u00AB' + key + '\u00BB'];
    variants.forEach(v => { xml = xml.split(v).join(val); });
  });
  zip.file('word/document.xml', xml);
  docxBlobFinal = await zip.generateAsync({type:'blob'});
}

// ── STEP CONTROL ──
function setStep(n) {
  currentStep = n;
  document.querySelectorAll('.step').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.toggle('active', s === n);
    el.classList.toggle('done', s < n);
    if (s < n) el.querySelector('.step-num').textContent = '✓';
    else el.querySelector('.step-num').textContent = String(s);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── STEP 1: Ler contrato ──
async function showStep1() {
  setStep(1);
  const emp = contrato.empresas || {};
  const tpl = contrato.template_nome || template.nome;
  const idCurto = contrato.id.substring(0,8).toUpperCase();

  document.getElementById('wrap').innerHTML = `
    <div class="letterhead">
      <div style="display:flex;align-items:center;gap:14px">
        ${emp.logo_path ? `<img src="https://udqddasbfqbeeaxtnsoj.supabase.co/storage/v1/object/public/empresa-logos/${emp.logo_path}" alt="" style="width:60px;height:60px;object-fit:contain;flex-shrink:0">` : ''}
        <div>
          <div class="letterhead-empresa">${emp.nome || 'Empresa'}</div>
          <div style="font-size:11px;color:var(--sub2);margin-top:4px">${emp.morada || ''}${emp.codigo_postal ? ' · ' + emp.codigo_postal : ''}</div>
        </div>
      </div>
      <div class="letterhead-meta">
        <div class="contract-id">Contrato #${idCurto}</div><br>
        <strong style="color:var(--paper);font-size:12px;font-family:var(--sans)">${tpl}</strong><br>
        ${new Date().toLocaleDateString('pt-PT',{day:'2-digit',month:'long',year:'numeric'})}
      </div>
    </div>
    <div class="documento-wrap">
      <div class="documento" id="documento-render"><div style="padding:40px;text-align:center;color:var(--sub2)"><div class="spinner"></div>A renderizar documento...</div></div>
    </div>

    <div class="action-bar">
      <div class="action-text">📜 Lê com atenção o documento acima antes de continuar.</div>
      <button class="btn btn-primary btn-large" onclick="showStep2()">Continuar →</button>
    </div>
  `;

  // Renderizar com docx-preview (alta fidelidade)
  try {
    const renderEl = document.getElementById('documento-render');
    renderEl.innerHTML = '';
    await docx.renderAsync(docxBlobFinal, renderEl, null, {
      className: 'docx',
      inWrapper: true,
      ignoreWidth: false,
      ignoreHeight: false,
      ignoreFonts: false,
      breakPages: false,
      ignoreLastRenderedPageBreak: true,
      experimental: false,
      trimXmlDeclaration: true,
      useBase64URL: true
    });
  } catch (e) {
    console.error('docx-preview:', e);
    document.getElementById('documento-render').innerHTML = '<p style="padding:40px;text-align:center;color:var(--red)">Erro a renderizar o documento.</p>';
  }
}

// ── STEP 2: Confirmar identidade ──
function showStep2() {
  setStep(2);
  const mot = contrato.motoristas || {};
  const emp = contrato.empresas || {};
  document.getElementById('wrap').innerHTML = `
    <div class="identify-card">
      <div class="identify-titulo">Confirmação de identidade</div>
      <div class="identify-sub">Verifica os teus dados antes de assinar.</div>

      <div class="field"><label>Nome completo</label>
        <input id="conf-nome" value="${(mot.nome||'').replace(/"/g,'&quot;')}" placeholder="Nome">
      </div>
      <div class="field"><label>Email</label>
        <input id="conf-email" type="email" value="${mot.email||''}" placeholder="email">
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="conf-aceito">
        <label for="conf-aceito">
          <strong>Li e aceito</strong> os termos do contrato apresentado e <strong>autorizo</strong> a sua assinatura digital. Compreendo que esta assinatura é vinculativa e equivalente a uma assinatura manuscrita, ao abrigo do Decreto-Lei n.º 12/2021 e do Regulamento (UE) n.º 910/2014 (eIDAS).
        </label>
      </div>

      <div class="legal">
        <strong>RGPD:</strong> os teus dados (nome, email, IP, timestamp e imagem da assinatura) serão guardados pela <strong>${emp.nome||'empresa'}</strong> exclusivamente para arquivo do contrato e cumprimento das obrigações legais. Tens direito de acesso, retificação e eliminação ao abrigo do RGPD.
      </div>

      <div style="display:flex;gap:10px;justify-content:space-between;margin-top:20px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="showStep1()">← Voltar ao contrato</button>
        <button class="btn btn-primary btn-large" id="btn-step2-next" onclick="showStep3()" disabled>Continuar para assinar →</button>
      </div>
    </div>
  `;

  document.getElementById('conf-aceito').addEventListener('change', e => {
    document.getElementById('btn-step2-next').disabled = !e.target.checked;
  });
}

// ── STEP 3: Assinar ──
function showStep3() {
  setStep(3);
  const mot = contrato.motoristas || {};
  document.getElementById('wrap').innerHTML = `
    <div class="signature-card">
      <div class="signature-titulo">A tua assinatura</div>
      <div class="signature-sub">Escolhe um dos modos para assinar:</div>

      <div class="tabs">
        <button class="tab active" data-mode="desenhar" onclick="setSignMode('desenhar')">✏️ Desenhar</button>
        <button class="tab" data-mode="escrever" onclick="setSignMode('escrever')">⌨️ Escrever</button>
        <button class="tab" data-mode="carregar" onclick="setSignMode('carregar')">🖼️ Carregar</button>
      </div>

      <div id="sign-content"></div>

      <div class="signature-actions">
        <button class="btn btn-ghost" onclick="showStep2()">← Voltar</button>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" onclick="limparAssinatura()">🗑️ Limpar</button>
          <button class="btn btn-primary btn-large" id="btn-confirmar" onclick="confirmarAssinatura()" disabled>✓ Confirmar assinatura</button>
        </div>
      </div>
    </div>
  `;
  setSignMode('desenhar');
}

function setSignMode(mode) {
  signatureMode = mode;
  signatureDataUrl = null;
  uploadedSignatureUrl = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('btn-confirmar').disabled = true;

  const c = document.getElementById('sign-content');
  if (mode === 'desenhar') {
    c.innerHTML = `
      <div class="signature-area">
        <div class="canvas-wrap">
          <canvas id="canvas-assinatura"></canvas>
          <div class="canvas-placeholder" id="canvas-placeholder">Desenha aqui com o dedo ou rato...</div>
        </div>
      </div>
    `;
    setTimeout(iniciarSignaturePad, 50);
  } else if (mode === 'escrever') {
    const nomeMot = (contrato.motoristas?.nome) || '';
    c.innerHTML = `
      <div class="signature-area">
        <input id="type-input" class="type-input" placeholder="Escreve o teu nome" value="${nomeMot}" oninput="atualizarTypedSignature()" style="font-family:'${typedFont}',cursive">
        <div class="type-fonts">
          <button class="type-font-pick f1 active" data-font="Great Vibes" onclick="escolherFonte('Great Vibes')">Assinatura clássica</button>
          <button class="type-font-pick f2" data-font="Dancing Script" onclick="escolherFonte('Dancing Script')">Manuscrita</button>
          <button class="type-font-pick f3" data-font="Cormorant Garamond" onclick="escolherFonte('Cormorant Garamond')">Itálico elegante</button>
        </div>
      </div>
    `;
    if (nomeMot) atualizarTypedSignature();
  } else if (mode === 'carregar') {
    c.innerHTML = `
      <div class="signature-area">
        <div class="upload-zone" onclick="document.getElementById('upload-input').click()" id="upload-zone">
          <div class="upload-zone-icon">🖼️</div>
          <div class="upload-zone-text">Toca aqui para escolher uma imagem da tua assinatura</div>
          <div class="upload-zone-sub">PNG ou JPG · fundo branco recomendado</div>
        </div>
        <input type="file" id="upload-input" accept="image/png,image/jpeg" style="display:none" onchange="processarUpload(this.files[0])">
      </div>
    `;
  }
}

// Modo desenhar
function iniciarSignaturePad() {
  const canvas = document.getElementById('canvas-assinatura');
  if (!canvas) return;
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  canvas.getContext('2d').scale(ratio, ratio);
  signaturePad = new SignaturePad(canvas, {
    backgroundColor: 'rgb(255,255,255)',
    penColor: 'rgb(0,0,0)',
    minWidth: 1.4, maxWidth: 2.8
  });
  signaturePad.addEventListener('beginStroke', () => {
    document.getElementById('canvas-placeholder')?.classList.add('hidden');
  });
  signaturePad.addEventListener('endStroke', () => {
    if (!signaturePad.isEmpty()) {
      signatureDataUrl = signaturePad.toDataURL('image/png');
      document.getElementById('btn-confirmar').disabled = false;
    }
  });
}

// Modo escrever
function escolherFonte(font) {
  typedFont = font;
  document.querySelectorAll('.type-font-pick').forEach(b => b.classList.toggle('active', b.dataset.font === font));
  const inp = document.getElementById('type-input');
  if (inp) inp.style.fontFamily = `'${font}', cursive, serif`;
  if (inp?.value.trim()) atualizarTypedSignature();
}

function atualizarTypedSignature() {
  const text = document.getElementById('type-input').value.trim();
  if (!text) { signatureDataUrl = null; document.getElementById('btn-confirmar').disabled = true; return; }
  // Renderizar texto em canvas para gerar PNG
  const canvas = document.createElement('canvas');
  canvas.width = 800; canvas.height = 200;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#000';
  ctx.font = `64px '${typedFont}', cursive`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  signatureDataUrl = canvas.toDataURL('image/png');
  document.getElementById('btn-confirmar').disabled = false;
}

// Modo carregar
function processarUpload(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    signatureDataUrl = e.target.result;
    document.getElementById('upload-zone').innerHTML = `
      <img src="${signatureDataUrl}" class="upload-preview" alt="Assinatura">
      <div style="font-size:11px;color:var(--sub2);margin-top:10px">Toca para trocar imagem</div>
    `;
    document.getElementById('btn-confirmar').disabled = false;
  };
  reader.readAsDataURL(file);
}

function limparAssinatura() {
  signatureDataUrl = null;
  document.getElementById('btn-confirmar').disabled = true;
  if (signatureMode === 'desenhar' && signaturePad) {
    signaturePad.clear();
    document.getElementById('canvas-placeholder')?.classList.remove('hidden');
  } else if (signatureMode === 'escrever') {
    document.getElementById('type-input').value = '';
  } else if (signatureMode === 'carregar') {
    setSignMode('carregar');
  }
}

// ── Confirmar ──
async function confirmarAssinatura() {

              <td style="vertical-align:middle">

                <div style="font-size:9pt;color:#666;margin-top:4pt">${emp.morada||''}${emp.codigo_postal?' · '+emp.codigo_postal:''}</div>
              </td>
            </tr></table>

          </td>

        <table style="width:100%;margin-top:20pt"><tr>

            <div style="font-size:9pt;color:#666;margin-top:2pt">Assinado digitalmente em ${dataAssStr}</div>
            <div style="font-size:9pt;color:#666">${mot.email||''}</div>
          </td>
          <td style="vertical-align:bottom;width:50%;padding-left:20pt">
            <div style="font-size:9pt;color:#666;text-transform:uppercase;letter-spacing:.5pt;margin-bottom:6pt">${contrato.template_nome?.toLowerCase().includes('comodato') ? 'Comodante' : 'Operador TVDE'}</div>

            <div style="font-size:9pt;color:#666;margin-top:2pt">NIPC ${emp.nipc||'—'}${emp.licenca_tvde?' · Licença TVDE '+emp.licenca_tvde:''}</div>

        <div style="margin-top:30pt;padding:14pt 18pt;background:#fafaf3;border-left:3px solid #c8922a;font-size:9pt;color:#444;line-height:1.7;font-family:Calibri,sans-serif">
          <div style="font-weight:bold;margin-bottom:6pt;color:#000;text-transform:uppercase;letter-spacing:.5pt">🔒 Selo de validação digital</div>
          <table style="width:100%;font-size:9pt"><tr>

      margin: [0, 0, 0, 0],

      image: { type:'jpeg', quality: 0.94 },

// ── Estados ──
function mostrarErro(titulo, sub) {
  document.getElementById('stepper').style.display = 'none';

}

function mostrarJaAssinado() {

      <div class="estado-icon">✅</div>
      <div class="estado-titulo">Já está assinado</div>

}

function mostrarSucesso(fname, dataAssStr) {
  document.querySelectorAll('.step').forEach(el => {
    el.classList.add('done'); el.classList.remove('active');
    el.querySelector('.step-num').textContent = '✓';
  });
  const mot = contrato.motoristas || {};
  document.getElementById('wrap').innerHTML = `
    <div class="sucesso">
      <div class="sucesso-stamp"><span class="sucesso-stamp-icon">✓</span></div>
      <div class="sucesso-titulo">Contrato assinado</div>

      </div>

async function downloadAssinado() {
  if (!contrato?.ficheiro_path) return;
  const { data, error } = await db.storage.from('contratos-assinados').download(contrato.ficheiro_path);
  if (error) { alert('Erro: '+error.message); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url; a.download = `${contrato.template_nome||'contrato'}_assinado.pdf`; a.click();
  URL.revokeObjectURL(url);
}

function downloadPDFLocal() {
  if (!pdfBlob) return;
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${contrato.template_nome||'contrato'}_${(contrato.motoristas?.nome||'motorista').split(' ')[0]}_assinado.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}
