<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetPay — Os meus recibos</title>
<meta name="theme-color" content="#0a0905">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0905;--paper:#f7f4ef;--gold:#c8922a;--gold-light:#e8b86d;
  --line:rgba(200,146,42,0.15);--sub:#6b6456;--sub2:#a09484;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Geist Mono',monospace;--sans:'Outfit',sans-serif;
  --green:#27c93f;--red:#e05252;--orange:#e8943a;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--ink);color:var(--paper);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,9,5,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.logo{font-family:var(--serif);font-size:20px;font-weight:400}
.logo em{font-style:italic;color:var(--gold)}
.user-info{display:flex;align-items:center;gap:12px}
.user-name{font-size:13px;color:var(--sub2)}
.btn-logout{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  color:var(--sub);background:none;border:1px solid var(--line);
  padding:6px 12px;border-radius:2px;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:32px 24px}

/* RESUMO SEMANA ATUAL */
.semana-atual{
  background:rgba(200,146,42,0.06);
  border:1px solid var(--line);
  border-radius:6px;
  padding:28px;
  margin-bottom:32px;
  position:relative;
  overflow:hidden;
}
.semana-atual::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.semana-tag{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.semana-periodo{font-family:var(--serif);font-size:22px;font-weight:300;margin-bottom:20px;letter-spacing:-.3px}
.semana-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.s-metric{}
.s-metric-label{font-family:var(--mono);font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.s-metric-val{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--gold);letter-spacing:-.5px}
.semana-estado{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:20px;padding:6px 14px;border-radius:100px;
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
}
.estado-pago{background:rgba(39,201,63,0.1);color:var(--green);border:1px solid rgba(39,201,63,0.2)}
.estado-pendente{background:rgba(232,148,58,0.1);color:var(--orange);border:1px solid rgba(232,148,58,0.2)}
.estado-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* SECÇÃO HISTÓRICO */
.section-title{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.section-title-line{width:20px;height:1px;background:var(--gold)}
.section-title-text{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}

/* CARD DE PAGAMENTO */
.pagamento-card{
  border:1px solid var(--line);border-radius:4px;
  margin-bottom:12px;overflow:hidden;
  transition:border-color .2s;cursor:pointer;
}
.pagamento-card:hover{border-color:rgba(200,146,42,0.4)}
.pagamento-card-header{
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.pagamento-periodo{font-size:14px;font-weight:500;color:var(--paper)}
.pagamento-valor{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--gold)}
.pagamento-card-body{
  padding:0 20px 16px;
  display:none;
  border-top:1px solid var(--line);
}
.pagamento-card.open .pagamento-card-body{display:block;padding-top:16px}
.pagamento-card.open{border-color:rgba(200,146,42,0.4)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.detail-item{}
.detail-label{font-family:var(--mono);font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.detail-val{font-size:14px;color:var(--paper)}
.detail-val.gold{color:var(--gold)}
.detail-val.neg{color:var(--red)}

.detalhe-sep{height:1px;background:var(--line);margin:12px 0}

.btn-recibo{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:10px;
  background:rgba(200,146,42,0.08);
  border:1px solid var(--line);border-radius:3px;
  color:var(--gold);font-size:11px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;font-family:var(--sans);cursor:pointer;
  transition:background .2s;
  text-decoration:none;
}
.btn-recibo:hover{background:rgba(200,146,42,0.15)}

/* EMPTY STATE */
.empty{
  text-align:center;padding:60px 24px;
  color:var(--sub);
}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:8px;color:var(--sub2)}
.empty-sub{font-size:13px}

/* LOADING */
.loading-state{text-align:center;padding:60px 24px}
.spinner-lg{width:32px;height:32px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV (mobile) */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,9,5,0.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex;z-index:100;
}
.nav-item{
  flex:1;padding:14px 8px;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;color:var(--sub);
  font-family:var(--sans);font-size:10px;letter-spacing:.5px;
  transition:color .2s;
}
.nav-item.active,.nav-item:hover{color:var(--gold)}
.nav-icon{font-size:20px;line-height:1}

/* Filtro meses */
.filtro-meses{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
  margin-bottom:24px;scrollbar-width:none;
}
.filtro-meses::-webkit-scrollbar{display:none}
.filtro-btn{
  flex-shrink:0;padding:6px 14px;
  background:transparent;border:1px solid var(--line);border-radius:100px;
  color:var(--sub2);font-size:11px;font-family:var(--sans);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.filtro-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

/* Sem acesso */
.sem-acesso{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 24px;
}

/* Animações */
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pagamento-card{animation:rise .4s ease both}

/* TEMA: Modern Minimal (claro) */

  --ink:#f5f2ed;--paper:#1a1710;--gold:#a06e1a;--gold-light:#c8922a;

<body>

<div id="app">
  <!-- Carregando -->
  <div class="loading-state" id="loading-state">
    <div class="spinner-lg"></div>
    <p style="color:var(--sub2);font-size:13px">A carregar os teus dados...</p>
  </div>
</div>

<!-- Supabase SDK + config central -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script src="fleetpay-config.js"></script>
<script>

let currentUser = null;
let motorista = null;
let pagamentos = [];
let contratosMotorista = [];
let filtroMes = null;
let sessaoConducaoAtiva = null;       // { id, tipo, inicio } — registo aberto
let totalSegundosHoje = 0;            // soma de condução já fechada hoje
let conducaoTickInterval = null;
let eventosSemana = [];               // todos os registos dos últimos 7 dias (segunda→domingo)
let avisos = [];                      // comunicacoes ativas do operador
let cupoesDisponiveis = [];           // cupões ativos da empresa visíveis ao motorista
let minhasRedencoes = [];             // redenções já feitas pelo motorista
let minhasIndicacoes = [];            // indicações que o motorista partilhou (referrals)
const LIMITE_LEGAL_SEG = 10 * 3600;
const ALERTA_AMARELO = 8 * 3600;
const ALERTA_LARANJA = 9.5 * 3600;

// ── Símbolos oficiais do tacógrafo digital (Reg. UE 165/2014) ──
// Refeitos com mais fidelidade aos pictogramas legais
const SVG_VOLANTE = `<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="12"/><circle cx="16" cy="16" r="3.5" fill="currentColor"/><line x1="16" y1="4" x2="16" y2="12.5"/><line x1="6.5" y1="22" x2="13" y2="18.5"/><line x1="25.5" y1="22" x2="19" y2="18.5"/></svg>`;
const SVG_PICARETAS = `<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="29" x2="22" y2="7"/><line x1="25" y1="29" x2="10" y2="7"/><polyline points="6,9 10,4 14,9"/><polyline points="18,9 22,4 26,9"/></svg>`;
const SVG_QUADRADO = `<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="miter" stroke-linecap="square"><rect x="4" y="4" width="24" height="24"/><line x1="4" y1="4" x2="28" y2="28"/></svg>`;
const SVG_CAMA = `<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="miter" stroke-linecap="square"><path d="M 14 7 L 5 7 L 5 23 L 27 23 L 27 14 L 14 14 Z"/></svg>`;
const SVG_CARDINAL = `<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="28"/><line x1="20" y1="4" x2="20" y2="28"/><line x1="4" y1="12" x2="28" y2="12"/><line x1="4" y1="20" x2="28" y2="20"/></svg>`;

const TIPOS_CONFIG = {
  conducao:         { label: 'Condução',          curto: 'Condução',     cor: '#27c93f', bg:'rgba(39,201,63,0.12)',  border:'rgba(39,201,63,0.4)',  svg: SVG_VOLANTE,   ordem: 1 },
  outros_trabalhos: { label: 'Outros trabalhos',  curto: 'Trabalho',     cor: '#e8943a', bg:'rgba(232,148,58,0.12)', border:'rgba(232,148,58,0.4)', svg: SVG_PICARETAS, ordem: 2 },
  disponivel:       { label: 'Disponibilidade',   curto: 'Disponível',   cor: '#7C84DD', bg:'rgba(124,132,221,0.12)',border:'rgba(124,132,221,0.4)',svg: SVG_QUADRADO,  ordem: 3 },
  pausa:            { label: 'Pausa / Descanso',  curto: 'Descanso',     cor: '#5A7DC8', bg:'rgba(90,125,200,0.12)', border:'rgba(90,125,200,0.4)', svg: SVG_CAMA,      ordem: 4 },
  outro_empregador: { label: 'Outro empregador',  curto: 'Outro Emp.',   cor: '#A084DC', bg:'rgba(160,132,220,0.12)',border:'rgba(160,132,220,0.4)',svg: SVG_CARDINAL,  ordem: 5 }
};

const fmt = (v) => new Intl.NumberFormat('pt-PT', { style:'currency', currency:'EUR' }).format(v||0);
const fmtData = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT', {day:'2-digit',month:'short'}) : '—';
const fmtMes = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT', {month:'long',year:'numeric'}) : '';

async function init() {
  // Verificar sessão
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = session.user;

  // Buscar perfil
  const { data: perfil } = await db.from('perfis').select('role, nome').eq('id', currentUser.id).single();

  // Se for operador, redirecionar
  if (perfil?.role === 'operador' || perfil?.role === 'superadmin') {
    window.location.href = 'admin.html';
    return;
  }

  // Buscar dados do motorista
  const { data: mot } = await db.from('motoristas')
    .select('*, empresas(nome, plano, logo_path, nipc, morada, codigo_postal, licenca_tvde, telefone, email)')
    .eq('perfil_id', currentUser.id)
    .single();

  if (!mot) {
    // Motorista sem dados associados
    renderSemAcesso(perfil?.nome || currentUser.email);
    return;
  }

  motorista = mot;

  // Plano da empresa controla acesso a temas pro
  window.fleetpayPlano = mot.empresas?.plano || 'free';
  if (!themes.canUse(themes.current())) themes.apply('default');

  // Buscar pagamentos + contratos + condução hoje em paralelo
  const hojeISO = new Date().toISOString().split('T')[0];
  // Início da semana (segunda)
  const hoje = new Date();
  const dia = hoje.getDay() || 7;
  const segunda = new Date(hoje); segunda.setDate(hoje.getDate() - (dia-1)); segunda.setHours(0,0,0,0);
  const domingoFim = new Date(segunda); domingoFim.setDate(segunda.getDate()+6); domingoFim.setHours(23,59,59,999);

  const [pagsRes, contRes, sessaoRes, eventosHojeRes, eventosSemanaRes] = await Promise.all([
    db.from('pagamentos').select('*').eq('motorista_id', motorista.id).order('semana_inicio', { ascending: false }),
    db.from('contratos_assinados').select('*').eq('motorista_id', motorista.id).eq('estado','assinado').order('assinado_em', { ascending: false }),
    db.from('registos_conducao').select('*').eq('motorista_id', motorista.id).is('fim', null).order('inicio', { ascending: false }).limit(1).maybeSingle(),
    db.from('registos_conducao').select('*').eq('motorista_id', motorista.id).gte('inicio', hojeISO+'T00:00:00Z').lte('inicio', hojeISO+'T23:59:59Z').order('inicio'),
    db.from('registos_conducao').select('*').eq('motorista_id', motorista.id).gte('inicio', segunda.toISOString()).lte('inicio', domingoFim.toISOString()).order('inicio')
  ]);
  pagamentos = pagsRes.data || [];
  contratosMotorista = contRes.data || [];
  sessaoConducaoAtiva = sessaoRes.data || null;
  eventosHoje = eventosHojeRes.data || [];
  eventosSemana = eventosSemanaRes.data || [];
  totalSegundosHoje = eventosHoje.filter(e => e.tipo === 'conducao' && e.fim).reduce((s,e) => s + (e.duracao_segundos||0), 0);

  // Avisos + cupões (não-bloqueantes; falham silenciosamente se tabelas ainda não existirem)
  await carregarAvisosECupoes();
  renderApp();

  // ── COMPLIANCE: validar Termos aceites + check diário ──
  await verificarCompliance();
}

async function carregarAvisosECupoes() {
  const hojeISO = new Date().toISOString();
  // Avisos ativos não expirados
  try {
    const { data } = await db.from('comunicacoes')
      .select('*')
      .eq('empresa_id', motorista.empresa_id)
      .eq('ativo', true)
      .or(`expira_em.is.null,expira_em.gte.${hojeISO}`)
      .order('fixado', { ascending: false })
      .order('criado_em', { ascending: false })
      .limit(10);
    avisos = data || [];
  } catch(e) { avisos = []; }

  // Cupões disponíveis: cupões da empresa do motorista + cupões PSI/Formação activos de
  // qualquer empresa (cross-sell Inst31). RLS filtra automaticamente — sem filtro empresa_id explícito.
  try {
    const hoje = hojeISO.split('T')[0];
    const { data } = await db.from('cupoes')
      .select('*')
      .eq('ativo', true)
      .eq('para_motoristas', true)
      .or(`valido_ate.is.null,valido_ate.gte.${hoje}`)
      .order('destaque', { ascending: false })
      .order('criado_em', { ascending: false });
    cupoesDisponiveis = data || [];
  } catch(e) { cupoesDisponiveis = []; }

  // Minhas redenções (para mostrar quais já reservei)
  try {
    const { data } = await db.from('cupoes_redencoes')
      .select('id, cupao_id, estado, token, reservado_em, usado_em')
      .eq('motorista_id', motorista.id)
      .order('reservado_em', { ascending: false });
    minhasRedencoes = data || [];
  } catch(e) { minhasRedencoes = []; }

  // Minhas indicações + créditos atualizados
  try {
    const { data } = await db.from('cupoes_indicacoes')
      .select('*, cupoes(titulo, codigo, categoria)')
      .eq('indicador_motorista_id', motorista.id)
      .order('partilhado_em', { ascending: false });
    minhasIndicacoes = data || [];
    // Recarrega motorista para refrescar créditos
    const { data: m } = await db.from('motoristas').select('creditos').eq('id', motorista.id).single();
    if (m) motorista.creditos = m.creditos || 0;
  } catch(e) { minhasIndicacoes = []; }
}

async function verificarCompliance() {
  // 1) Termos: existe versão ativa que ainda não foi aceite?
  const { data: ativa } = await db.from('termos_versoes')
    .select('*').eq('empresa_id', motorista.empresa_id).eq('ativo', true).maybeSingle();

  if (ativa) {
    const { data: aceite } = await db.from('termos_aceitacoes')
      .select('id').eq('motorista_id', motorista.id).eq('termos_versao_id', ativa.id).maybeSingle();
    if (!aceite) {
      mostrarModalTermos(ativa);
      return; // bloqueia checklist até aceitar
    }
  }

  // 2) Checklist do dia já feito?
  const hoje = new Date().toISOString().split('T')[0];
  const { data: ckHoje } = await db.from('checklists_diarios')
    .select('id').eq('motorista_id', motorista.id).eq('data', hoje).maybeSingle();

  if (!ckHoje) {
    mostrarBannerChecklist();
  }
}

async function aceitarTermos(versaoId) {
  const btn = document.getElementById('btn-aceitar-termos');
  const restaurar = () => { btn.disabled = false; btn.textContent = '✓ Aceitar e continuar'; btn.style.opacity = '1'; };
  btn.disabled = true; btn.textContent = '⏳ A registar...';

  console.log('[termos] motorista.id:', motorista?.id, 'versaoId:', versaoId);

  try {
    // Timeout de 15s para evitar UI presa se a rede/RLS pendurar
    const insert = db.from('termos_aceitacoes').insert({
      motorista_id: motorista.id,
      termos_versao_id: versaoId,
      user_agent: navigator.userAgent
    });
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout (15s)')), 15000));
    const { error } = await Promise.race([insert, timeout]);

    if (error) {
      console.error('[termos] erro insert:', error);
      // Tratamento especial: já tinha aceite (UNIQUE constraint) → seguir em frente
      if (error.code === '23505' || /duplicate|unique/i.test(error.message||'')) {
        console.log('[termos] já tinha aceite — seguir');
      } else {
        alert('Não foi possível registar a aceitação:\n\n' + (error.message || JSON.stringify(error)) + '\n\nTenta de novo. Se continuar, faz print desta janela e envia ao operador.');
        restaurar();
        return;
      }
    }

    document.querySelectorAll('[style*="z-index:400"]').forEach(el => el.remove());
    setTimeout(() => verificarCompliance(), 200);
  } catch (e) {
    console.error('[termos] exceção:', e);
    alert('Erro inesperado: ' + (e.message || e) + '\n\nVerifica a tua ligação e tenta de novo.');
    restaurar();
  }
}

async function confirmarChecklist(allItemIds) {
  const itens = {};
  let okCount = 0;
  document.querySelectorAll('[data-item]').forEach(cb => {
    itens[cb.dataset.item] = cb.checked;
    if (cb.checked) okCount++;
  });
  const todosOk = okCount === allItemIds.length;
  const observacoes = document.getElementById('ck-obs').value.trim();

  if (!todosOk) {
    if (!confirm(`Estás a confirmar que NÃO tens ${allItemIds.length-okCount} item(s). Conduzir nestas condições é por tua conta — em caso de fiscalização, és responsável. Continuar?`)) return;
  }

  const { error } = await db.from('checklists_diarios').insert({
    motorista_id: motorista.id,
    empresa_id: motorista.empresa_id,
    itens,
    todos_ok: todosOk,
    observacoes,
    user_agent: navigator.userAgent
  });
  if (error) { alert('Erro: '+error.message); return; }

  document.querySelectorAll('[style*="z-index:400"]').forEach(el => el.remove());
  document.getElementById('banner-checklist')?.remove();
  alert(todosOk ? '✅ Check diário registado — boa viagem!' : '⚠️ Check registado com itens em falta. Conduz com cuidado.');
}

// ── Tempo de Condução ──
function fmtHMS(seg) {
  if (!seg || seg < 0) seg = 0;
  const h = Math.floor(seg/3600), m = Math.floor((seg%3600)/60), s = seg%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function totalSegundosAtuais() {
  let total = totalSegundosHoje;
  if (sessaoConducaoAtiva && sessaoConducaoAtiva.tipo === 'conducao') {
    total += Math.floor((Date.now() - new Date(sessaoConducaoAtiva.inicio).getTime()) / 1000);
  }
  return total;
}

function corBarra(seg) {
  if (seg >= LIMITE_LEGAL_SEG) return 'var(--red)';
  if (seg >= ALERTA_LARANJA) return 'var(--orange)';
  if (seg >= ALERTA_AMARELO) return '#e8c43a';
  return 'var(--green)';
}

// Gauge semicircular SVG — inspirado no E-TACO
function renderGauge(total) {
  const pct = Math.min(1, total / LIMITE_LEGAL_SEG);
  const cor = corBarra(total);
  const restante = Math.max(0, LIMITE_LEGAL_SEG - total);
  // Arco semicircular: raio 90, centro 100,100. Comprimento total ~= 282.7
  const totalLen = Math.PI * 90;
  const offset = totalLen * (1 - pct);
  return `
    <svg viewBox="0 0 200 120" style="width:100%;max-width:280px;display:block;margin:0 auto">
      <path d="M 10 100 A 90 90 0 0 1 190 100" stroke="var(--line)" stroke-width="14" fill="none" stroke-linecap="round"/>
      <path id="gauge-arc" d="M 10 100 A 90 90 0 0 1 190 100" stroke="${cor}" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="${totalLen}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .5s,stroke .3s"/>

function calcularDiaSemana(data) {
  // Devolve { conducao, pausa, outros_trabalhos, disponivel, outro_empregador } em segundos
  const inicio = new Date(data); inicio.setHours(0,0,0,0);
  const fim = new Date(inicio); fim.setDate(fim.getDate()+1);
  const totais = { conducao:0, pausa:0, outros_trabalhos:0, disponivel:0, outro_empregador:0 };
  eventosSemana.forEach(e => {
    const ini = new Date(e.inicio).getTime();
    if (ini < inicio.getTime() || ini >= fim.getTime()) return;
    let dur;
    if (e.fim) dur = e.duracao_segundos || Math.floor((new Date(e.fim).getTime()-ini)/1000);
    else dur = Math.floor((Date.now()-ini)/1000);  // sessão activa
    if (totais[e.tipo] !== undefined) totais[e.tipo] += dur;
  });
  return totais;
}

async function imagemParaDataURL(url) {
  try {
    const res = await fetch(url, { mode:'cors' });
    if (!res.ok) return null;
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onloadend = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  } catch (e) { return null; }
}

}

// Função genérica: muda para qualquer dos 5 tipos
async function mudarEstado(novoTipo) {
  if (!TIPOS_CONFIG[novoTipo]) return;
  if (sessaoConducaoAtiva && sessaoConducaoAtiva.tipo === novoTipo) return;
  // Fechar registo atual
  if (sessaoConducaoAtiva) {
    await db.from('registos_conducao').update({ fim: new Date().toISOString() }).eq('id', sessaoConducaoAtiva.id);
    if (sessaoConducaoAtiva.tipo === 'conducao') {
      totalSegundosHoje += Math.floor((Date.now()-new Date(sessaoConducaoAtiva.inicio).getTime())/1000);
    }
  }
  // Abrir novo
  const { data, error } = await db.from('registos_conducao').insert({
    motorista_id: motorista.id, empresa_id: motorista.empresa_id, tipo: novoTipo
  }).select().single();
  if (error) { alert('Erro: '+error.message); return; }
  sessaoConducaoAtiva = data;
  await carregarEventosHoje();
  if (novoTipo === 'conducao') iniciarTickInterval();
  else pararTickInterval();
  renderApp();
}

// Aliases legacy (compat)
async function iniciarConducao() { return mudarEstado('conducao'); }
async function trocarParaPausa() { return mudarEstado('pausa'); }
async function trocarParaConducao() { return mudarEstado('conducao'); }

async function terminarSessao() {
  if (!sessaoConducaoAtiva) return;
  if (!confirm('Terminar a sessão atual?')) return;
  // Fechar registo + somar total se for condução
  await db.from('registos_conducao').update({ fim: new Date().toISOString() }).eq('id', sessaoConducaoAtiva.id);
  if (sessaoConducaoAtiva.tipo === 'conducao') {
    totalSegundosHoje += Math.floor((Date.now()-new Date(sessaoConducaoAtiva.inicio).getTime())/1000);
  }
  sessaoConducaoAtiva = null;
  pararTickInterval();
  await carregarEventosHoje();
  renderApp();
}

function iniciarTickInterval() {
  pararTickInterval();
  conducaoTickInterval = setInterval(() => {
    if (!sessaoConducaoAtiva) { pararTickInterval(); return; }
    const elTimer = document.getElementById('cond-timer');
    if (!elTimer) return;
    const segSessao = Math.floor((Date.now()-new Date(sessaoConducaoAtiva.inicio).getTime())/1000);
    elTimer.textContent = fmtHMS(segSessao);

    // Atualizar gauge se estiver em condução
    if (sessaoConducaoAtiva.tipo === 'conducao') {
      const total = totalSegundosHoje + segSessao;
      const cor = corBarra(total);
      const restante = Math.max(0, LIMITE_LEGAL_SEG - total);
      const totalLen = Math.PI * 90;
      const offset = totalLen * (1 - Math.min(1, total/LIMITE_LEGAL_SEG));
      const arc = document.getElementById('gauge-arc');
      const rest = document.getElementById('gauge-rest');
      const tot = document.getElementById('gauge-total');
      if (arc) { arc.setAttribute('stroke-dashoffset', offset); arc.setAttribute('stroke', cor); }
      if (rest) rest.textContent = fmtHMS(restante).slice(0,5);
      if (tot) tot.textContent = fmtHMS(total).slice(0,5);
    }
  }, 1000);
}

function pararTickInterval() {
  if (conducaoTickInterval) { clearInterval(conducaoTickInterval); conducaoTickInterval = null; }
}

async function abrirContratoVisualizar(path, nome) {
  if (!path) { alert('Ficheiro indisponível'); return; }
  // Abrir overlay com PDF inline (melhor para fiscalização — não força download)
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:flex;flex-direction:column';
  overlay.innerHTML = `
    <div style="padding:14px 20px;background:#0a0905;color:#f7f4ef;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,146,42,0.3)">
      <div style="font-family:var(--serif);font-size:18px">${nome.replace(/_/g,' ')}</div>
      <div style="display:flex;gap:8px">
        <button id="cv-share" style="background:rgba(200,146,42,0.15);border:1px solid var(--gold);color:var(--gold);padding:8px 14px;border-radius:3px;cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase">📥 Descarregar</button>
        <button onclick="this.closest('[style*=\\'z-index:300\\']').remove()" style="background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 14px;border-radius:3px;cursor:pointer;font-size:14px">✕</button>
      </div>
    </div>
    <div id="cv-loading" style="flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6)"><div class="spinner-lg"></div></div>
    <iframe id="cv-iframe" style="display:none;flex:1;border:none;background:#fff"></iframe>
  `;
  document.body.appendChild(overlay);

  try {
    const { data, error } = await db.storage.from('contratos-assinados').download(path);
    if (error) throw error;
    const url = URL.createObjectURL(data);
    document.getElementById('cv-loading').style.display = 'none';
    const iframe = document.getElementById('cv-iframe');
    iframe.style.display = 'block';
    iframe.src = url;
    document.getElementById('cv-share').onclick = () => {
      const a = document.createElement('a');
      a.href = url; a.download = nome + '.pdf'; a.click();
    };
  } catch(e) {
    overlay.remove();
    alert('Erro ao abrir: ' + (e.message||'desconhecido'));
  }
}

function toggleCard(el) {
  // Fechar outros
  document.querySelectorAll('.pagamento-card.open').forEach(c => { if(c!==el) c.classList.remove('open'); });
  el.classList.toggle('open');
}

function filtrar(mes, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroMes = mes;

  const lista = mes
    ? pagamentos.filter(p => p.semana_inicio?.startsWith(mes))
    : pagamentos;

  document.getElementById('lista-pagamentos').innerHTML =
    lista.length === 0 ? renderEmpty() : lista.map((p,i) => renderCard(p,i)).join('');
}

async function downloadMeuContrato(path, nome) {
  if (!path) return;
  const { data, error } = await db.storage.from('contratos-assinados').download(path);
  if (error) { alert('Erro a descarregar: ' + error.message); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url;
  a.download = (nome || 'contrato') + '.pdf';
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════
// ── AVISOS (canal interno) + CUPÕES (vantagens) ──
// ═══════════════════════════════════════════════════════════
const PRIORIDADE_AVISO = {
  info:    { cor:'#5A7DC8', icon:'ℹ️' },
  aviso:   { cor:'#e8943a', icon:'⚠️' },
  urgente: { cor:'#e85a5a', icon:'🚨' },
};
const CATEGORIAS_CUP_M = {
  psi:'🧠', formacao:'🎓', slot:'⏰', combustivel:'⛽',
  seguro:'🛡️', oficina:'🔧', saas:'💻', servico:'✨', outro:'🎟️'
};

function renderAvisosCard() {
  if (!avisos.length) return '';
  const lidos = JSON.parse(localStorage.getItem('fp-avisos-lidos')||'[]');
  const novos = avisos.filter(a => !lidos.includes(a.id)).length;
  const fixados = avisos.filter(a => a.fixado);
  const naoFixados = avisos.filter(a => !a.fixado).slice(0,2);
  const visiveis = [...fixados, ...naoFixados];
  return `
    <div style="background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase">📣 Avisos do operador</div>
        ${novos ? `<span style="background:var(--gold);color:#000;border-radius:100px;font-size:9px;padding:2px 8px;font-family:var(--mono);font-weight:700">${novos} NOVO${novos>1?'S':''}</span>` : ''}
      </div>
      ${visiveis.map(a => {
        const p = PRIORIDADE_AVISO[a.prioridade] || PRIORIDADE_AVISO.info;
        return `
        <div style="border-left:3px solid ${p.cor};padding:10px 12px;background:rgba(255,255,255,0.02);border-radius:4px;margin-bottom:8px;cursor:pointer" onclick="abrirAviso('${a.id}')">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span>${p.icon}</span>
            <strong style="font-size:13px;color:var(--paper)">${a.titulo}</strong>
            ${a.fixado?'<span style="font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:1px;margin-left:auto">📌</span>':''}
          </div>
          <div style="font-size:12px;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${a.mensagem}</div>
        </div>`;
      }).join('')}
      ${avisos.length > visiveis.length ? `<button onclick="abrirTodosAvisos()" style="width:100%;background:none;border:none;color:var(--gold);padding:6px;font-family:var(--mono);font-size:10px;letter-spacing:.5px;cursor:pointer">VER OS ${avisos.length} AVISOS →</button>` : ''}
    </div>
  `;
}

function abrirAviso(id) {
  const a = avisos.find(x => x.id === id);
  if (!a) return;
  // Marca como lido localmente
  const lidos = JSON.parse(localStorage.getItem('fp-avisos-lidos')||'[]');

// ── Partilhar cupão (cria indicação trackeada + Web Share API) ──
async function partilharCupao(cupaoId) {
  const c = cupoesDisponiveis.find(x => x.id === cupaoId);
  if (!c) return;

  // Cria indicação no servidor (gera token)
  const { data, error } = await db.from('cupoes_indicacoes').insert({
    cupao_id: cupaoId,
    indicador_motorista_id: motorista.id,
    empresa_id: motorista.empresa_id,
  }).select().single();
  if (error) { alert('Erro ao criar partilha: '+error.message); return; }

  const link = `${location.origin}${location.pathname.replace(/[^/]+$/,'')}oferta.html?t=${data.token}`;
  const valorTxt = c.tipo === 'gratis' ? 'GRÁTIS'
    : c.tipo === 'oferta' ? 'OFERTA'
    : c.tipo === 'percentagem' ? `${c.valor}%`
    : `${c.valor}€`;
  const msg = `Olá! Encontrei esta oferta no FleetPay e lembrei-me de ti:\n\n${c.titulo}\n${valorTxt} de desconto${c.parceiro_nome?' · '+c.parceiro_nome:''}\n\n${link}`;

  // Tenta Web Share API (mobile)
  if (navigator.share) {
    try {
      await navigator.share({
        title: c.titulo,
        text: msg,
        url: link
      });
      return;
    } catch(e) { /* user cancelou — cai para fallback */ }
  }

  // Fallback: modal com botões WhatsApp / Email / Copiar
  mostrarModalPartilha(c, link, msg);
}

  const { data, error } = await db.from('cupoes_redencoes').insert({
    cupao_id: cupaoId,
    motorista_id: motorista.id,
    empresa_id: motorista.empresa_id,
    estado: 'reservado',
  }).select().single();
  if (error) { alert('Erro ao reservar: '+error.message); return; }
  // Recarregar e abrir o código

  mostrarMeuCupao(data.token, cupaoId);

    <div style="background:var(--ink);border:2px solid var(--gold);border-radius:12px;max-width:400px;width:100%;text-align:center;padding:32px 24px;position:relative">
      <button onclick="this.closest('[style*=\\'position:fixed\\']').remove()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer">✕</button>
      <div style="font-size:42px;margin-bottom:8px">${icon}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:6px">CUPÃO RESERVADO</div>
      <h2 style="font-family:var(--serif);font-weight:300;font-size:22px;margin:0 0 4px;color:var(--paper)">${c.titulo}</h2>
      ${c.parceiro_nome?`<div style="font-size:12px;color:var(--sub);margin-bottom:14px">${c.parceiro_nome}</div>`:''}
      <div style="font-family:var(--serif);font-weight:300;font-size:48px;color:var(--gold);line-height:1;margin:14px 0">${valorTxt}</div>
      <div style="background:#fff;border-radius:8px;padding:18px;margin:20px 0">
        <div id="qr-cupao-${token.slice(0,8)}" style="display:flex;justify-content:center"></div>
        <div style="font-family:var(--mono);font-size:11px;color:#000;letter-spacing:1px;margin-top:10px;font-weight:700">${token.slice(0,8).toUpperCase()}</div>
      </div>
      <div style="font-size:11px;color:var(--sub);line-height:1.5;margin-bottom:14px">Mostra este código ao parceiro. Ele valida em <strong style="color:var(--gold)">validar.html</strong> com o link.</div>
      <button onclick="navigator.clipboard.writeText('${link}').then(()=>this.textContent='✓ COPIADO')" style="width:100%;padding:12px;background:rgba(255,255,255,0.04);color:var(--gold);border:1px solid var(--line);border-radius:5px;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">📋 Copiar link parceiro</button>
      ${c.parceiro_link?`<a href="${c.parceiro_link}" target="_blank" style="display:block;margin-top:8px;padding:12px;background:var(--gold);color:#000;border:none;border-radius:5px;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:700;text-decoration:none">↗ ABRIR ${c.parceiro_nome||'PARCEIRO'}</a>`:''}
    </div>
  `;
  document.body.appendChild(overlay);
  // QR code via API pública (sem dependência js extra)
  const qrEl = overlay.querySelector(`#qr-cupao-${token.slice(0,8)}`);
  if (qrEl) qrEl.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(link)}" alt="QR" width="180" height="180" style="display:block">`;
}

init();
</script>
</body>
</html>
