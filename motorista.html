<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetPay — Os meus recibos</title>
<meta name="theme-color" content="#0a0905">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0905;--paper:#f7f4ef;--gold:#c8922a;--gold-light:#e8b86d;
  --line:rgba(200,146,42,0.15);--sub:#6b6456;--sub2:#a09484;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Geist Mono',monospace;--sans:'Outfit',sans-serif;
  --green:#27c93f;--red:#e05252;--orange:#e8943a;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--ink);color:var(--paper);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,9,5,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.logo{font-family:var(--serif);font-size:20px;font-weight:400}
.logo em{font-style:italic;color:var(--gold)}
.user-info{display:flex;align-items:center;gap:12px}
.user-name{font-size:13px;color:var(--sub2)}
.btn-logout{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  color:var(--sub);background:none;border:1px solid var(--line);
  padding:6px 12px;border-radius:2px;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:32px 24px}

/* RESUMO SEMANA ATUAL */
.semana-atual{
  background:rgba(200,146,42,0.06);
  border:1px solid var(--line);
  border-radius:6px;
  padding:28px;
  margin-bottom:32px;
  position:relative;
  overflow:hidden;
}
.semana-atual::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.semana-tag{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.semana-periodo{font-family:var(--serif);font-size:22px;font-weight:300;margin-bottom:20px;letter-spacing:-.3px}
.semana-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.s-metric{}
.s-metric-label{font-family:var(--mono);font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.s-metric-val{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--gold);letter-spacing:-.5px}
.semana-estado{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:20px;padding:6px 14px;border-radius:100px;
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
}
.estado-pago{background:rgba(39,201,63,0.1);color:var(--green);border:1px solid rgba(39,201,63,0.2)}
.estado-pendente{background:rgba(232,148,58,0.1);color:var(--orange);border:1px solid rgba(232,148,58,0.2)}
.estado-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* SECÇÃO HISTÓRICO */
.section-title{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.section-title-line{width:20px;height:1px;background:var(--gold)}
.section-title-text{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}

/* CARD DE PAGAMENTO */
.pagamento-card{
  border:1px solid var(--line);border-radius:4px;
  margin-bottom:12px;overflow:hidden;
  transition:border-color .2s;cursor:pointer;
}
.pagamento-card:hover{border-color:rgba(200,146,42,0.4)}
.pagamento-card-header{
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.pagamento-periodo{font-size:14px;font-weight:500;color:var(--paper)}
.pagamento-valor{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--gold)}
.pagamento-card-body{
  padding:0 20px 16px;
  display:none;
  border-top:1px solid var(--line);
}
.pagamento-card.open .pagamento-card-body{display:block;padding-top:16px}
.pagamento-card.open{border-color:rgba(200,146,42,0.4)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.detail-item{}
.detail-label{font-family:var(--mono);font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.detail-val{font-size:14px;color:var(--paper)}
.detail-val.gold{color:var(--gold)}
.detail-val.neg{color:var(--red)}

.detalhe-sep{height:1px;background:var(--line);margin:12px 0}

.btn-recibo{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:10px;
  background:rgba(200,146,42,0.08);
  border:1px solid var(--line);border-radius:3px;
  color:var(--gold);font-size:11px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;font-family:var(--sans);cursor:pointer;
  transition:background .2s;
  text-decoration:none;
}
.btn-recibo:hover{background:rgba(200,146,42,0.15)}

/* EMPTY STATE */
.empty{
  text-align:center;padding:60px 24px;
  color:var(--sub);
}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:8px;color:var(--sub2)}
.empty-sub{font-size:13px}

/* LOADING */
.loading-state{text-align:center;padding:60px 24px}
.spinner-lg{width:32px;height:32px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV (mobile) */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,9,5,0.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex;z-index:100;
}
.nav-item{
  flex:1;padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;color:var(--sub);
  font-family:var(--sans);font-size:10px;letter-spacing:.5px;
  transition:color .2s;
}
.nav-item.active,.nav-item:hover{color:var(--gold)}
.nav-icon{font-size:20px;line-height:1}

/* Filtro meses */
.filtro-meses{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
  margin-bottom:24px;scrollbar-width:none;
}
.filtro-meses::-webkit-scrollbar{display:none}
.filtro-btn{
  flex-shrink:0;padding:6px 14px;
  background:transparent;border:1px solid var(--line);border-radius:100px;
  color:var(--sub2);font-size:11px;font-family:var(--sans);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.filtro-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

/* Sem acesso */
.sem-acesso{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 24px;
}

/* Animações */
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pagamento-card{animation:rise .4s ease both}

/* TEMA: Modern Minimal (claro) */
body.light {
  --ink:#f5f2ed;--paper:#1a1710;--gold:#a06e1a;--gold-light:#c8922a;
  --line:rgba(160,110,26,0.2);--sub:#8a7d6a;--sub2:#5a4f3f;

body.theme-warm {

<body>

<div id="app">
  <!-- Carregando -->
  <div class="loading-state" id="loading-state">
    <div class="spinner-lg"></div>
    <p style="color:var(--sub2);font-size:13px">A carregar os teus dados...</p>
  </div>
</div>

<!-- Supabase SDK + config central -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fleetpay-config.js"></script>
<script>

let currentUser = null;
let motorista = null;
let pagamentos = [];
let contratosMotorista = [];
let filtroMes = null;
let sessaoConducaoAtiva = null;       // { id, tipo, inicio } — registo aberto
let totalSegundosHoje = 0;            // soma de condução já fechada hoje
let conducaoTickInterval = null;
const LIMITE_LEGAL_SEG = 10 * 3600;
const ALERTA_AMARELO = 8 * 3600;
const ALERTA_LARANJA = 9.5 * 3600;

// ── Símbolos oficiais Reg. UE 165/2014 (tacógrafo digital) ──
const SVG_VOLANTE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/><line x1="12" y1="3" x2="12" y2="9.5"/><line x1="3" y1="12" x2="9.5" y2="12"/><line x1="14.5" y1="12" x2="21" y2="12"/></svg>`;
const SVG_PICARETAS = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="22" x2="14" y2="6"/><line x1="18" y1="22" x2="10" y2="6"/><polyline points="9,7 11,3 14,7"/><polyline points="15,7 13,3 10,7"/></svg>`;
const SVG_QUADRADO = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="miter"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="3" x2="21" y2="21"/></svg>`;
const SVG_CAMA = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter"><polyline points="3,8 3,19 21,19 21,12 12,12 12,8"/></svg>`;
const SVG_CARDINAL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>`;

const TIPOS_CONFIG = {
  conducao:         { label: 'Condução',          curto: 'Condução',     cor: '#27c93f', bg:'rgba(39,201,63,0.12)',  border:'rgba(39,201,63,0.4)',  svg: SVG_VOLANTE,   ordem: 1 },
  outros_trabalhos: { label: 'Outros trabalhos',  curto: 'Trabalho',     cor: '#e8943a', bg:'rgba(232,148,58,0.12)', border:'rgba(232,148,58,0.4)', svg: SVG_PICARETAS, ordem: 2 },
  disponivel:       { label: 'Disponibilidade',   curto: 'Disponível',   cor: '#7C84DD', bg:'rgba(124,132,221,0.12)',border:'rgba(124,132,221,0.4)',svg: SVG_QUADRADO,  ordem: 3 },
  pausa:            { label: 'Pausa / Descanso',  curto: 'Descanso',     cor: '#5A7DC8', bg:'rgba(90,125,200,0.12)', border:'rgba(90,125,200,0.4)', svg: SVG_CAMA,      ordem: 4 },
  outro_empregador: { label: 'Outro empregador',  curto: 'Outro Emp.',   cor: '#A084DC', bg:'rgba(160,132,220,0.12)',border:'rgba(160,132,220,0.4)',svg: SVG_CARDINAL,  ordem: 5 }
};

const fmt = (v) => new Intl.NumberFormat('pt-PT', { style:'currency', currency:'EUR' }).format(v||0);
const fmtData = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT', {day:'2-digit',month:'short'}) : '—';
const fmtMes = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT', {month:'long',year:'numeric'}) : '';

async function init() {
  // Verificar sessão
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = session.user;

  // Buscar perfil
  const { data: perfil } = await db.from('perfis').select('role, nome').eq('id', currentUser.id).single();

  // Se for operador, redirecionar
  if (perfil?.role === 'operador' || perfil?.role === 'superadmin') {
    window.location.href = 'admin.html';
    return;
  }

  // Buscar dados do motorista
  const { data: mot } = await db.from('motoristas')
    .select('*, empresas(nome, plano)')
    .eq('perfil_id', currentUser.id)
    .single();

  if (!mot) {
    // Motorista sem dados associados
    renderSemAcesso(perfil?.nome || currentUser.email);
    return;
  }

  motorista = mot;

  // Plano da empresa controla acesso a temas pro
  window.fleetpayPlano = mot.empresas?.plano || 'free';
  if (!themes.canUse(themes.current())) themes.apply('default');

  // Buscar pagamentos + contratos + condução hoje em paralelo
  const hojeISO = new Date().toISOString().split('T')[0];
  const [pagsRes, contRes, sessaoRes, eventosHojeRes] = await Promise.all([
    db.from('pagamentos').select('*').eq('motorista_id', motorista.id).order('semana_inicio', { ascending: false }),
    db.from('contratos_assinados').select('*').eq('motorista_id', motorista.id).eq('estado','assinado').order('assinado_em', { ascending: false }),
    db.from('registos_conducao').select('*').eq('motorista_id', motorista.id).is('fim', null).order('inicio', { ascending: false }).limit(1).maybeSingle(),
    db.from('registos_conducao').select('*').eq('motorista_id', motorista.id).gte('inicio', hojeISO+'T00:00:00Z').lte('inicio', hojeISO+'T23:59:59Z').order('inicio')
  ]);
  pagamentos = pagsRes.data || [];
  contratosMotorista = contRes.data || [];
  sessaoConducaoAtiva = sessaoRes.data || null;
  eventosHoje = eventosHojeRes.data || [];
  totalSegundosHoje = eventosHoje.filter(e => e.tipo === 'conducao' && e.fim).reduce((s,e) => s + (e.duracao_segundos||0), 0);
  renderApp();

  // ── COMPLIANCE: validar Termos aceites + check diário ──
  await verificarCompliance();
}

async function verificarCompliance() {
  // 1) Termos: existe versão ativa que ainda não foi aceite?
  const { data: ativa } = await db.from('termos_versoes')
    .select('*').eq('empresa_id', motorista.empresa_id).eq('ativo', true).maybeSingle();

  if (ativa) {
    const { data: aceite } = await db.from('termos_aceitacoes')
      .select('id').eq('motorista_id', motorista.id).eq('termos_versao_id', ativa.id).maybeSingle();
    if (!aceite) {
      mostrarModalTermos(ativa);
      return; // bloqueia checklist até aceitar
    }
  }

  // 2) Checklist do dia já feito?
  const hoje = new Date().toISOString().split('T')[0];
  const { data: ckHoje } = await db.from('checklists_diarios')
    .select('id').eq('motorista_id', motorista.id).eq('data', hoje).maybeSingle();

  if (!ckHoje) {
    mostrarBannerChecklist();
  }
}

async function confirmarChecklist(allItemIds) {
  const itens = {};
  let okCount = 0;
  document.querySelectorAll('[data-item]').forEach(cb => {
    itens[cb.dataset.item] = cb.checked;
    if (cb.checked) okCount++;
  });
  const todosOk = okCount === allItemIds.length;
  const observacoes = document.getElementById('ck-obs').value.trim();

  if (!todosOk) {
    if (!confirm(`Estás a confirmar que NÃO tens ${allItemIds.length-okCount} item(s). Conduzir nestas condições é por tua conta — em caso de fiscalização, és responsável. Continuar?`)) return;
  }

  const { error } = await db.from('checklists_diarios').insert({
    motorista_id: motorista.id,
    empresa_id: motorista.empresa_id,
    itens,
    todos_ok: todosOk,
    observacoes,
    user_agent: navigator.userAgent
  });
  if (error) { alert('Erro: '+error.message); return; }

  document.querySelectorAll('[style*="z-index:400"]').forEach(el => el.remove());
  document.getElementById('banner-checklist')?.remove();
  alert(todosOk ? '✅ Check diário registado — boa viagem!' : '⚠️ Check registado com itens em falta. Conduz com cuidado.');
}

// ── Tempo de Condução ──
function fmtHMS(seg) {
  if (!seg || seg < 0) seg = 0;
  const h = Math.floor(seg/3600), m = Math.floor((seg%3600)/60), s = seg%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function totalSegundosAtuais() {
  let total = totalSegundosHoje;
  if (sessaoConducaoAtiva && sessaoConducaoAtiva.tipo === 'conducao') {
    total += Math.floor((Date.now() - new Date(sessaoConducaoAtiva.inicio).getTime()) / 1000);
  }
  return total;
}

function corBarra(seg) {
  if (seg >= LIMITE_LEGAL_SEG) return 'var(--red)';
  if (seg >= ALERTA_LARANJA) return 'var(--orange)';
  if (seg >= ALERTA_AMARELO) return '#e8c43a';
  return 'var(--green)';
}

// Gauge semicircular SVG — inspirado no E-TACO
function renderGauge(total) {
  const pct = Math.min(1, total / LIMITE_LEGAL_SEG);
  const cor = corBarra(total);
  const restante = Math.max(0, LIMITE_LEGAL_SEG - total);
  // Arco semicircular: raio 90, centro 100,100. Comprimento total ~= 282.7
  const totalLen = Math.PI * 90;
  const offset = totalLen * (1 - pct);
  return `
    <svg viewBox="0 0 200 120" style="width:100%;max-width:280px;display:block;margin:0 auto">
      <path d="M 10 100 A 90 90 0 0 1 190 100" stroke="var(--line)" stroke-width="14" fill="none" stroke-linecap="round"/>
      <path id="gauge-arc" d="M 10 100 A 90 90 0 0 1 190 100" stroke="${cor}" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="${totalLen}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .5s,stroke .3s"/>
      <text id="gauge-rest" x="100" y="78" text-anchor="middle" fill="var(--paper)" style="font-family:var(--serif);font-size:32px;font-weight:300;letter-spacing:-1px">${fmtHMS(restante).slice(0,5)}</text>
      <text x="100" y="100" text-anchor="middle" fill="var(--sub)" style="font-family:var(--mono);font-size:8px;letter-spacing:1px">RESTANTE HOJE · LIMITE 10H</text>
    </svg>
  `;
}

function renderConducaoCard() {
  const total = totalSegundosAtuais();
  const ativa = sessaoConducaoAtiva;
  const tipoAtivo = ativa?.tipo;

  // Estado badge
  let estadoTag = `<span style="display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(135,135,135,0.15);color:var(--sub2);border-radius:100px;font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase">⚫ Off</span>`;
  if (ativa && TIPOS_CONFIG[tipoAtivo]) {
    const c = TIPOS_CONFIG[tipoAtivo];
    estadoTag = `<span style="display:inline-flex;align-items:center;gap:8px;padding:5px 14px;background:${c.bg};color:${c.cor};border-radius:100px;font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase"><span style="display:inline-flex;width:14px;height:14px">${c.svg}</span>${c.label}</span>`;
  }

  // Timer da sessão atual
  let timerSessao = '';
  if (ativa) {
    const sec = Math.floor((Date.now()-new Date(ativa.inicio).getTime())/1000);
    const corTimer = TIPOS_CONFIG[tipoAtivo]?.cor || 'var(--green)';
    timerSessao = `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:4px;margin-bottom:14px">

        <div id="cond-timer" style="font-family:var(--mono);font-size:18px;color:${corTimer};font-weight:600">${fmtHMS(sec)}</div>
      </div>`;
  }

  // Botões dos 5 estados (grid 2x3, último em baixo)
  const tiposBotoes = ['conducao','outros_trabalhos','disponivel','pausa','outro_empregador'];
  const botoesEstado = tiposBotoes.map(t => {
    const c = TIPOS_CONFIG[t];
    const isAtivo = tipoAtivo === t;
    const bg = isAtivo ? c.bg : 'rgba(255,255,255,0.03)';
    const border = isAtivo ? c.border : 'var(--line)';
    const cor = isAtivo ? c.cor : 'var(--sub2)';
    return `
      <button onclick="mudarEstado('${t}')" title="${c.label}"
        style="padding:14px 8px;background:${bg};color:${cor};border:1px solid ${border};border-radius:6px;cursor:${isAtivo?'default':'pointer'};font-family:var(--sans);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .2s;min-height:78px;${isAtivo?'box-shadow:0 0 0 2px '+c.cor+' inset;':''}">
        <div style="width:24px;height:24px;display:flex;align-items:center;justify-content:center">${c.svg}</div>
        <span style="font-size:10px;font-weight:600;letter-spacing:.4px;line-height:1.2;text-align:center">${c.curto}</span>
      </button>`;
  }).join('');

// Função genérica: muda para qualquer dos 5 tipos
async function mudarEstado(novoTipo) {
  if (!TIPOS_CONFIG[novoTipo]) return;
  if (sessaoConducaoAtiva && sessaoConducaoAtiva.tipo === novoTipo) return;
  // Fechar registo atual
  if (sessaoConducaoAtiva) {
    await db.from('registos_conducao').update({ fim: new Date().toISOString() }).eq('id', sessaoConducaoAtiva.id);
    if (sessaoConducaoAtiva.tipo === 'conducao') {
      totalSegundosHoje += Math.floor((Date.now()-new Date(sessaoConducaoAtiva.inicio).getTime())/1000);
    }
  }
  // Abrir novo
  const { data, error } = await db.from('registos_conducao').insert({
    motorista_id: motorista.id, empresa_id: motorista.empresa_id, tipo: novoTipo
  }).select().single();
  if (error) { alert('Erro: '+error.message); return; }
  sessaoConducaoAtiva = data;
  await carregarEventosHoje();
  if (novoTipo === 'conducao') iniciarTickInterval();
  else pararTickInterval();
  renderApp();
}

// Aliases legacy (compat)
async function iniciarConducao() { return mudarEstado('conducao'); }
async function trocarParaPausa() { return mudarEstado('pausa'); }
async function trocarParaConducao() { return mudarEstado('conducao'); }

async function terminarSessao() {
  if (!sessaoConducaoAtiva) return;
  if (!confirm('Terminar a sessão atual?')) return;
  // Fechar registo + somar total se for condução
  await db.from('registos_conducao').update({ fim: new Date().toISOString() }).eq('id', sessaoConducaoAtiva.id);
  if (sessaoConducaoAtiva.tipo === 'conducao') {
    totalSegundosHoje += Math.floor((Date.now()-new Date(sessaoConducaoAtiva.inicio).getTime())/1000);
  }
  sessaoConducaoAtiva = null;
  pararTickInterval();
  await carregarEventosHoje();
  renderApp();
}

function iniciarTickInterval() {
  pararTickInterval();
  conducaoTickInterval = setInterval(() => {
    if (!sessaoConducaoAtiva) { pararTickInterval(); return; }
    const elTimer = document.getElementById('cond-timer');
    if (!elTimer) return;
    const segSessao = Math.floor((Date.now()-new Date(sessaoConducaoAtiva.inicio).getTime())/1000);
    elTimer.textContent = fmtHMS(segSessao);

    // Atualizar gauge se estiver em condução
    if (sessaoConducaoAtiva.tipo === 'conducao') {
      const total = totalSegundosHoje + segSessao;
      const cor = corBarra(total);
      const restante = Math.max(0, LIMITE_LEGAL_SEG - total);
      const totalLen = Math.PI * 90;
      const offset = totalLen * (1 - Math.min(1, total/LIMITE_LEGAL_SEG));
      const arc = document.getElementById('gauge-arc');
      const rest = document.getElementById('gauge-rest');
      const tot = document.getElementById('gauge-total');
      if (arc) { arc.setAttribute('stroke-dashoffset', offset); arc.setAttribute('stroke', cor); }
      if (rest) rest.textContent = fmtHMS(restante).slice(0,5);
      if (tot) tot.textContent = fmtHMS(total).slice(0,5);
    }
  }, 1000);
}

function pararTickInterval() {
  if (conducaoTickInterval) { clearInterval(conducaoTickInterval); conducaoTickInterval = null; }
}

async function abrirContratoVisualizar(path, nome) {
  if (!path) { alert('Ficheiro indisponível'); return; }
  // Abrir overlay com PDF inline (melhor para fiscalização — não força download)
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:flex;flex-direction:column';
  overlay.innerHTML = `
    <div style="padding:14px 20px;background:#0a0905;color:#f7f4ef;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,146,42,0.3)">
      <div style="font-family:var(--serif);font-size:18px">${nome.replace(/_/g,' ')}</div>
      <div style="display:flex;gap:8px">
        <button id="cv-share" style="background:rgba(200,146,42,0.15);border:1px solid var(--gold);color:var(--gold);padding:8px 14px;border-radius:3px;cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase">📥 Descarregar</button>
        <button onclick="this.closest('[style*=\\'z-index:300\\']').remove()" style="background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 14px;border-radius:3px;cursor:pointer;font-size:14px">✕</button>
      </div>
    </div>
    <div id="cv-loading" style="flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6)"><div class="spinner-lg"></div></div>
    <iframe id="cv-iframe" style="display:none;flex:1;border:none;background:#fff"></iframe>
  `;
  document.body.appendChild(overlay);

  try {
    const { data, error } = await db.storage.from('contratos-assinados').download(path);
    if (error) throw error;
    const url = URL.createObjectURL(data);
    document.getElementById('cv-loading').style.display = 'none';
    const iframe = document.getElementById('cv-iframe');
    iframe.style.display = 'block';
    iframe.src = url;
    document.getElementById('cv-share').onclick = () => {
      const a = document.createElement('a');
      a.href = url; a.download = nome + '.pdf'; a.click();
    };
  } catch(e) {
    overlay.remove();
    alert('Erro ao abrir: ' + (e.message||'desconhecido'));
  }
}

  `;
}

async function downloadMeuContrato(path, nome) {
  if (!path) return;
  const { data, error } = await db.storage.from('contratos-assinados').download(path);
  if (error) { alert('Erro a descarregar: ' + error.message); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url;
  a.download = (nome || 'contrato') + '.pdf';
  a.click();
  URL.revokeObjectURL(url);
}

// Modal Viatura — mostra veículo atribuído + documentos
async function abrirViatura() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  // Loading
  overlay.innerHTML = `
    <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:460px;width:100%;padding:48px;text-align:center">
      <div class="spinner-lg" style="margin:0 auto 16px"></div>
      <p style="color:var(--sub2);font-size:13px">A carregar viatura...</p>
    </div>
  `;
  document.body.appendChild(overlay);

  // Buscar veículo do motorista
  const { data: veiculo } = await db.from('veiculos')
    .select('*')
    .eq('motorista_id', motorista.id)
    .neq('estado', 'inativo')
    .single();

  // Calcular estado de cada documento
  const hoje = new Date().toISOString().split('T')[0];
  const em30 = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];
  const docStatus = (val) => {
    if (!val) return { label: '—', cor: 'var(--sub)' };
    if (val < hoje) return { label: 'Expirado', cor: 'var(--red)' };
    if (val <= em30) return { label: 'A expirar', cor: 'var(--orange)' };
    return { label: 'OK', cor: 'var(--green)' };
  };

  if (!veiculo) {
    overlay.innerHTML = `
      <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:460px;width:100%;text-align:center">
        <div style="padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
          <div style="font-family:var(--serif);font-size:22px;font-weight:300">A minha viatura</div>
          <button onclick="this.closest('[style*=\\'position:fixed\\']').remove()" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer">✕</button>
        </div>
        <div style="padding:48px 24px">
          <div style="font-size:48px;margin-bottom:16px">🚗</div>
          <div style="font-family:var(--serif);font-size:20px;color:var(--sub2);margin-bottom:8px">Sem viatura atribuída</div>
          <p style="font-size:13px;color:var(--sub2);line-height:1.6">Fala com o teu operador para te atribuir uma viatura.</p>
        </div>
      </div>
    `;
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    return;
  }

  const seguro = docStatus(veiculo.seguro_validade);
  const inspe = docStatus(veiculo.inspecao_validade);
  const ext = docStatus(veiculo.extintor_validade);

  overlay.innerHTML = `
    <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto">
      <div style="padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:var(--serif);font-size:22px;font-weight:300">A minha viatura</div>
        <button onclick="this.closest('[style*=\\'position:fixed\\']').remove()" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="padding:24px">
        <!-- Hero -->
        <div style="text-align:center;padding:20px;background:rgba(200,146,42,0.06);border:1px solid var(--line);border-radius:6px;margin-bottom:24px">
          <div style="font-size:48px;margin-bottom:8px">${veiculo.tipo === 'electrico' ? '⚡' : veiculo.tipo === 'hibrido' ? '🔋' : '🚗'}</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:2px;color:var(--gold);margin-bottom:6px">${veiculo.matricula}</div>
          <div style="font-size:14px;color:var(--paper)">${veiculo.marca || ''} ${veiculo.modelo || ''} ${veiculo.ano ? `· ${veiculo.ano}` : ''}</div>
          ${veiculo.cor ? `<div style="font-size:11px;color:var(--sub2);margin-top:4px">${veiculo.cor}</div>` : ''}
        </div>

        <!-- Documentos -->
        <div style="margin-bottom:20px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Documentos</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:4px">
              <div>
                <div style="font-size:13px;color:var(--paper)">Seguro</div>
                <div style="font-size:11px;color:var(--sub2);margin-top:2px">${veiculo.seguro_validade ? new Date(veiculo.seguro_validade+'T00:00:00').toLocaleDateString('pt-PT') : 'sem data'}</div>
              </div>
              <span style="font-family:var(--mono);font-size:10px;color:${seguro.cor};letter-spacing:1px">${seguro.label}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:4px">
              <div>
                <div style="font-size:13px;color:var(--paper)">Inspeção</div>
                <div style="font-size:11px;color:var(--sub2);margin-top:2px">${veiculo.inspecao_validade ? new Date(veiculo.inspecao_validade+'T00:00:00').toLocaleDateString('pt-PT') : 'sem data'}</div>
              </div>
              <span style="font-family:var(--mono);font-size:10px;color:${inspe.cor};letter-spacing:1px">${inspe.label}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:4px">
              <div>
                <div style="font-size:13px;color:var(--paper)">Extintor</div>
                <div style="font-size:11px;color:var(--sub2);margin-top:2px">${veiculo.extintor_validade ? new Date(veiculo.extintor_validade+'T00:00:00').toLocaleDateString('pt-PT') : 'sem data'}</div>
              </div>
              <span style="font-family:var(--mono);font-size:10px;color:${ext.cor};letter-spacing:1px">${ext.label}</span>
            </div>
          </div>
        </div>

        <!-- Manutenção -->
        ${(veiculo.km_atuais || veiculo.proxima_revisao_data || veiculo.proxima_revisao_km) ? `
        <div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Manutenção</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            ${veiculo.km_atuais ? `
              <div style="padding:12px 14px;border:1px solid var(--line);border-radius:4px">
                <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1px">Km atuais</div>
                <div style="font-size:15px;color:var(--paper);margin-top:4px">${veiculo.km_atuais.toLocaleString('pt-PT')} km</div>
              </div>` : ''}
            ${veiculo.proxima_revisao_km ? `
              <div style="padding:12px 14px;border:1px solid var(--line);border-radius:4px">
                <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1px">Próxima revisão</div>
                <div style="font-size:15px;color:var(--paper);margin-top:4px">${veiculo.proxima_revisao_km.toLocaleString('pt-PT')} km</div>
              </div>` : ''}
            ${veiculo.proxima_revisao_data ? `
              <div style="padding:12px 14px;border:1px solid var(--line);border-radius:4px;grid-column:${veiculo.km_atuais && veiculo.proxima_revisao_km ? '1/-1' : 'auto'}">
                <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1px">Data revisão</div>
                <div style="font-size:15px;color:var(--paper);margin-top:4px">${new Date(veiculo.proxima_revisao_data+'T00:00:00').toLocaleDateString('pt-PT')}</div>
              </div>` : ''}
          </div>
        </div>
        ` : ''}
      </div>
    </div>
  `;
  // Reattach close handler (innerHTML reset overlay onclick)
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
}

// Iniciar
init();
</script>
</body>
</html>
