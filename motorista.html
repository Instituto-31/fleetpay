<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetPay — Os meus recibos</title>
<meta name="theme-color" content="#0a0905">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0905;--paper:#f7f4ef;--gold:#c8922a;--gold-light:#e8b86d;
  --line:rgba(200,146,42,0.15);--sub:#6b6456;--sub2:#a09484;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Geist Mono',monospace;--sans:'Outfit',sans-serif;
  --green:#27c93f;--red:#e05252;--orange:#e8943a;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--ink);color:var(--paper);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,9,5,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.logo{font-family:var(--serif);font-size:20px;font-weight:400}
.logo em{font-style:italic;color:var(--gold)}
.user-info{display:flex;align-items:center;gap:12px}
.user-name{font-size:13px;color:var(--sub2)}
.btn-logout{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  color:var(--sub);background:none;border:1px solid var(--line);
  padding:6px 12px;border-radius:2px;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:32px 24px}

/* RESUMO SEMANA ATUAL */
.semana-atual{
  background:rgba(200,146,42,0.06);
  border:1px solid var(--line);
  border-radius:6px;
  padding:28px;
  margin-bottom:32px;
  position:relative;
  overflow:hidden;
}
.semana-atual::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.semana-tag{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.semana-periodo{font-family:var(--serif);font-size:22px;font-weight:300;margin-bottom:20px;letter-spacing:-.3px}
.semana-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.s-metric{}
.s-metric-label{font-family:var(--mono);font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.s-metric-val{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--gold);letter-spacing:-.5px}
.semana-estado{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:20px;padding:6px 14px;border-radius:100px;
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
}
.estado-pago{background:rgba(39,201,63,0.1);color:var(--green);border:1px solid rgba(39,201,63,0.2)}
.estado-pendente{background:rgba(232,148,58,0.1);color:var(--orange);border:1px solid rgba(232,148,58,0.2)}
.estado-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* SECÇÃO HISTÓRICO */
.section-title{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.section-title-line{width:20px;height:1px;background:var(--gold)}
.section-title-text{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}

/* CARD DE PAGAMENTO */
.pagamento-card{
  border:1px solid var(--line);border-radius:4px;
  margin-bottom:12px;overflow:hidden;
  transition:border-color .2s;cursor:pointer;
}
.pagamento-card:hover{border-color:rgba(200,146,42,0.4)}
.pagamento-card-header{
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.pagamento-periodo{font-size:14px;font-weight:500;color:var(--paper)}
.pagamento-valor{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--gold)}
.pagamento-card-body{
  padding:0 20px 16px;
  display:none;
  border-top:1px solid var(--line);
}
.pagamento-card.open .pagamento-card-body{display:block;padding-top:16px}
.pagamento-card.open{border-color:rgba(200,146,42,0.4)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.detail-item{}
.detail-label{font-family:var(--mono);font-size:8px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.detail-val{font-size:14px;color:var(--paper)}
.detail-val.gold{color:var(--gold)}
.detail-val.neg{color:var(--red)}

.detalhe-sep{height:1px;background:var(--line);margin:12px 0}

.btn-recibo{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:10px;
  background:rgba(200,146,42,0.08);
  border:1px solid var(--line);border-radius:3px;
  color:var(--gold);font-size:11px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;font-family:var(--sans);cursor:pointer;
  transition:background .2s;
  text-decoration:none;
}
.btn-recibo:hover{background:rgba(200,146,42,0.15)}

/* EMPTY STATE */
.empty{
  text-align:center;padding:60px 24px;
  color:var(--sub);
}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:8px;color:var(--sub2)}
.empty-sub{font-size:13px}

/* LOADING */
.loading-state{text-align:center;padding:60px 24px}
.spinner-lg{width:32px;height:32px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV (mobile) */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,9,5,0.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex;z-index:100;
}
.nav-item{
  flex:1;padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;color:var(--sub);
  font-family:var(--sans);font-size:10px;letter-spacing:.5px;
  transition:color .2s;
}
.nav-item.active,.nav-item:hover{color:var(--gold)}
.nav-icon{font-size:20px;line-height:1}

/* Filtro meses */
.filtro-meses{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
  margin-bottom:24px;scrollbar-width:none;
}
.filtro-meses::-webkit-scrollbar{display:none}
.filtro-btn{
  flex-shrink:0;padding:6px 14px;
  background:transparent;border:1px solid var(--line);border-radius:100px;
  color:var(--sub2);font-size:11px;font-family:var(--sans);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.filtro-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

/* Sem acesso */
.sem-acesso{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 24px;
}

/* Animações */
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pagamento-card{animation:rise .4s ease both}

/* TEMA: Modern Minimal (claro) */
body.light {
  --ink:#f5f2ed;--paper:#1a1710;--gold:#a06e1a;--gold-light:#c8922a;
  --line:rgba(160,110,26,0.2);--sub:#8a7d6a;--sub2:#5a4f3f;
}
body.light { background:var(--ink); }
body.light .header { background:rgba(245,242,237,0.97); }
body.light .semana-atual { background:rgba(160,110,26,0.06); }
body.light .pagamento-card { background:rgba(255,255,255,0.6); }
body.light .bottom-nav { background:rgba(245,242,237,0.97); }
body.light .detail-val { color:var(--paper); }
body.light .btn-recibo { background:rgba(160,110,26,0.08); }

/* TEMA: Sage Instituto 31 */
body.theme-sage {
  --ink:#FAF7F2;--paper:#2C3E2D;--gold:#7A8C66;--gold-light:#9CAF88;
  --line:rgba(122,140,102,0.22);--sub:#7A8970;--sub2:#5A6B4F;
}
body.theme-sage { background:var(--ink); }
body.theme-sage .header { background:rgba(250,247,242,0.97); }
body.theme-sage .semana-atual { background:rgba(122,140,102,0.08); }
body.theme-sage .pagamento-card { background:rgba(255,255,255,0.55); }
body.theme-sage .bottom-nav { background:rgba(250,247,242,0.97); }
body.theme-sage .detail-val { color:var(--paper); }
body.theme-sage .btn-recibo { background:rgba(122,140,102,0.10); }

</style>
</head>
<body>

<div id="app">
  <!-- Carregando -->
  <div class="loading-state" id="loading-state">
    <div class="spinner-lg"></div>
    <p style="color:var(--sub2);font-size:13px">A carregar os teus dados...</p>
  </div>
</div>

<!-- Supabase SDK + config central -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fleetpay-config.js"></script>
<script>

let currentUser = null;
let motorista = null;
let pagamentos = [];
let filtroMes = null;

const fmt = (v) => new Intl.NumberFormat('pt-PT', { style:'currency', currency:'EUR' }).format(v||0);
const fmtData = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT', {day:'2-digit',month:'short'}) : '—';
const fmtMes = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT', {month:'long',year:'numeric'}) : '';

async function init() {
  // Verificar sessão
  const { data: { session } } = await db.auth.getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = session.user;

  // Buscar perfil
  const { data: perfil } = await db.from('perfis').select('role, nome').eq('id', currentUser.id).single();

  // Se for operador, redirecionar
  if (perfil?.role === 'operador' || perfil?.role === 'superadmin') {
    window.location.href = 'admin.html';
    return;
  }

  // Buscar dados do motorista
  const { data: mot } = await db.from('motoristas')
    .select('*, empresas(nome)')
    .eq('perfil_id', currentUser.id)
    .single();

  if (!mot) {
    // Motorista sem dados associados
    renderSemAcesso(perfil?.nome || currentUser.email);
    return;
  }

  motorista = mot;

  // Buscar pagamentos
  const { data: pags } = await db.from('pagamentos')
    .select('*')
    .eq('motorista_id', motorista.id)
    .order('semana_inicio', { ascending: false });

  pagamentos = pags || [];
  renderApp();
}

function renderSemAcesso(nome) {
  document.getElementById('app').innerHTML = `
    <div class="sem-acesso">
      <div style="font-size:64px;margin-bottom:24px">🚗</div>
      <div style="font-family:var(--serif);font-size:28px;font-weight:300;margin-bottom:12px">Olá, ${nome}!</div>
      <p style="color:var(--sub2);font-size:14px;line-height:1.7;max-width:300px">
        A tua conta ainda não foi associada a uma empresa.<br>
        Fala com o teu operador para ativares o acesso.
      </p>
      <button onclick="db.auth.signOut().then(()=>window.location.href='login.html')"
        style="margin-top:32px;padding:12px 28px;background:var(--gold);color:var(--ink);border:none;border-radius:3px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:var(--sans)">
        Sair
      </button>
    </div>
  `;
}

function renderApp() {
  const nome = motorista.nome || currentUser.email;
  const ultimosPags = [...pagamentos].slice(0, 12);
  const meses = [...new Set(pagamentos.map(p => p.semana_inicio?.slice(0,7)))].slice(0,6);

  // Última semana
  const ultimo = pagamentos[0];

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="logo">Fleet<em>Pay</em></div>
      <div class="user-info">
        <span class="user-name">${nome.split(' ')[0]}</span>
        <button id="theme-btn" onclick="toggleTheme()" style="background:none;border:1px solid var(--line);border-radius:3px;color:var(--sub2);padding:5px 8px;cursor:pointer;font-size:13px">🌙</button><button class="btn-logout" onclick="db.auth.signOut().then(()=>window.location.href='login.html')">Sair</button>
      </div>
    </div>

    <div class="main">
      ${ultimo ? renderSemanaAtual(ultimo) : ''}

      <div class="section-title">
        <span class="section-title-line"></span>
        <span class="section-title-text">Histórico</span>
      </div>

      ${meses.length > 1 ? `
      <div class="filtro-meses" id="filtro-meses">
        <button class="filtro-btn active" onclick="filtrar(null, this)">Todos</button>
        ${meses.map(m => `<button class="filtro-btn" onclick="filtrar('${m}', this)">${fmtMes(m+'-01')}</button>`).join('')}
      </div>` : ''}

      <div id="lista-pagamentos">
        ${pagamentos.length === 0 ? renderEmpty() : pagamentos.map((p,i) => renderCard(p, i)).join('')}
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item active">
        <span class="nav-icon">💶</span>
        Recibos
      </button>
      <button class="nav-item" onclick="abrirPerfil()">
        <span class="nav-icon">👤</span>
        Perfil
      </button>
      <button class="nav-item" onclick="abrirViatura()">
        <span class="nav-icon">🚗</span>
        Viatura
      </button>
    </div>
  `;
}

function renderSemanaAtual(p) {
  const estadoClass = p.estado === 'pago' ? 'estado-pago' : 'estado-pendente';
  const estadoLabel = p.estado === 'pago' ? '✓ Pago' : '⏳ Pendente';
  return `
    <div class="semana-atual">
      <div class="semana-tag">Última semana processada</div>
      <div class="semana-periodo">${fmtData(p.semana_inicio)} — ${fmtData(p.semana_fim)}</div>
      <div class="semana-metrics">
        <div class="s-metric">
          <div class="s-metric-label">Uber</div>
          <div class="s-metric-val">${fmt(p.uber_liquido)}</div>
        </div>
        <div class="s-metric">
          <div class="s-metric-label">Bolt</div>
          <div class="s-metric-val">${fmt(p.bolt_liquido)}</div>
        </div>
        <div class="s-metric">
          <div class="s-metric-label">A receber</div>
          <div class="s-metric-val">${fmt(p.valor_final)}</div>
        </div>
      </div>
      <span class="semana-estado ${estadoClass}">
        <span class="estado-dot"></span>${estadoLabel}
      </span>
    </div>
  `;
}

function renderCard(p, i) {
  const estadoClass = p.estado === 'pago' ? 'estado-pago' : 'estado-pendente';
  const estadoLabel = p.estado === 'pago' ? '✓ Pago' : '⏳ Pendente';
  return `
    <div class="pagamento-card" style="animation-delay:${i*0.05}s" onclick="toggleCard(this)">
      <div class="pagamento-card-header">
        <div>
          <div class="pagamento-periodo">${fmtData(p.semana_inicio)} – ${fmtData(p.semana_fim)}</div>
          <span class="semana-estado ${estadoClass}" style="margin-top:6px;display:inline-flex">
            <span class="estado-dot"></span>${estadoLabel}
          </span>
        </div>
        <div class="pagamento-valor">${fmt(p.valor_final)}</div>
      </div>
      <div class="pagamento-card-body">
        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-label">Uber Bruto</div>
            <div class="detail-val">${fmt(p.uber_bruto)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Uber Líquido</div>
            <div class="detail-val">${fmt(p.uber_liquido)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Bolt Líquido</div>
            <div class="detail-val">${fmt(p.bolt_liquido)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">IVA a cobrar</div>
            <div class="detail-val gold">${fmt(p.iva_cobrar)}</div>
          </div>
        </div>
        ${(p.slot_valor||p.aluguer_valor||p.prio_valor||p.viaverde_valor) ? `
        <div class="detalhe-sep"></div>
        <div class="detail-grid">
          ${p.slot_valor ? `<div class="detail-item"><div class="detail-label">Slot</div><div class="detail-val neg">-${fmt(p.slot_valor)}</div></div>` : ''}
          ${p.aluguer_valor ? `<div class="detail-item"><div class="detail-label">Aluguer</div><div class="detail-val neg">-${fmt(p.aluguer_valor)}</div></div>` : ''}
          ${p.prio_valor ? `<div class="detail-item"><div class="detail-label">PRIO</div><div class="detail-val neg">-${fmt(p.prio_valor)}</div></div>` : ''}
          ${p.viaverde_valor ? `<div class="detail-item"><div class="detail-label">Via Verde</div><div class="detail-val neg">-${fmt(p.viaverde_valor)}</div></div>` : ''}
        </div>` : ''}
        <div class="detalhe-sep"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-family:var(--mono);font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase">Total a receber</span>
          <span style="font-family:var(--serif);font-size:22px;color:var(--gold)">${fmt(p.valor_final)}</span>
        </div>
        ${p.recibo_pdf_url ? `
        <a class="btn-recibo" href="${p.recibo_pdf_url}" target="_blank">
          📄 Ver recibo PDF
        </a>` : `
        <button class="btn-recibo" disabled style="opacity:.4;cursor:not-allowed">
          📄 Recibo não disponível
        </button>`}
      </div>
    </div>
  `;
}

function renderEmpty() {
  return `
    <div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">Sem pagamentos</div>
      <p class="empty-sub">Os teus recibos aparecerão aqui quando forem processados.</p>
    </div>
  `;
}

function toggleCard(el) {
  // Fechar outros
  document.querySelectorAll('.pagamento-card.open').forEach(c => { if(c!==el) c.classList.remove('open'); });
  el.classList.toggle('open');
}

function filtrar(mes, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtroMes = mes;

  const lista = mes
    ? pagamentos.filter(p => p.semana_inicio?.startsWith(mes))
    : pagamentos;

  document.getElementById('lista-pagamentos').innerHTML =
    lista.length === 0 ? renderEmpty() : lista.map((p,i) => renderCard(p,i)).join('');
}


// toggleTheme() e init de tema vêm de fleetpay-config.js (helper `themes`)

// Modal de Perfil — seletor de tema + info motorista
function abrirPerfil() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  const atual = themes.current();
  overlay.innerHTML = `
    <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto">
      <div style="padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:var(--serif);font-size:22px;font-weight:300">O meu perfil</div>
        <button onclick="this.closest('[style*=\\'position:fixed\\']').remove()" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="padding:24px">
        <div style="margin-bottom:24px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">Conta</div>
          <div style="font-size:14px;color:var(--paper)">${motorista?.nome || '—'}</div>
          <div style="font-size:12px;color:var(--sub2);margin-top:2px">${currentUser?.email || ''}</div>
          ${motorista?.empresas?.nome ? `<div style="font-size:12px;color:var(--sub2);margin-top:2px">🏢 ${motorista.empresas.nome}</div>` : ''}
        </div>

        <div style="margin-bottom:24px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Tema da app</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${themes.list.map(t => `
              <button onclick="themes.apply('${t.id}'); document.querySelectorAll('[data-theme-id]').forEach(b=>b.style.borderColor=b.dataset.themeId==='${t.id}'?'var(--gold)':'var(--line)')"
                data-theme-id="${t.id}"
                style="text-align:left;padding:12px 14px;background:transparent;border:1px solid ${t.id===atual?'var(--gold)':'var(--line)'};border-radius:4px;cursor:pointer;font-family:var(--sans);color:var(--paper);display:flex;align-items:center;gap:12px;transition:border-color .2s">
                <span style="font-size:20px">${t.icon}</span>
                <span style="flex:1">
                  <div style="font-size:13px;font-weight:500">${t.label}</div>
                  <div style="font-size:11px;color:var(--sub2);margin-top:2px">${t.vibe}</div>
                </span>
              </button>
            `).join('')}
          </div>
        </div>

        <button onclick="db.auth.signOut().then(()=>window.location.href='login.html')"
          style="width:100%;padding:12px;background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.3);border-radius:3px;color:var(--red);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:var(--sans)">
          Terminar sessão
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

// Modal Viatura — mostra veículo atribuído + documentos
async function abrirViatura() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  // Loading
  overlay.innerHTML = `
    <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:460px;width:100%;padding:48px;text-align:center">
      <div class="spinner-lg" style="margin:0 auto 16px"></div>
      <p style="color:var(--sub2);font-size:13px">A carregar viatura...</p>
    </div>
  `;
  document.body.appendChild(overlay);

  // Buscar veículo do motorista
  const { data: veiculo } = await db.from('veiculos')
    .select('*')
    .eq('motorista_id', motorista.id)
    .neq('estado', 'inativo')
    .single();

  // Calcular estado de cada documento
  const hoje = new Date().toISOString().split('T')[0];
  const em30 = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];
  const docStatus = (val) => {
    if (!val) return { label: '—', cor: 'var(--sub)' };
    if (val < hoje) return { label: 'Expirado', cor: 'var(--red)' };
    if (val <= em30) return { label: 'A expirar', cor: 'var(--orange)' };
    return { label: 'OK', cor: 'var(--green)' };
  };

  if (!veiculo) {
    overlay.innerHTML = `
      <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:460px;width:100%;text-align:center">
        <div style="padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
          <div style="font-family:var(--serif);font-size:22px;font-weight:300">A minha viatura</div>
          <button onclick="this.closest('[style*=\\'position:fixed\\']').remove()" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer">✕</button>
        </div>
        <div style="padding:48px 24px">
          <div style="font-size:48px;margin-bottom:16px">🚗</div>
          <div style="font-family:var(--serif);font-size:20px;color:var(--sub2);margin-bottom:8px">Sem viatura atribuída</div>
          <p style="font-size:13px;color:var(--sub2);line-height:1.6">Fala com o teu operador para te atribuir uma viatura.</p>
        </div>
      </div>
    `;
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    return;
  }

  const seguro = docStatus(veiculo.seguro_validade);
  const inspe = docStatus(veiculo.inspecao_validade);
  const ext = docStatus(veiculo.extintor_validade);

  overlay.innerHTML = `
    <div style="background:var(--ink);border:1px solid var(--line);border-radius:8px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto">
      <div style="padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:var(--serif);font-size:22px;font-weight:300">A minha viatura</div>
        <button onclick="this.closest('[style*=\\'position:fixed\\']').remove()" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="padding:24px">
        <!-- Hero -->
        <div style="text-align:center;padding:20px;background:rgba(200,146,42,0.06);border:1px solid var(--line);border-radius:6px;margin-bottom:24px">
          <div style="font-size:48px;margin-bottom:8px">${veiculo.tipo === 'electrico' ? '⚡' : veiculo.tipo === 'hibrido' ? '🔋' : '🚗'}</div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:2px;color:var(--gold);margin-bottom:6px">${veiculo.matricula}</div>
          <div style="font-size:14px;color:var(--paper)">${veiculo.marca || ''} ${veiculo.modelo || ''} ${veiculo.ano ? `· ${veiculo.ano}` : ''}</div>
          ${veiculo.cor ? `<div style="font-size:11px;color:var(--sub2);margin-top:4px">${veiculo.cor}</div>` : ''}
        </div>

        <!-- Documentos -->
        <div style="margin-bottom:20px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Documentos</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:4px">
              <div>
                <div style="font-size:13px;color:var(--paper)">Seguro</div>
                <div style="font-size:11px;color:var(--sub2);margin-top:2px">${veiculo.seguro_validade ? new Date(veiculo.seguro_validade+'T00:00:00').toLocaleDateString('pt-PT') : 'sem data'}</div>
              </div>
              <span style="font-family:var(--mono);font-size:10px;color:${seguro.cor};letter-spacing:1px">${seguro.label}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:4px">
              <div>
                <div style="font-size:13px;color:var(--paper)">Inspeção</div>
                <div style="font-size:11px;color:var(--sub2);margin-top:2px">${veiculo.inspecao_validade ? new Date(veiculo.inspecao_validade+'T00:00:00').toLocaleDateString('pt-PT') : 'sem data'}</div>
              </div>
              <span style="font-family:var(--mono);font-size:10px;color:${inspe.cor};letter-spacing:1px">${inspe.label}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:4px">
              <div>
                <div style="font-size:13px;color:var(--paper)">Extintor</div>
                <div style="font-size:11px;color:var(--sub2);margin-top:2px">${veiculo.extintor_validade ? new Date(veiculo.extintor_validade+'T00:00:00').toLocaleDateString('pt-PT') : 'sem data'}</div>
              </div>
              <span style="font-family:var(--mono);font-size:10px;color:${ext.cor};letter-spacing:1px">${ext.label}</span>
            </div>
          </div>
        </div>

        <!-- Manutenção -->
        ${(veiculo.km_atuais || veiculo.proxima_revisao_data || veiculo.proxima_revisao_km) ? `
        <div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Manutenção</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            ${veiculo.km_atuais ? `
              <div style="padding:12px 14px;border:1px solid var(--line);border-radius:4px">
                <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1px">Km atuais</div>
                <div style="font-size:15px;color:var(--paper);margin-top:4px">${veiculo.km_atuais.toLocaleString('pt-PT')} km</div>
              </div>` : ''}
            ${veiculo.proxima_revisao_km ? `
              <div style="padding:12px 14px;border:1px solid var(--line);border-radius:4px">
                <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1px">Próxima revisão</div>
                <div style="font-size:15px;color:var(--paper);margin-top:4px">${veiculo.proxima_revisao_km.toLocaleString('pt-PT')} km</div>
              </div>` : ''}
            ${veiculo.proxima_revisao_data ? `
              <div style="padding:12px 14px;border:1px solid var(--line);border-radius:4px;grid-column:${veiculo.km_atuais && veiculo.proxima_revisao_km ? '1/-1' : 'auto'}">
                <div style="font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1px">Data revisão</div>
                <div style="font-size:15px;color:var(--paper);margin-top:4px">${new Date(veiculo.proxima_revisao_data+'T00:00:00').toLocaleDateString('pt-PT')}</div>
              </div>` : ''}
          </div>
        </div>
        ` : ''}
      </div>
    </div>
  `;
  // Reattach close handler (innerHTML reset overlay onclick)
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
}

// Iniciar
init();
</script>
</body>
</html>
