  <li>Os registos da plataforma servem para verificação interna, controlo legal, auditoria e fiscalização (IMT, AT, ASAE, GNR, PSP);</li>
  <li>A <strong>omissão ou falsificação de registos</strong> constitui violação grave do contrato e motivo justificado para a sua cessação imediata pela <strong>{{EMPRESA}}</strong>;</li>
  <li>Em caso de fiscalização, <strong>os registos da plataforma FleetPay são considerados prova válida da minha atividade</strong>, conforme aceite por mim no momento da assinatura destes termos.</li>
</ul>

<h3>5. Cumprimento do Código da Estrada e legislação rodoviária</h3>
<p>É da minha <strong>inteira e exclusiva responsabilidade</strong> o cumprimento integral do <strong>Código da Estrada</strong> (Decreto-Lei n.º 114/94 e suas alterações) e de toda a legislação rodoviária complementar aplicável à atividade TVDE, incluindo, sem prejuízo de outras:</p>
<ul>
  <li>Respeito pelos <strong>limites de velocidade</strong>, sinalização rodoviária e regras de prioridade;</li>
  <li>Manutenção da <strong>validade da carta de condução</strong> com averbamento ao grupo 2 em vigor;</li>
  <li><strong>Não condução sob efeito de álcool</strong>, estupefacientes ou substâncias psicotrópicas;</li>
  <li>Utilização correta de cinto de segurança e sistemas de retenção;</li>
  <li>Cumprimento de qualquer outra norma legal aplicável à condução em via pública.</li>
</ul>

<h3>5.1. Estado técnico do veículo</h3>
<p>A responsabilidade pelo estado técnico do veículo (luzes, pneus, travões, fluidos, etc.) varia consoante a sua propriedade:</p>
<ul>
  <li><strong>Viatura do próprio motorista (regime de slot)</strong> — a manutenção e o estado técnico são da <strong>integral e exclusiva responsabilidade do motorista</strong>;</li>
  <li><strong>Viatura da {{EMPRESA}} (regime de comissão / comodato)</strong> — a manutenção é da empresa, mas o motorista compromete-se a <strong>comunicar imediatamente</strong> qualquer anomalia detectada antes ou durante a circulação. Caso o motorista <strong>não comunique</strong> uma anomalia e dela resulte autuação, acidente ou dano, a responsabilidade transfere-se integralmente para o motorista, ficando a {{EMPRESA}} isenta.</li>
</ul>

<p>Quaisquer <strong>multas, contraordenações, processos contraordenacionais ou criminais, suspensões da carta, indemnizações ou danos</strong> resultantes do incumprimento das normas acima são da minha exclusiva responsabilidade, ficando a empresa <strong>{{EMPRESA}}</strong> totalmente isenta de qualquer encargo financeiro, responsabilidade civil, contraordenacional ou criminal daí decorrente.</p>

<h3>6. Conduta profissional</h3>
<p>Comprometo-me a manter conduta profissional perante passageiros, autoridades e representantes da empresa, designadamente:</p>
<ul>
  <li><strong>Tratamento cordial e respeitoso</strong> de todos os passageiros, sem qualquer forma de discriminação (origem, raça, género, orientação, religião);</li>
  <li>Comunicação em <strong>língua portuguesa</strong> ou inglesa básica; abstenção de proselitismo político, religioso ou comercial;</li>
  <li><strong>Higiene pessoal</strong> e do veículo — interior limpo, sem odores, antes de cada serviço;</li>
  <li><strong>Vestuário adequado</strong> à atividade profissional;</li>
  <li><strong>Confidencialidade absoluta</strong> sobre dados de passageiros, conversas, destinos ou qualquer informação obtida durante o serviço;</li>
  <li><strong>Confidencialidade</strong> sobre dados internos da empresa, contratos com motoristas, valores financeiros e clientes.</li>
</ul>

<h3>7. Plataformas autorizadas e pagamentos</h3>
<p>Comprometo-me a operar exclusivamente através das plataformas autorizadas pela <strong>{{EMPRESA}}</strong>, atualmente <strong>Uber</strong> e <strong>Bolt</strong>, e a observar:</p>
<ul>
  <li><strong>Sub-contratação proibida</strong> — é estritamente proibido emprestar a minha conta, login, certificado CMTVDE ou cartão de motorista a terceiros, ainda que motoristas certificados;</li>
  <li><strong>Identificação correcta</strong> — usar sempre o meu próprio nome, foto e identificação nas plataformas, sem partilha;</li>
  <li><strong>Pagamentos exclusivamente via app</strong> — é proibido aceitar dinheiro, transferências, MB Way ou outros meios de pagamento fora da plataforma;</li>
  <li><strong>Não aceitar passageiros fora da plataforma autorizada</strong> (apanhar na rua, particulares, etc.) — constitui motivo de cessação imediata;</li>
  <li><strong>Não inflacionar viagens</strong> nem manipular as plataformas (cancelamentos abusivos, viagens fictícias, etc.).</li>
</ul>

<h3>8. Acidentes e incidentes</h3>
<p>Em caso de acidente, sinistro, dano material ou incidente grave (incluindo passageiro agressivo, agressão, furto), comprometo-me a:</p>
<ul>
  <li><strong>Telefonar imediatamente</strong> ao operador no prazo máximo de <strong>30 minutos</strong>;</li>
  <li>Apresentar <strong>relatório escrito</strong> em até <strong>24 horas</strong>, com data, hora, local, circunstâncias, fotografias e dados das partes envolvidas;</li>
  <li>Comparecer na <strong>seguradora</strong> e em qualquer entidade convocada (autoridades, tribunal) em representação do veículo, quando aplicável;</li>
  <li><strong>Não fazer declarações à imprensa</strong>, terceiros ou redes sociais sobre o sinistro.</li>
</ul>

<h3>9. Vínculo contratual — prestação de serviços</h3>
<p>O presente contrato configura uma <strong>prestação de serviços de natureza independente</strong>, ao abrigo do Código Civil e da Lei TVDE n.º 45/2018, <strong>não existindo vínculo de subordinação laboral</strong>. Em consequência:</p>
<ul>
  <li>O motorista é <strong>trabalhador independente</strong>, responsável pelo cumprimento das suas obrigações fiscais (IRS), de Segurança Social e IVA, quando aplicável;</li>
  <li>O motorista <strong>emite recibo</strong> (recibo verde ou fatura) à <strong>{{EMPRESA}}</strong> pelos serviços prestados, periodicamente;</li>
  <li>O motorista <strong>não tem direito</strong> a férias remuneradas, subsídios, complementos ou indemnizações próprias do regime laboral;</li>
  <li>O motorista <strong>organiza autonomamente</strong> o seu horário de trabalho, dentro dos limites legais TVDE.</li>
</ul>

<h3>10. Responsabilidade financeira por multas e despesas</h3>
<ul>
  <li>Qualquer <strong>multa de trânsito ou contraordenação</strong> é da exclusiva responsabilidade do motorista;</li>
  <li>A <strong>{{EMPRESA}}</strong> pode <strong>descontar</strong> dos pagamentos semanais o valor de multas recebidas em nome da viatura/empresa até apresentação do comprovativo de pagamento pelo motorista;</li>
  <li><strong>Combustível, portagens (Via Verde), estacionamento e custos diversos</strong> são suportados pelo motorista, salvo regime escrito em contrário;</li>
  <li>Em caso de <strong>danos voluntários ou negligentes</strong> ao veículo da empresa, o motorista responde pelo valor da reparação.</li>
</ul>

<h3>11. Cessação contratual</h3>
<p><strong>11.1 Motivos de cessação imediata pela {{EMPRESA}} (justa causa):</strong></p>
<ul>
  <li>Falsificação ou omissão grave de registos (tempos, check-list, faturação);</li>
  <li>Condução sob efeito de álcool, estupefacientes ou substâncias psicotrópicas;</li>
  <li>Conduta agressiva, ofensiva, discriminatória ou criminosa para com passageiros, autoridades ou colaboradores da empresa;</li>
  <li>Sub-contratação, empréstimo da conta ou utilização do CMTVDE por terceiros;</li>
  <li>Aceitação de passageiros fora da plataforma autorizada;</li>
  <li>Reincidência em multas graves (excesso de velocidade superior a 50%, condução perigosa, etc.);</li>
  <li>Incumprimento reiterado das obrigações de comunicação ou check-list diário.</li>
</ul>

<p><strong>11.2 Cessação por iniciativa do motorista:</strong> pré-aviso mínimo de <strong>15 dias</strong> por escrito (email aceite).</p>

<p><strong>11.3 Devolução de bens da empresa</strong> (aplicável em regime de comissão/comodato):</p>
<ul>
  <li>Devolução do <strong>veículo em estado equivalente ao recebido</strong>, com vistoria conjunta agendada;</li>
  <li>Devolução, em <strong>48 horas</strong>, dos dísticos TVDE, autocolantes, equipamento (extintor, kit primeiros socorros se da empresa) e quaisquer documentos identificativos da {{EMPRESA}};</li>
  <li>Acerto de contas final em até <strong>30 dias</strong> após devolução.</li>
</ul>

<h3>12. Exclusão de responsabilidade do operador</h3>
<p>Em caso de fiscalização, autuação, contraordenação, processo crime ou qualquer ocorrência decorrente de:</p>
<ul>
  <li><strong>Falta de comunicação atempada</strong> de validades, desgastes ou anomalias;</li>
  <li><strong>Não realização do check-list diário</strong>;</li>
  <li><strong>Omissão, falsificação ou não-realização do registo de tempos de condução</strong> na plataforma;</li>
  <li><strong>Excesso voluntário das 10 horas legais</strong> de condução diária;</li>
  <li><strong>Violação do Código da Estrada ou legislação rodoviária complementar</strong>;</li>
  <li><strong>Conduta inadequada</strong> perante passageiros (cláusula 6);</li>
  <li><strong>Operação fora das plataformas autorizadas</strong> ou pagamentos fora da app;</li>
  <li><strong>Falta de comunicação imediata</strong> em caso de acidente ou sinistro;</li>
</ul>
<p>declaro que a responsabilidade é <strong>exclusivamente minha</strong>, ficando a empresa <strong>{{EMPRESA}}</strong> isenta de qualquer responsabilidade civil, contraordenacional ou criminal daí decorrente.</p>

<h3>13. Disposições finais</h3>
<ul>
  <li><strong>Foro competente:</strong> Tribunal Judicial da Comarca de Braga (Juízo de Guimarães), com expressa renúncia a qualquer outro;</li>
  <li><strong>Comunicações:</strong> os emails enviados aos endereços registados pelas partes têm <strong>plena validade legal</strong> para efeitos de notificação;</li>
  <li><strong>Alterações:</strong> qualquer alteração futura aos presentes termos requer publicação de nova versão na plataforma e <strong>nova aceitação expressa</strong> do motorista;</li>
  <li><strong>Independência das cláusulas:</strong> a invalidade ou ineficácia de qualquer cláusula não afecta a validade das restantes;</li>
  <li><strong>Lei aplicável:</strong> lei portuguesa.</li>
</ul>

<h3>14. RGPD — Tratamento de dados pessoais</h3>
<p>Os meus dados pessoais (nome, NIF, morada, email, IBAN, IP, timestamp de aceitação, registos de atividade) serão tratados pela <strong>{{EMPRESA}}</strong> exclusivamente para:</p>
<ul>
  <li>Cumprimento das obrigações contratuais;</li>
  <li>Cumprimento das obrigações legais (TVDE, IRS, Segurança Social, RGPD);</li>
  <li>Auditoria e defesa em caso de fiscalização ou litígio.</li>
</ul>
<p>Tenho direito de acesso, retificação, eliminação e portabilidade dos meus dados, ao abrigo do <strong>Regulamento (UE) 2016/679 (RGPD)</strong> e da Lei n.º 58/2019. Contacto: {{EMPRESA}}.</p>

function setComplianceTab(tab) { complianceTab = tab; renderCompliance(); }

async function carregarTermos() {
  const { data } = await db.from('termos_versoes')
    .select('*').eq('empresa_id', empresa.id).order('versao', { ascending: false });
  termosVersoes = data || [];
}

async function carregarChecklistConfig() {
  const { data } = await db.from('checklist_items_config')
    .select('*').eq('empresa_id', empresa.id).order('ordem');
  checklistItems = data || [];
}

function renderComplianceTab() {
  const body = document.getElementById('compliance-body');

  if (complianceTab === 'termos') body.innerHTML = renderTermosTab();
  else if (complianceTab === 'checklist') body.innerHTML = renderChecklistTab();
  else body.innerHTML = '<div class="loading-row">A carregar auditoria...</div>', renderAuditoriaTab();
}

function verVersaoTermos(id) {
  const v = termosVersoes.find(x => x.id === id);
  if (!v) return;
  openModal(`Termos v${v.versao}${v.ativo?' (ATIVA)':''}`, `
    <div style="margin-bottom:14px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Título</div>
      <div style="font-size:14px;color:var(--paper);margin-bottom:14px">${v.titulo||'(sem título)'}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px">Data publicação</div>
      <div style="font-size:13px;color:var(--sub2);margin-bottom:14px">${new Date(v.criado_em).toLocaleString('pt-PT')}</div>
    </div>
    <div style="max-height:400px;overflow-y:auto;padding:14px;background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:4px;font-size:12px;line-height:1.6">${v.conteudo}</div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    ${v.ativo ? '' : `<button class="btn btn-danger" onclick="if(confirm('Eliminar v${v.versao}?'))eliminarVersaoTermos('${v.id}')">🗑️ Eliminar</button>`}
  `);
}

function novaVersaoTermos(usarTemplate = false) {
  const proximaVersao = termosVersoes.length === 0 ? 1 : Math.max(...termosVersoes.map(v => v.versao)) + 1;
  openModal(`Nova versão de Termos (v${proximaVersao})`, `
    <p style="font-size:12px;color:var(--sub2);margin-bottom:14px">Ao publicar, esta torna-se a versão ativa. Motoristas serão obrigados a aceitar no próximo login.</p>
    <div class="field"><label>Título</label>
      <input id="termos-titulo" placeholder="Ex: Termos e Condições — Motorista TVDE" value="Termos e Condições — Motorista TVDE">
    </div>
    <div class="field"><label>Conteúdo (HTML permitido)</label>
      <textarea id="termos-conteudo" style="min-height:340px;font-family:var(--mono);font-size:11px;line-height:1.5">${usarTemplate ? TEMPLATE_TERMOS_TVDE.replace(/`/g, '\\`') : ''}</textarea>
    </div>
    <p style="font-size:11px;color:var(--sub2);line-height:1.6">Placeholders disponíveis: <code>{{EMPRESA}}</code>, <code>{{NIPC}}</code>, <code>{{LICENCA}}</code> — substituídos automaticamente pelos dados da empresa.</p>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick="publicarTermos(${proximaVersao})">📜 Publicar versão ativa</button>
  `);
}

async function publicarTermos(versao) {
  const titulo = document.getElementById('termos-titulo').value.trim();
  const conteudo = document.getElementById('termos-conteudo').value.trim();
  if (!conteudo) { toast('Conteúdo obrigatório','error'); return; }

  toast('A publicar...');
  // Desativar versões anteriores
  await db.from('termos_versoes').update({ ativo: false }).eq('empresa_id', empresa.id);
  // Criar nova
  const { error } = await db.from('termos_versoes').insert({
    empresa_id: empresa.id, versao, titulo, conteudo, ativo: true
  });
  if (error) { toast('Erro: '+error.message,'error'); return; }
  closeModal();
  toast(`✅ Versão v${versao} publicada — motoristas terão de re-aceitar`);
  await carregarTermos();
  renderComplianceTab();
}

async function eliminarVersaoTermos(id) {
  const { error } = await db.from('termos_versoes').delete().eq('id', id);
  if (error) { toast('Erro: '+error.message,'error'); return; }
  closeModal();
  toast('✅ Versão eliminada');
  await carregarTermos();
  renderComplianceTab();
}

      </div>
      <button class="btn btn-ghost btn-sm" onclick='modalItemChecklist(${JSON.stringify(it.id)})'>✏️</button>
      <button class="btn btn-danger btn-sm" onclick='if(confirm(${JSON.stringify("Eliminar item: "+it.label+"?")}))eliminarItemChecklist(${JSON.stringify(it.id)})'>🗑️</button>
    </div>
  `;
}

async function renumerarChecklist() {
  if (!confirm('Renumera todos os items em sequência: documentos 1, 2, 3... e itens 20, 21, 22...?')) return;
  toast('A renumerar...');
  const docs = checklistItems.filter(x => x.categoria === 'documento').sort((a,b) => a.ordem - b.ordem);
  const items = checklistItems.filter(x => x.categoria === 'item').sort((a,b) => a.ordem - b.ordem);
  // 1ª passagem: ordens temporárias (offset alto para evitar colisões com unique)
  const updates = [];
  docs.forEach((d, i) => updates.push({ id: d.id, novaOrdem: 1000 + i }));
  items.forEach((d, i) => updates.push({ id: d.id, novaOrdem: 2000 + i }));
  for (const u of updates) {
    await db.from('checklist_items_config').update({ ordem: u.novaOrdem }).eq('id', u.id);
  }
  // 2ª passagem: ordens finais
  const finais = [];
  docs.forEach((d, i) => finais.push({ id: d.id, novaOrdem: i + 1 }));
  items.forEach((d, i) => finais.push({ id: d.id, novaOrdem: 20 + i }));
  for (const u of finais) {
    await db.from('checklist_items_config').update({ ordem: u.novaOrdem }).eq('id', u.id);
  }
  toast('✅ Renumerado!');
  await carregarChecklistConfig();
  renderComplianceTab();
}

async function moverItemChecklist(id, direcao) {
  const it = checklistItems.find(x => x.id === id);
  if (!it) return;
  // Encontrar items da mesma categoria, ordenados
  const mesmaCategoria = checklistItems.filter(x => x.categoria === it.categoria).sort((a,b) => a.ordem - b.ordem);
  const idx = mesmaCategoria.findIndex(x => x.id === id);
  const novoIdx = idx + direcao;
  if (novoIdx < 0 || novoIdx >= mesmaCategoria.length) return;
  const vizinho = mesmaCategoria[novoIdx];
  // Trocar ordens
  await db.from('checklist_items_config').update({ ordem: vizinho.ordem }).eq('id', it.id);
  await db.from('checklist_items_config').update({ ordem: it.ordem }).eq('id', vizinho.id);
  await carregarChecklistConfig();
  renderComplianceTab();
}

function modalItemChecklist(id = null) {
  // Auto-ordem: próximo número após o último da categoria default
  const proxOrdemCategoria = (cat) => {
    const itensCat = checklistItems.filter(x => x.categoria === cat);
    if (!itensCat.length) return cat === 'documento' ? 1 : 20;
    return Math.max(...itensCat.map(x => x.ordem)) + 1;
  };
  const it = id ? checklistItems.find(x => x.id === id) : { categoria: 'documento', ordem: proxOrdemCategoria('documento') };
  openModal(id ? 'Editar item' : 'Novo item', `
    <div class="field-row">
      <div class="field"><label>Categoria</label>
        <select id="ck-cat">
          <option value="documento" ${it.categoria==='documento'?'selected':''}>📋 Documento</option>
          <option value="item" ${it.categoria==='item'?'selected':''}>🛠️ Item</option>
        </select>
      </div>
      <div class="field"><label>Ordem</label><input type="number" id="ck-ordem" value="${it.ordem||0}"></div>
    </div>
    <div class="field"><label>Label *</label><input id="ck-label" value="${(it.label||'').replace(/"/g,'&quot;')}" placeholder="Ex: Carta de condução"></div>
    <div class="field"><label>Descrição</label><input id="ck-desc" value="${(it.descricao||'').replace(/"/g,'&quot;')}" placeholder="Detalhes adicionais"></div>
    <div class="checkbox-row" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="ck-ativo" ${it.ativo!==false?'checked':''}>
      <label for="ck-ativo" style="font-size:12px;color:var(--sub2)">Item ativo (mostra no checklist)</label>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-gold" onclick='guardarItemChecklist(${id?JSON.stringify(id):'null'})'>Guardar</button>
  `);
}

async function guardarItemChecklist(id) {
  const payload = {
    empresa_id: empresa.id,
    categoria: document.getElementById('ck-cat').value,
    ordem: parseInt(document.getElementById('ck-ordem').value)||0,
    label: document.getElementById('ck-label').value.trim(),
    descricao: document.getElementById('ck-desc').value.trim(),
    ativo: document.getElementById('ck-ativo').checked
  };
  if (!payload.label) { toast('Label obrigatório','error'); return; }

  const { error } = id
    ? await db.from('checklist_items_config').update(payload).eq('id', id)
    : await db.from('checklist_items_config').insert(payload);
  if (error) { toast('Erro: '+error.message,'error'); return; }
  closeModal();
  toast('✅ Item guardado');
  await carregarChecklistConfig();
  renderComplianceTab();
}

async function eliminarItemChecklist(id) {
  const { error } = await db.from('checklist_items_config').delete().eq('id', id);
  if (error) { toast('Erro: '+error.message,'error'); return; }
  toast('✅ Item eliminado');
  await carregarChecklistConfig();
  renderComplianceTab();
}

// ── TAB: AUDITORIA ──
async function renderAuditoriaTab() {
  const body = document.getElementById('compliance-body');
  if (!body) return;

  // Aceitações de Termos (motorista + versão + quando)
  const { data: aceitacoes } = await db.from('termos_aceitacoes')
    .select('*, termos_versoes(versao, titulo), motoristas:motorista_id(nome, email, empresa_id)')
    .order('aceite_em', { ascending: false });

  const aceitacoesEmpresa = (aceitacoes||[]).filter(a => a.motoristas?.empresa_id === empresa.id);

  // Checklists hoje
  const hoje = new Date().toISOString().split('T')[0];
  const { data: checksHoje } = await db.from('checklists_diarios')
    .select('*, motoristas(nome, email)')
    .eq('empresa_id', empresa.id).eq('data', hoje).order('criado_em', { ascending: false });

  // Motoristas ativos da empresa
  const motAtivos = motoristas.filter(m => m.ativo);
  const fizeramHoje = (checksHoje||[]).map(c => c.motorista_id);
  const naoFizeram = motAtivos.filter(m => !fizeramHoje.includes(m.id));

  body.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <div class="kpi">
        <div class="kpi-label">Aceitações Termos</div>
        <div class="kpi-val">${aceitacoesEmpresa.length}</div>
        <div class="kpi-sub">total registadas</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Check diário (hoje)</div>
        <div class="kpi-val">${checksHoje?.length || 0}/${motAtivos.length}</div>
        <div class="kpi-sub">${naoFizeram.length>0 ? '⚠️ '+naoFizeram.length+' por fazer' : '✅ Todos OK'}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">📜 Aceitações de Termos</div></div>
        ${aceitacoesEmpresa.length === 0 ? '<div class="empty-state"><div class="empty-state-text">Sem aceitações ainda</div></div>' : `
          <table>
            <thead><tr><th>Motorista</th><th>Versão</th><th>Data</th></tr></thead>
            <tbody>${aceitacoesEmpresa.map(a => `
              <tr>
                <td>${a.motoristas?.nome||'—'}</td>
                <td><span class="badge badge-green"><span class="badge-dot"></span>v${a.termos_versoes?.versao||'?'}</span></td>
                <td style="font-family:var(--mono);font-size:11px;color:var(--sub2)">${new Date(a.aceite_em).toLocaleString('pt-PT')}</td>
              </tr>
            `).join('')}</tbody>
          </table>
        `}
      </div>

      <div class="table-wrap">
        <div class="table-header"><div class="table-title">✅ Checklists hoje</div></div>
        ${motAtivos.length === 0 ? '<div class="empty-state"><div class="empty-state-text">Sem motoristas</div></div>' : `
          <table>
            <thead><tr><th>Motorista</th><th>Estado</th><th>Hora</th></tr></thead>
            <tbody>
              ${(checksHoje||[]).map(c => `
                <tr>
                  <td>${c.motoristas?.nome||'—'}</td>
                  <td><span class="badge ${c.todos_ok?'badge-green':'badge-orange'}"><span class="badge-dot"></span>${c.todos_ok?'Tudo OK':'C/ falhas'}</span></td>
                  <td style="font-family:var(--mono);font-size:11px;color:var(--sub2)">${new Date(c.criado_em).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}</td>
                </tr>
              `).join('')}
              ${naoFizeram.map(m => `
                <tr>
                  <td>${m.nome}</td>
                  <td><span class="badge badge-red"><span class="badge-dot"></span>Não fez</span></td>
                  <td style="font-family:var(--mono);font-size:11px;color:var(--sub2)">—</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      </div>
    </div>
  `;
}
