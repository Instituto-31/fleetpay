<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetPay — Painel Operador</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0905;--paper:#f7f4ef;--gold:#c8922a;--gold-light:#e8b86d;
  --line:rgba(200,146,42,0.15);--sub:#6b6456;--sub2:#a09484;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'Geist Mono',monospace;--sans:'Outfit',sans-serif;
  --green:#27c93f;--red:#e05252;--orange:#e8943a;
  --sidebar:220px;
}
html,body{height:100%;font-family:var(--sans);background:var(--ink);color:var(--paper);overflow:hidden}

/* LAYOUT */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh}

/* SIDEBAR */
.sidebar{
  background:rgba(0,0,0,0.4);border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow-y:auto;
}
.sidebar-logo{
  padding:24px 20px;border-bottom:1px solid var(--line);
  font-family:var(--serif);font-size:20px;font-weight:400;
}
.sidebar-logo em{font-style:italic;color:var(--gold)}
.sidebar-empresa{
  padding:12px 20px;font-size:11px;color:var(--sub);
  font-family:var(--mono);letter-spacing:.5px;border-bottom:1px solid var(--line);
}

.nav-section{padding:16px 0 8px}
.nav-label{
  padding:4px 20px;font-family:var(--mono);font-size:9px;
  color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;cursor:pointer;
  font-size:13px;color:var(--sub2);
  background:none;border:none;width:100%;text-align:left;
  transition:color .15s,background .15s;font-family:var(--sans);
}
.nav-item:hover{color:var(--paper);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--gold);background:rgba(200,146,42,0.06)}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:9px;padding:2px 6px;border-radius:100px;font-family:var(--mono);
}

.sidebar-bottom{margin-top:auto;padding:16px;border-top:1px solid var(--line)}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:4px;background:rgba(255,255,255,0.03);
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:rgba(200,146,42,0.2);border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:var(--gold);font-family:var(--mono);
  flex-shrink:0;
}
.user-info-name{font-size:12px;font-weight:500;color:var(--paper)}
.user-info-role{font-size:10px;color:var(--sub);font-family:var(--mono)}
.btn-logout{
  margin-top:8px;width:100%;padding:8px;
  background:transparent;border:1px solid var(--line);border-radius:3px;
  color:var(--sub);font-size:11px;font-family:var(--sans);cursor:pointer;
  transition:all .2s;letter-spacing:.5px;
}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* MAIN CONTENT */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{
  padding:16px 32px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.2);flex-shrink:0;
}
.page-title{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:-.3px}
.topbar-actions{display:flex;gap:10px}

.content{flex:1;overflow-y:auto;padding:32px}

/* BOTÕES */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:3px;font-size:11px;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;font-family:var(--sans);
  cursor:pointer;border:none;transition:all .2s;
}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold-light)}
.btn-ghost{background:transparent;color:var(--sub2);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--paper);border-color:rgba(255,255,255,0.2)}
.btn-sm{padding:6px 12px;font-size:10px}
.btn-danger{background:rgba(224,82,82,0.1);color:var(--red);border:1px solid rgba(224,82,82,0.2)}

/* CARDS KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi{
  background:rgba(255,255,255,0.02);border:1px solid var(--line);
  border-radius:4px;padding:20px;
}
.kpi-label{font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.kpi-val{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--gold);letter-spacing:-1px}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:4px}

/* TABELA */
.table-wrap{background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.table-header{
  padding:16px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.table-title{font-size:14px;font-weight:500;color:var(--paper)}
.table-sub{font-size:12px;color:var(--sub2)}

table{width:100%;border-collapse:collapse}
th{
  font-family:var(--mono);font-size:9px;color:var(--sub);
  letter-spacing:1.5px;text-transform:uppercase;
  text-align:left;padding:10px 16px;border-bottom:1px solid var(--line);
  background:rgba(0,0,0,0.2);
}
td{
  font-size:13px;color:var(--sub2);padding:12px 16px;
  border-bottom:1px solid rgba(200,146,42,0.06);
}
td:first-child{color:var(--paper);font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
td.gold{color:var(--gold);font-family:var(--serif);font-size:15px}
td.green{color:var(--green)}
td.red{color:var(--red)}
td.orange{color:var(--orange)}

/* BADGE ESTADO */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:10px;font-family:var(--mono);
}
.badge-green{background:rgba(39,201,63,0.1);color:var(--green);border:1px solid rgba(39,201,63,0.2)}
.badge-orange{background:rgba(232,148,58,0.1);color:var(--orange);border:1px solid rgba(232,148,58,0.2)}
.badge-red{background:rgba(224,82,82,0.1);color:var(--red);border:1px solid rgba(224,82,82,0.2)}
.badge-dot{width:4px;height:4px;border-radius:50%;background:currentColor}

/* FORM MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:#111008;border:1px solid var(--line);border-radius:6px;
  width:560px;max-height:85vh;overflow-y:auto;
  transform:translateY(20px);transition:transform .2s;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{
  padding:20px 24px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:300}
.modal-close{
  background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{color:var(--paper)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

/* FORM FIELDS */
.field{margin-bottom:16px}
.field label{display:block;font-family:var(--mono);font-size:9px;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;padding:10px 14px;
  background:rgba(255,255,255,0.04);border:1px solid var(--line);
  border-radius:3px;color:var(--paper);font-size:13px;font-family:var(--sans);
  outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--sub)}
.field select option{background:var(--ink);color:var(--paper)}
body.light .field select option,body.theme-sage .field select option{background:var(--ink);color:var(--paper)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* CSV UPLOAD */
.upload-zone{
  border:2px dashed var(--line);border-radius:4px;padding:32px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(200,146,42,0.04)}
.upload-icon{font-size:32px;margin-bottom:12px}
.upload-title{font-size:14px;color:var(--sub2);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--sub)}
.upload-zone input[type=file]{display:none}

/* ALERTAS */
.alerta-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:3px;margin-bottom:8px;
}
.alerta-exp{background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.2)}
.alerta-aviso{background:rgba(232,148,58,0.08);border:1px solid rgba(232,148,58,0.2)}
.alerta-icon{font-size:18px}
.alerta-info{flex:1}
.alerta-nome{font-size:13px;font-weight:500;color:var(--paper)}
.alerta-desc{font-size:11px;color:var(--sub2);margin-top:2px}
.alerta-data{font-family:var(--mono);font-size:10px}

/* SEMANA SELECTOR */
.semana-nav{display:flex;align-items:center;gap:12px}
.semana-nav button{
  background:none;border:1px solid var(--line);border-radius:3px;
  color:var(--sub2);padding:6px 10px;cursor:pointer;font-size:14px;
  transition:all .2s;
}
.semana-nav button:hover{border-color:var(--gold);color:var(--gold)}
.semana-label{font-family:var(--mono);font-size:12px;color:var(--paper);min-width:180px;text-align:center}

/* LOADING */
.spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{text-align:center;padding:40px;color:var(--sub)}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  padding:12px 20px;border-radius:4px;font-size:13px;
  animation:slideIn .3s ease;
}
.toast-success{background:#1a3d1f;border:1px solid rgba(39,201,63,0.3);color:var(--green)}
.toast-error{background:#3d1a1a;border:1px solid rgba(224,82,82,0.3);color:var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* EMPTY */
.empty-state{text-align:center;padding:60px;color:var(--sub)}
.empty-state-icon{font-size:40px;margin-bottom:12px}
.empty-state-text{font-family:var(--serif);font-size:18px;color:var(--sub2);margin-bottom:6px}
.empty-state-sub{font-size:12px}

/* PROGRESSO */
.progress-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--gold);transition:width .3s}

/* TABS */
.tabs-nav{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:24px}
.tab-btn{
  padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--sub2);font-size:12px;font-family:var(--sans);cursor:pointer;
  transition:all .2s;letter-spacing:.5px;margin-bottom:-1px;
}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover{color:var(--paper)}

/* SEARCH */
.search-bar{
  padding:8px 14px;background:rgba(255,255,255,0.04);
  border:1px solid var(--line);border-radius:3px;
  color:var(--paper);font-size:13px;font-family:var(--sans);outline:none;
  transition:border-color .2s;width:220px;
}
.search-bar:focus{border-color:var(--gold)}
.search-bar::placeholder{color:var(--sub)}

/* SECÇÃO VIA VERDE / PRIO RESUMO */
.matricula-card{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;
}
.matricula-label{font-family:var(--mono);font-size:12px;color:var(--paper)}
.matricula-motorista{font-size:11px;color:var(--sub2);margin-top:2px}
.matricula-valor{font-family:var(--serif);font-size:18px;color:var(--gold)}

/* LIGHT MODE */
body.light {
  --ink:#f5f2ed;--paper:#1a1710;--gold:#a06e1a;--gold-light:#c8922a;
  --line:rgba(160,110,26,0.15);--sub:#8a7d6a;--sub2:#5a4f3f;
  --green:#1a8a2a;--red:#c03030;--orange:#b86a1a;
}
body.light { background:var(--ink); color:var(--paper); }
body.light .sidebar { background:rgba(255,255,255,0.7); border-right:1px solid var(--line); }
body.light .topbar { background:rgba(245,242,237,0.95); }
body.light .main { background:#ede9e2; }
body.light .kpi { background:rgba(255,255,255,0.8); }
body.light .table-wrap { background:rgba(255,255,255,0.8); }
body.light table th { background:rgba(0,0,0,0.04); }
body.light tr:hover td { background:rgba(0,0,0,0.02); }
body.light .field input,
body.light .field select,
body.light .field textarea { background:rgba(0,0,0,0.04); color:var(--paper); }
body.light .modal { background:#f0ece4; }
body.light .upload-zone { border-color:rgba(160,110,26,0.25); }
body.light .upload-zone:hover { background:rgba(160,110,26,0.06); }
body.light .nav-item:hover { background:rgba(0,0,0,0.04); }
body.light .nav-item.active { background:rgba(160,110,26,0.1); }
body.light .user-chip { background:rgba(0,0,0,0.05); }
body.light .alerta-exp { background:rgba(192,48,48,0.07); }
body.light .alerta-aviso { background:rgba(184,106,26,0.07); }
body.light .search-bar { background:rgba(0,0,0,0.05); color:var(--paper); }
body.light .btn-ghost { color:var(--sub2); border-color:var(--line); }
body.light .btn-ghost:hover { color:var(--paper); }

/* ─── TEMA: Sage Instituto 31 ─── */
body.theme-sage {
  --ink:#FAF7F2;--paper:#2C3E2D;--gold:#7A8C66;--gold-light:#9CAF88;
  --line:rgba(122,140,102,0.20);--sub:#7A8970;--sub2:#5A6B4F;
  --green:#5A8A4F;--red:#B85450;--orange:#C4965A;
}
body.theme-sage { background:var(--ink); color:var(--paper); }
body.theme-sage .sidebar { background:rgba(255,255,255,0.55); border-right:1px solid var(--line); }
body.theme-sage .topbar { background:rgba(250,247,242,0.95); }
body.theme-sage .main { background:#F0EBE0; }
body.theme-sage .kpi { background:rgba(255,255,255,0.8); }
body.theme-sage .table-wrap { background:rgba(255,255,255,0.8); }
body.theme-sage table th { background:rgba(0,0,0,0.04); }
body.theme-sage tr:hover td { background:rgba(0,0,0,0.02); }
body.theme-sage .field input,
body.theme-sage .field select,
body.theme-sage .field textarea { background:rgba(0,0,0,0.04); color:var(--paper); }
body.theme-sage .modal { background:#F0EBE0; }
body.theme-sage .upload-zone { border-color:rgba(122,140,102,0.30); }
body.theme-sage .upload-zone:hover { background:rgba(122,140,102,0.06); }
body.theme-sage .nav-item:hover { background:rgba(0,0,0,0.04); }
body.theme-sage .nav-item.active { background:rgba(122,140,102,0.12); }
body.theme-sage .user-chip { background:rgba(0,0,0,0.05); }
body.theme-sage .alerta-exp { background:rgba(184,84,80,0.08); }
body.theme-sage .alerta-aviso { background:rgba(196,150,90,0.10); }
body.theme-sage .search-bar { background:rgba(0,0,0,0.05); color:var(--paper); }
body.theme-sage .btn-ghost { color:var(--sub2); border-color:var(--line); }
body.theme-sage .btn-ghost:hover { color:var(--paper); }

/* ─── TEMA PRO: Tech Pro (fintech blue) ─── */
body.theme-tech-pro {
  --ink:#0F1419;--paper:#E6EDF3;--gold:#4FB3D9;--gold-light:#7BC8E0;
  --line:rgba(79,179,217,0.18);--sub:#7D8590;--sub2:#9EA5AD;
  --green:#3FB950;--red:#F85149;--orange:#D29922;
}
body.theme-tech-pro { background:var(--ink); color:var(--paper); }
body.theme-tech-pro .sidebar { background:rgba(0,0,0,0.35); border-right:1px solid var(--line); }
body.theme-tech-pro .topbar { background:rgba(0,0,0,0.25); }
body.theme-tech-pro .kpi { background:rgba(255,255,255,0.04); }
body.theme-tech-pro .table-wrap { background:rgba(255,255,255,0.04); }
body.theme-tech-pro table th { background:rgba(0,0,0,0.3); }
body.theme-tech-pro tr:hover td { background:rgba(255,255,255,0.03); }
body.theme-tech-pro .field input,body.theme-tech-pro .field select,body.theme-tech-pro .field textarea { background:rgba(255,255,255,0.04); color:var(--paper); }
body.theme-tech-pro .field select option { background:var(--ink); color:var(--paper); }
body.theme-tech-pro .modal { background:#161B22; }
body.theme-tech-pro .upload-zone { border-color:rgba(79,179,217,0.25); }
body.theme-tech-pro .upload-zone:hover { background:rgba(79,179,217,0.04); }
body.theme-tech-pro .nav-item:hover { background:rgba(255,255,255,0.04); }
body.theme-tech-pro .nav-item.active { background:rgba(79,179,217,0.10); }
body.theme-tech-pro .user-chip { background:rgba(255,255,255,0.04); }
body.theme-tech-pro .search-bar { background:rgba(255,255,255,0.04); color:var(--paper); }

/* ─── TEMA PRO: Forest Premium (Audi feel) ─── */
body.theme-forest {
  --ink:#1A2820;--paper:#F0E8D8;--gold:#D4A574;--gold-light:#E8C495;
  --line:rgba(212,165,116,0.18);--sub:#8A9888;--sub2:#A8B6A4;
  --green:#6FAF6F;--red:#D87070;--orange:#D4A574;
}
body.theme-forest { background:var(--ink); color:var(--paper); }
body.theme-forest .sidebar { background:rgba(0,0,0,0.35); border-right:1px solid var(--line); }
body.theme-forest .topbar { background:rgba(0,0,0,0.25); }
body.theme-forest .kpi { background:rgba(212,165,116,0.05); }
body.theme-forest .table-wrap { background:rgba(212,165,116,0.04); }
body.theme-forest table th { background:rgba(0,0,0,0.25); }
body.theme-forest tr:hover td { background:rgba(255,255,255,0.03); }
body.theme-forest .field input,body.theme-forest .field select,body.theme-forest .field textarea { background:rgba(255,255,255,0.05); color:var(--paper); }
body.theme-forest .field select option { background:var(--ink); color:var(--paper); }
body.theme-forest .modal { background:#22322A; }
body.theme-forest .upload-zone { border-color:rgba(212,165,116,0.28); }
body.theme-forest .upload-zone:hover { background:rgba(212,165,116,0.06); }
body.theme-forest .nav-item:hover { background:rgba(255,255,255,0.04); }
body.theme-forest .nav-item.active { background:rgba(212,165,116,0.12); }
body.theme-forest .user-chip { background:rgba(255,255,255,0.04); }
body.theme-forest .search-bar { background:rgba(255,255,255,0.05); color:var(--paper); }

/* ─── TEMA PRO: Warm Mediterranean (terracotta) ─── */
body.theme-warm {
  --ink:#FFF8F0;--paper:#3D2817;--gold:#C36F4F;--gold-light:#D9885F;
  --line:rgba(195,111,79,0.18);--sub:#7A5C45;--sub2:#5A3F2A;
  --green:#7A9461;--red:#B85450;--orange:#D9A55E;
}
body.theme-warm { background:var(--ink); color:var(--paper); }
body.theme-warm .sidebar { background:rgba(255,255,255,0.55); border-right:1px solid var(--line); }
body.theme-warm .topbar { background:rgba(255,248,240,0.95); }
body.theme-warm .main { background:#F5EBDC; }
body.theme-warm .kpi { background:rgba(255,255,255,0.7); }
body.theme-warm .table-wrap { background:rgba(255,255,255,0.7); }
body.theme-warm table th { background:rgba(195,111,79,0.08); }

<script>

// ── ESTADO GLOBAL ──
let currentUser = null, perfil = null, empresa = null;
let empresasDisponiveis = [];   // lista visível ao user (1 para operador, várias para superadmin)
let motoristas = [], veiculos = [], pagamentos = [], alertas = [];
let semanaAtual = getSegundaFeira(new Date());
let currentPage = 'dashboard';

// ── UTILITÁRIOS ──
const fmt = v => new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR'}).format(v||0);
const fmtD = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT') : '—';
const fmtDshort = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}) : '—';

function getSegundaFeira(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  return dt.toISOString().split('T')[0];
}
function getDomingo(segunda) {
  const dt = new Date(segunda+'T00:00:00');
  dt.setDate(dt.getDate() + 6);
  return dt.toISOString().split('T')[0];
}
function semanaLabel(s) {
  return `${fmtDshort(s)} — ${fmtDshort(getDomingo(s))}`;
}
function toast(msg, tipo='success') {
  const t = document.createElement('div');
  t.className = `toast toast-${tipo}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function openModal(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

// ── INIT ──
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  const { data: p } = await db.from('perfis').select('*, empresas(*)').eq('id', currentUser.id).single();
  if (!p || p.role === 'motorista') { window.location.href = 'motorista.html'; return; }

  perfil = p;

  // Superadmin: ver TODAS as empresas; operador: só a sua
  if (perfil.role === 'superadmin') {
    const { data: emps } = await db.from('empresas').select('*').order('nome');
    empresasDisponiveis = emps || [];
    const savedId = localStorage.getItem('fleetpay-empresa-ativa');
    empresa = empresasDisponiveis.find(e => e.id === savedId) || empresasDisponiveis[0] || p.empresas;
  } else {
    empresasDisponiveis = p.empresas ? [p.empresas] : [];
    empresa = p.empresas;
  }

  // Plano da empresa ativa controla acesso a temas pro e outras features
  window.fleetpayPlano = empresa?.plano || 'free';

  showPage('dashboard');
}

async function trocarEmpresa(id) {
  const nova = empresasDisponiveis.find(e => e.id === id);
  if (!nova || nova.id === empresa?.id) {
    document.querySelectorAll('[style*="z-index:300"]').forEach(el => el.remove());
    return;
  }
  empresa = nova;
  localStorage.setItem('fleetpay-empresa-ativa', id);
  // Atualizar plano + revalidar tema
  window.fleetpayPlano = empresa?.plano || 'free';
  if (!themes.canUse(themes.current())) themes.apply('default');
  document.querySelectorAll('[style*="z-index:300"]').forEach(el => el.remove());
  renderEmpresaSelector();
  toast(`📦 Empresa ativa: ${nova.nome}`);
  await carregarDados();
  showPage(currentPage || 'dashboard');
}

async function carregarDados() {
  const eid = empresa?.id;
  if (!eid) return;

  const [mRes, vRes, pRes] = await Promise.all([
    db.from('motoristas').select('*').eq('empresa_id', eid).eq('ativo', true).order('nome'),
    db.from('veiculos').select('*').eq('empresa_id', eid).order('matricula'),
    db.from('pagamentos').select('*, motoristas(nome,email,whatsapp,iban)').eq('empresa_id', eid).order('semana_inicio', {ascending:false}).limit(200)
  ]);

  motoristas = mRes.data || [];
  veiculos = vRes.data || [];
  pagamentos = pRes.data || [];

  // Alertas
  await calcularAlertas();
}

async function calcularAlertas() {
  const hoje = new Date().toISOString().split('T')[0];
  const em30 = new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0];
  alertas = [];

  motoristas.forEach(m => {
    [['Licença TVDE', m.licenca_tvde_validade],['Carta Condução', m.carta_conducao_validade],
     ['Cartão Cidadão', m.cartao_cidadao_validade],['Reg. Criminal', m.registo_criminal_validade]
    ].forEach(([t,v]) => {
      if (v && v <= em30) alertas.push({tipo:t, nome:m.nome, validade:v, expirado:v<hoje, categoria:'motorista'});
    });
  });

  veiculos.forEach(v => {
    [['Seguro', v.seguro_validade],['Inspeção', v.inspecao_validade],['Extintor', v.extintor_validade]
    ].forEach(([t,val]) => {
      if (val && val <= em30) alertas.push({tipo:t, nome:v.matricula, validade:val, expirado:val<hoje, categoria:'veiculo'});
    });
  });

  const badge = document.getElementById('badge-alertas');
  if (alertas.length > 0) {
    badge.textContent = alertas.length;
    badge.style.display = '';
  } else badge.style.display = 'none';
}

let temposRegistos = [];

let temposPesquisa = '';

const SEG_8H = 8*3600, SEG_9_5H = 9.5*3600, SEG_10H = 10*3600;
const SEG_4_5H = 4.5*3600, SEG_11H = 11*3600, SEG_45H = 45*3600;

async function carregarTemposRegistos() {
  // Últimos 14 dias para ter semana atual + anterior
  const desde = new Date(Date.now() - 14*24*3600*1000).toISOString();
  const { data, error } = await db.from('registos_conducao')
    .select('*, motoristas(nome, email)')
    .eq('empresa_id', empresa.id)
    .gte('inicio', desde)
    .order('inicio', { ascending: false });
  temposRegistos = data || [];
}

function aplicarFiltrosTempos(q) {
  temposPesquisa = (q||'').toLowerCase();
  pintarTempos();
}

function calcularEstatsMotorista(motoristaId) {
  const reg = temposRegistos.filter(r => r.motorista_id === motoristaId);
  const agora = Date.now();
  const inicioHoje = new Date(); inicioHoje.setHours(0,0,0,0);
  const fimHoje = new Date(inicioHoje); fimHoje.setDate(fimHoje.getDate()+1);
  // Semana atual (segunda a domingo)
  const inicioSem = new Date(inicioHoje);
  const dia = inicioSem.getDay() || 7;  // 1=seg ... 7=dom
  inicioSem.setDate(inicioSem.getDate() - (dia-1));
  const inicioSemAnterior = new Date(inicioSem); inicioSemAnterior.setDate(inicioSemAnterior.getDate()-7);

  let condHoje = 0, condSemana = 0, condSemAnterior = 0;
  let pausaUltimaCond = null;          // tempo desde fim da última condução
  let temPausaApos45h = false;         // motorista fez pausa nos últimos 4h30 ou está a iniciar
  let segDesdeUltimoFim = null;
  let ultimoFim = null;
  let estadoAtivo = null;              // registo aberto

  reg.forEach(r => {
    const ini = new Date(r.inicio).getTime();
    const fim = r.fim ? new Date(r.fim).getTime() : agora;
    const dur = (fim - ini) / 1000;
    if (!r.fim) estadoAtivo = r;

    if (r.tipo === 'conducao') {
      // Soma à hoje/semana
      if (ini >= inicioHoje.getTime() && ini < fimHoje.getTime()) condHoje += dur;
      if (ini >= inicioSem.getTime()) condSemana += dur;
      else if (ini >= inicioSemAnterior.getTime() && ini < inicioSem.getTime()) condSemAnterior += dur;
    }

    // Último fim de condução
    if (r.tipo === 'conducao' && r.fim) {
      if (!ultimoFim || new Date(r.fim).getTime() > new Date(ultimoFim).getTime()) ultimoFim = r.fim;
    }
  });

  if (ultimoFim && !estadoAtivo) {
    segDesdeUltimoFim = Math.floor((agora - new Date(ultimoFim).getTime())/1000);
  }

  return {
    condHoje, condSemana, condSemAnterior,
    estadoAtivo,
    segDesdeUltimoFim,
    cumpreLimite: condHoje < SEG_10H,
    cumpreDescansoDiario: !ultimoFim || segDesdeUltimoFim === null || segDesdeUltimoFim >= SEG_11H,
    cumpreDescansoSemanal: condSemana < 56*3600  // máx semana sugerido
  };
}

function fmtHM(seg) {
  if (!seg || seg<0) seg = 0;
  const h = Math.floor(seg/3600), m = Math.floor((seg%3600)/60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function corCondHoje(seg) {
  if (seg >= SEG_10H) return 'var(--red)';
  if (seg >= SEG_9_5H) return 'var(--orange)';
  if (seg >= SEG_8H) return '#c8a020';
  return 'var(--green)';
}

      <div style="font-size:12px;color:var(--sub2);margin-top:4px">Tempos baseados nos limites da Lei TVDE n.º 45/2018 — máx <strong>10h/dia</strong>, descanso diário ≥ 11h. Atualiza ao vivo (30s).</div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">

      </div>
      <div class="kpi">
        <div class="kpi-label">Total horas hoje</div>
        <div class="kpi-val">${fmtHM(lista.reduce((s,m) => s + calcularEstatsMotorista(m.id).condHoje, 0))}</div>
        <div class="kpi-sub">condução acumulada</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total semana</div>
        <div class="kpi-val">${fmtHM(lista.reduce((s,m) => s + calcularEstatsMotorista(m.id).condSemana, 0))}</div>
        <div class="kpi-sub">semana atual</div>
      </div>

    <div class="table-wrap">

        </div>
      </div>
      ${lista.length === 0 ? '<div class="empty-state"><div class="empty-state-text">Sem motoristas</div></div>' : `

          <th>Semana atual</th>

          ${lista.map(m => renderLinhaTempos(m)).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

function renderLinhaTempos(m) {
  const s = calcularEstatsMotorista(m.id);
  const ativo = s.estadoAtivo;
  const cor = corCondHoje(s.condHoje);
  const totalCondHoje = ativo && ativo.tipo === 'conducao' ?
    s.condHoje + Math.floor((Date.now()-new Date(ativo.inicio).getTime())/1000) : s.condHoje;
  const corHoje = corCondHoje(totalCondHoje);
  const pct = Math.min(100, (totalCondHoje/SEG_10H)*100);

  let estado = '<span class="badge badge-red"><span class="badge-dot"></span>Off</span>';
  if (ativo) estado = badgeTipo(ativo.tipo);

  const ultActiv = ativo ? new Date(ativo.inicio).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})+' (atual)' :
    (s.segDesdeUltimoFim != null ? `há ${fmtHM(s.segDesdeUltimoFim)}` : '—');

  const descSeg = s.segDesdeUltimoFim;
  const descLabel = ativo ? '—' : (descSeg != null ? fmtHM(descSeg) : '—');
  const descCor = descSeg != null && descSeg < SEG_11H ? 'var(--orange)' : 'var(--green)';

  const conformidade = s.cumpreLimite && s.cumpreDescansoDiario && s.cumpreDescansoSemanal;
  const confBadge = conformidade ?
    '<span style="color:var(--green);font-size:18px" title="Cumpre Lei TVDE">✓</span>' :
    '<span style="color:var(--red);font-size:16px" title="Verifica limites">⚠️</span>';

  return `
    <tr data-motorista-id="${m.id}">
      <td>
        <div style="font-weight:500">${m.nome||'—'}</div>
        <div style="font-size:11px;color:var(--sub2);font-family:var(--mono);margin-top:1px">${m.email||''}</div>
      </td>
      <td>${estado}</td>
      <td style="font-size:11px;color:var(--sub2);font-family:var(--mono)">${ultActiv}</td>
      <td style="min-width:200px">
        <div style="display:flex;align-items:center;gap:10px">
          <div data-cond-hoje="${m.id}" style="font-family:var(--mono);font-size:13px;color:${corHoje};font-weight:600;min-width:55px">${fmtHM(totalCondHoje)}</div>
          <div style="flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden">
            <div data-cond-barra="${m.id}" style="height:100%;width:${pct}%;background:${corHoje};transition:all .3s"></div>
          </div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--sub)">10h00</div>
        </div>
      </td>
      <td style="font-family:var(--mono);font-size:12px;color:${descCor}">${descLabel}</td>
      <td style="font-family:var(--mono);font-size:12px">${fmtHM(s.condSemana)}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--sub2)">${fmtHM(s.condSemAnterior)}</td>
      <td style="text-align:center">${confBadge}</td>
    </tr>
  `;
}

function tickTemposLive() {
  // Atualiza só células dinâmicas — não re-renderiza tudo
  motoristas.forEach(m => {
    const s = calcularEstatsMotorista(m.id);
    const ativo = s.estadoAtivo;
    const totalCondHoje = ativo && ativo.tipo === 'conducao' ?
      s.condHoje + Math.floor((Date.now()-new Date(ativo.inicio).getTime())/1000) : s.condHoje;
    const cor = corCondHoje(totalCondHoje);
    const pct = Math.min(100, (totalCondHoje/SEG_10H)*100);
    const elH = document.querySelector(`[data-cond-hoje="${m.id}"]`);
    const elB = document.querySelector(`[data-cond-barra="${m.id}"]`);
    if (elH) { elH.textContent = fmtHM(totalCondHoje); elH.style.color = cor; }
    if (elB) { elB.style.width = pct+'%'; elB.style.background = cor; }
  });
}

function iniciarTemposTickAdmin() {
  pararTemposTickAdmin();
  temposTickInterval = setInterval(tickTemposLive, 30000);
}
function pararTemposTickAdmin() {
  if (temposTickInterval) { clearInterval(temposTickInterval); temposTickInterval = null; }
}

function setIntervalo(dias) {
  const hoje = new Date();
  const inicio = new Date(); inicio.setDate(inicio.getDate()-(dias-1));
  document.getElementById('aud-data-ini').value = inicio.toISOString().split('T')[0];
  document.getElementById('aud-data-fim').value = hoje.toISOString().split('T')[0];
}

async function gerarRelatorioTempos(formato) {
  const motoristaId = document.getElementById('aud-motorista').value;
  const dataIni = document.getElementById('aud-data-ini').value;
  const dataFim = document.getElementById('aud-data-fim').value;
  if (!dataIni || !dataFim) { toast('Datas obrigatórias','error'); return; }

  toast('A gerar relatório...');

  // Buscar registos do intervalo
  let q = db.from('registos_conducao')
    .select('*, motoristas(nome, email, nif, licenca_tvde, doc_id, morada)')
    .eq('empresa_id', empresa.id)
    .gte('inicio', dataIni+'T00:00:00Z')
    .lte('inicio', dataFim+'T23:59:59Z')
    .order('inicio');
  if (motoristaId !== 'todos') q = q.eq('motorista_id', motoristaId);
  const { data: regs, error } = await q;
  if (error) { toast('Erro: '+error.message,'error'); return; }
  if (!regs || !regs.length) { toast('Sem registos no período','error'); return; }

  closeModal();

  if (formato === 'csv-detalhado') exportarCSVDetalhado(regs, dataIni, dataFim);
  else if (formato === 'csv-resumo') exportarCSVResumo(regs, dataIni, dataFim);
  else exportarPDFAuditoria(regs, motoristaId, dataIni, dataFim);
}

function exportarCSVDetalhado(regs, ini, fim) {
  const linhas = [['Motorista','Email','NIF','Início','Fim','Tipo','Duração (HH:MM)','Duração (segundos)','Notas']];
  regs.forEach(r => {
    const dur = r.duracao_segundos || 0;
    linhas.push([
      r.motoristas?.nome||'', r.motoristas?.email||'', r.motoristas?.nif||'',
      new Date(r.inicio).toLocaleString('pt-PT'),
      r.fim ? new Date(r.fim).toLocaleString('pt-PT') : '(em curso)',
      r.tipo, fmtHM(dur), dur,
      (r.notas||'').replace(/[\n,]/g,' ')
    ]);
  });
  downloadCSV(linhas, `tempos_detalhado_${ini}_${fim}.csv`);
  toast('✅ CSV detalhado exportado');
}

function exportarCSVResumo(regs, ini, fim) {
  // Agrupar por motorista + dia
  const map = {};
  regs.forEach(r => {
    if (!r.fim) return;
    const dia = new Date(r.inicio).toISOString().split('T')[0];
    const motId = r.motorista_id;
    const motNome = r.motoristas?.nome || '—';
    const k = motId + '|' + dia;
    if (!map[k]) map[k] = { motorista: motNome, dia, conducao: 0, pausa: 0 };
    map[k][r.tipo] += (r.duracao_segundos||0);
  });
  const linhas = [['Motorista','Dia','Condução (HH:MM)','Pausas (HH:MM)','Total (HH:MM)','Cumpre 10h?']];
  Object.values(map).sort((a,b) => a.motorista.localeCompare(b.motorista) || a.dia.localeCompare(b.dia)).forEach(r => {
    linhas.push([
      r.motorista, r.dia, fmtHM(r.conducao), fmtHM(r.pausa), fmtHM(r.conducao+r.pausa),
      r.conducao < SEG_10H ? 'Sim' : 'NÃO'
    ]);
  });
  downloadCSV(linhas, `tempos_resumo_${ini}_${fim}.csv`);
  toast('✅ CSV resumo exportado');
}

function downloadCSV(linhas, fname) {
  const csv = linhas.map(l => l.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

async function exportarPDFAuditoria(regs, motoristaId, ini, fim) {
  // Para "todos" gerar 1 PDF por motorista; para 1 só, gerar 1 PDF
  const isUmMotorista = motoristaId !== 'todos';
  if (isUmMotorista) {
    await gerarPDFMotorista(regs, motoristas.find(m => m.id === motoristaId), ini, fim);
  } else {
    // Agrupar por motorista
    const porMot = {};
    regs.forEach(r => { (porMot[r.motorista_id] = porMot[r.motorista_id] || []).push(r); });
    for (const motId of Object.keys(porMot)) {
      await gerarPDFMotorista(porMot[motId], motoristas.find(m => m.id === motId), ini, fim);
      await new Promise(r => setTimeout(r, 300));   // espaçar downloads
    }
    toast(`✅ ${Object.keys(porMot).length} PDFs gerados`);
  }
}

// ── CONDUÇÃO LIVE (admin) ──
let conducaoSessoesLive = [];   // sessões em curso (fim IS NULL) hoje
let conducaoTotaisHoje = {};    // motorista_id → segundos de condução já fechados hoje
let conducaoLiveInterval = null;

async function carregarConducaoLive() {
  const hojeISO = new Date().toISOString().split('T')[0];
  const [ativasRes, hojeRes] = await Promise.all([
    db.from('registos_conducao')
      .select('*, motoristas(nome, email)')
      .eq('empresa_id', empresa.id).is('fim', null)
      .order('inicio'),
    db.from('registos_conducao')
      .select('motorista_id, duracao_segundos')
      .eq('empresa_id', empresa.id).eq('tipo','conducao')
      .gte('inicio', hojeISO+'T00:00:00Z').lte('inicio', hojeISO+'T23:59:59Z')
      .not('fim','is',null)
  ]);
  conducaoSessoesLive = ativasRes.data || [];
  conducaoTotaisHoje = {};
  (hojeRes.data || []).forEach(r => {
    conducaoTotaisHoje[r.motorista_id] = (conducaoTotaisHoje[r.motorista_id] || 0) + (r.duracao_segundos||0);
  });
}

function corSemaforo(seg) {
  if (seg >= 36000) return 'var(--red)';        // 10h
  if (seg >= 34200) return 'var(--orange)';     // 9h30
  if (seg >= 28800) return '#c8a020';           // 8h
  return 'var(--green)';
}
function fmtHMSAdmin(seg) {
  if (!seg || seg<0) seg = 0;
  const h = Math.floor(seg/3600), m = Math.floor((seg%3600)/60);
  return `${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}`;
}

function renderConducaoLiveBlock() {
  const ativos = conducaoSessoesLive.length;
  const totalConducao = conducaoSessoesLive.reduce((s,r) => {
    const ja = conducaoTotaisHoje[r.motorista_id] || 0;
    const sessao = r.tipo === 'conducao' ? Math.floor((Date.now()-new Date(r.inicio).getTime())/1000) : 0;
    return s + ja + sessao;
  }, 0);

  return `
    <div class="table-wrap" style="margin-bottom:24px">
      <div class="table-header">
        <div>
          <div class="table-title">🚗 Em serviço agora</div>
          <div class="table-sub">${ativos} motorista(s) ativo(s) · soma total hoje: <strong style="color:var(--gold)">${fmtHMSAdmin(totalConducao)}</strong></div>
        </div>
        <span class="badge badge-green" style="font-size:9px"><span class="badge-dot"></span>Atualiza ao vivo</span>
      </div>
      <div id="conducao-live-body" style="padding:0">
        ${ativos === 0 ? '<div style="padding:40px;text-align:center;color:var(--sub2);font-size:13px">Nenhum motorista em serviço.</div>' : conducaoSessoesLive.map(r => renderLinhaConducaoLive(r)).join('')}
      </div>
    </div>
  `;
}

function renderLinhaConducaoLive(r) {
  const ja = conducaoTotaisHoje[r.motorista_id] || 0;
  const sessao = r.tipo === 'conducao' ? Math.floor((Date.now()-new Date(r.inicio).getTime())/1000) : 0;
  const total = ja + sessao;
  const cor = corSemaforo(total);
  const sessaoActual = Math.floor((Date.now()-new Date(r.inicio).getTime())/1000);
  return `
    <div data-cond-row="${r.id}" style="display:grid;grid-template-columns:1fr 160px 100px 110px;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line)">
      <div>
        <div style="font-size:13px;color:var(--paper);font-weight:500">${r.motoristas?.nome || '—'}</div>
        <div style="font-size:11px;color:var(--sub2);font-family:var(--mono);margin-top:2px">desde ${new Date(r.inicio).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      ${badgeTipo(r.tipo)}
      <div data-cond-sessao="${r.id}" style="font-family:var(--mono);font-size:14px;color:var(--paper);text-align:right">${fmtHMSAdmin(sessaoActual)}</div>
      <div data-cond-total="${r.motorista_id}" style="font-family:var(--mono);font-size:14px;font-weight:600;color:${cor};text-align:right">${fmtHMSAdmin(total)}/10h00</div>
    </div>
  `;
}

function tickConducaoLive() {
  conducaoSessoesLive.forEach(r => {
    const sessao = r.tipo === 'conducao' ? Math.floor((Date.now()-new Date(r.inicio).getTime())/1000) : 0;
    const elS = document.querySelector(`[data-cond-sessao="${r.id}"]`);
    if (elS) elS.textContent = fmtHMSAdmin(sessao);
    if (r.tipo === 'conducao') {
      const total = (conducaoTotaisHoje[r.motorista_id]||0) + sessao;
      const elT = document.querySelector(`[data-cond-total="${r.motorista_id}"]`);
      if (elT) {
        elT.textContent = `${fmtHMSAdmin(total)}/10h00`;
        elT.style.color = corSemaforo(total);
      }
    }
  });
}

function iniciarLiveTickAdmin() {
  pararLiveTickAdmin();
  if (conducaoSessoesLive.length === 0) return;
  conducaoLiveInterval = setInterval(tickConducaoLive, 30000);  // 30s — economiza recursos
}
function pararLiveTickAdmin() {
  if (conducaoLiveInterval) { clearInterval(conducaoLiveInterval); conducaoLiveInterval = null; }
}

  toast('✅ Marcado como pago!');
  await carregarDados();
  renderTabelaPagamentos();
}

async function marcarTodosPagos() {
  const semPags = pagamentos.filter(p => p.semana_inicio === semanaAtual && p.estado !== 'pago');
  if (!semPags.length) { toast('Todos já estão pagos!'); return; }
  if (!confirm(`Marcar ${semPags.length} motoristas como pagos?`)) return;
  const ids = semPags.map(p=>p.id);
  const { error } = await db.from('pagamentos').update({estado:'pago',data_pagamento:new Date().toISOString()}).in('id',ids);

  toast(`✅ ${semPags.length} pagamentos marcados!`);

  renderTabelaPagamentos();
}

async function guardarPagamento(id) {
  const uberBruto = parseFloat(document.getElementById('e-uber-bruto').value)||0;
  const ivaPct = parseFloat(document.getElementById('e-iva-pct').value)||23;
  const boltLiq = parseFloat(document.getElementById('e-bolt-liq').value)||0;
  const boltIva = parseFloat(document.getElementById('e-bolt-iva').value)||0;
  const slot = parseFloat(document.getElementById('e-slot').value)||0;
  const aluguer = parseFloat(document.getElementById('e-aluguer').value)||0;
  const prio = parseFloat(document.getElementById('e-prio').value)||0;
  const vv = parseFloat(document.getElementById('e-vv').value)||0;

  const uberIva = uberBruto * (ivaPct/100);
  const uberLiq = uberBruto - uberIva;
  const ivaCobrar = uberIva + boltIva;
  const rendLiq = uberLiq + boltLiq + ivaCobrar;
  const totalDesp = slot + aluguer + prio + vv;
  const valorFinal = rendLiq - slot - aluguer - prio - vv;

  const { error } = await db.from('pagamentos').update({
    uber_bruto:uberBruto, uber_iva_pct:ivaPct, uber_iva_valor:uberIva, uber_liquido:uberLiq,
    bolt_liquido:boltLiq, bolt_iva:boltIva,
    iva_cobrar:ivaCobrar, rendimento_liquido:rendLiq,
    slot_valor:slot, aluguer_valor:aluguer, prio_valor:prio, viaverde_valor:vv,
    total_despesas:totalDesp, valor_final:valorFinal
  }).eq('id', id);

  if (error) { toast('Erro ao guardar', 'error'); return; }
  toast('✅ Pagamento atualizado!');
  closeModal();
  await carregarDados();
  renderTabelaPagamentos();
}

let csvDados = [];

function parseCSV(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v=>v.trim().replace(/"/g,''));
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i]||'');
    return obj;
  });
}

function findMotorista(nome) {
  if (!nome) return null;
  const n = nome.toLowerCase().trim();
  return motoristas.find(m => m.nome.toLowerCase().includes(n) || n.includes(m.nome.toLowerCase().split(' ')[0].toLowerCase()));
}

let uberData = [], boltData = [];

function processUber(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    // Agrupar por motorista
    const grouped = {};
    rows.forEach(r => {
      const nome = r['driver name'] || r['nome'] || r['motorista'] || '';
      if (!nome) return;
      if (!grouped[nome]) grouped[nome] = {nome, bruto:0};
      grouped[nome].bruto += parseFloat(r['fare amount'] || r['valor'] || r['amount'] || 0);
    });
    uberData = Object.values(grouped);
    document.getElementById('uber-preview').innerHTML = `
      <p style="color:var(--green);font-size:12px;margin-top:12px">✅ ${uberData.length} motoristas encontrados</p>
    `;
    mostrarPreviewCSV();
  };
  reader.readAsText(file);
}

function processBolt(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    const grouped = {};
    rows.forEach(r => {
      const nome = r['driver name'] || r['nome'] || r['motorista'] || r['driver'] || '';
      if (!nome) return;
      if (!grouped[nome]) grouped[nome] = {nome, liquido:0, iva:0, taxa:0};
      grouped[nome].liquido += parseFloat(r['earnings'] || r['liquido'] || r['net'] || 0);
      grouped[nome].iva += parseFloat(r['vat'] || r['iva'] || 0);
      grouped[nome].taxa += parseFloat(r['commission'] || r['taxa'] || 0);
    });
    boltData = Object.values(grouped);
    document.getElementById('bolt-preview').innerHTML = `
      <p style="color:var(--green);font-size:12px;margin-top:12px">✅ ${boltData.length} motoristas encontrados</p>
    `;
    mostrarPreviewCSV();
  };
  reader.readAsText(file);
}

function mostrarPreviewCSV() {
  if (!uberData.length && !boltData.length) return;

  const todos = [...new Set([...uberData.map(u=>u.nome), ...boltData.map(b=>b.nome)])];
  const ivaPct = empresa?.iva_uber_pct || 23;

  csvDados = todos.map(nome => {
    const u = uberData.find(x=>x.nome===nome) || {bruto:0};
    const b = boltData.find(x=>x.nome===nome) || {liquido:0, iva:0, taxa:0};
    const mot = findMotorista(nome);
    const uberIva = u.bruto * (ivaPct/100);
    const uberLiq = u.bruto - uberIva;
    const ivaCobrar = uberIva + (b.iva||0);
    const slot = mot?.slot_semanal || 0;
    const aluguer = mot?.aluguer_semanal || 0;
    const valorFinal = uberLiq + b.liquido + ivaCobrar - slot - aluguer;
    return { nome, motorista: mot, uber_bruto:u.bruto, uber_iva_pct:ivaPct, uber_iva_valor:uberIva, uber_liquido:uberLiq, bolt_liquido:b.liquido, bolt_iva:b.iva||0, bolt_taxa:b.taxa||0, iva_cobrar:ivaCobrar, slot_valor:slot, aluguer_valor:aluguer, prio_valor:0, viaverde_valor:0, total_despesas:slot+aluguer, rendimento_liquido:uberLiq+b.liquido+ivaCobrar, valor_final:valorFinal };
  });

  document.getElementById('csv-preview-sub').textContent = `${csvDados.length} motoristas · semana ${semanaLabel(semanaAtual)}`;

async function confirmarCSV() {
  const eid = empresa?.id;
  const domingo = getDomingo(semanaAtual);
  let ok = 0, erros = 0;

  for (const d of csvDados) {
    if (!d.motorista) { erros++; continue; }
    const payload = {
      empresa_id: eid, motorista_id: d.motorista.id,
      semana_inicio: semanaAtual, semana_fim: domingo,
      origem: 'csv',
      uber_bruto:d.uber_bruto, uber_iva_pct:d.uber_iva_pct, uber_iva_valor:d.uber_iva_valor, uber_liquido:d.uber_liquido,
      bolt_liquido:d.bolt_liquido, bolt_iva:d.bolt_iva, bolt_taxa:d.bolt_taxa,
      iva_cobrar:d.iva_cobrar, rendimento_liquido:d.rendimento_liquido,
      slot_valor:d.slot_valor, aluguer_valor:d.aluguer_valor,
      prio_valor:0, viaverde_valor:0,
      total_despesas:d.total_despesas, valor_final:d.valor_final, estado:'pendente'
    };
    const { error } = await db.from('pagamentos').upsert(payload, {onConflict:'empresa_id,motorista_id,semana_inicio'});
    if (error) erros++; else ok++;
  }

  toast(`✅ ${ok} pagamentos guardados${erros>0?` · ${erros} erros`:''}`);
  uberData = []; boltData = []; csvDados = [];
  await carregarDados();
  showPage('pagamentos');
}

async function aplicarPrioViaVerde() {
  const semPags = pagamentos.filter(p=>p.semana_inicio===semanaAtual);
  if (!semPags.length) { toast('Sem pagamentos para esta semana','error'); return; }

  // Buscar PRIO e ViaVerde desta semana
  const [prioRes, vvRes] = await Promise.all([
    db.from('prio_carregamentos').select('*').eq('empresa_id',empresa.id).eq('semana_inicio',semanaAtual),
    db.from('viaverde_portagens').select('*').eq('empresa_id',empresa.id).eq('semana_inicio',semanaAtual)
  ]);

  const prioData = prioRes.data || [];
  const vvData = vvRes.data || [];

  let atualizados = 0;
  for (const p of semPags) {
    const prio = prioData.filter(x=>x.motorista_id===p.motorista_id).reduce((s,x)=>s+(x.valor||0),0);
    const vv = vvData.filter(x=>x.motorista_id===p.motorista_id).reduce((s,x)=>s+(x.valor||0),0);
    if (prio === p.prio_valor && vv === p.viaverde_valor) continue;
    const totalDesp = (p.slot_valor||0) + (p.aluguer_valor||0) + prio + vv;
    const valorFinal = (p.rendimento_liquido||0) - (p.slot_valor||0) - (p.aluguer_valor||0) - prio - vv;
    await db.from('pagamentos').update({prio_valor:prio, viaverde_valor:vv, total_despesas:totalDesp, valor_final:valorFinal}).eq('id',p.id);
    atualizados++;
  }

  toast(`⚡ ${atualizados} pagamentos atualizados com PRIO + Via Verde`);
  await carregarDados();
  renderTabelaPagamentos();
}

function renderLinhaMotorista(m) {
  const hoje = new Date().toISOString().split('T')[0];
  const em30 = new Date(Date.now()+30*24*60*60*1000).toISOString().split('T')[0];
  const docs = [m.licenca_tvde_validade, m.carta_conducao_validade, m.cartao_cidadao_validade, m.registo_criminal_validade];
  const exp = docs.filter(d=>d&&d<hoje).length;
  const aviso = docs.filter(d=>d&&d>=hoje&&d<=em30).length;
  const estadoDoc = exp>0 ? `<span class="badge badge-red"><span class="badge-dot"></span>${exp} expirados</span>` :
    aviso>0 ? `<span class="badge badge-orange"><span class="badge-dot"></span>${aviso} a expirar</span>` :
    `<span class="badge badge-green"><span class="badge-dot"></span>OK</span>`;

  return `
    <tr>
      <td>${m.nome}</td>
      <td style="color:var(--sub2)">${m.email||'—'}</td>
      <td style="color:var(--sub2)">${m.telefone||'—'}</td>
      <td style="color:var(--sub2);font-family:var(--mono);font-size:11px">${m.nif||'—'}</td>
      <td class="gold">${fmt(m.slot_semanal)}</td>
      <td>${estadoDoc}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="modalMotorista('${m.id}')">✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="convidarMotorista('${m.id}')">📧 Convidar</button>
        </div>
      </td>
    </tr>
  `;
}

async function carregarContratosMotoristaModal(motoristaId) {

    .eq('motorista_id', motoristaId)
    .order('criado_em', { ascending: false });

  const wrap = document.getElementById('motorista-contratos-list');
  if (!wrap) return;

  if (!data || !data.length) {
    wrap.innerHTML = `<div style="padding:8px">Sem contratos arquivados ainda.</div>`;

  }

  wrap.style.padding = '0';
  wrap.style.background = 'transparent';
  wrap.style.border = 'none';

    const estado = c.estado === 'assinado' ? '✓ Assinado' : c.estado === 'enviado_assinatura' ? '⏳ Enviado' : c.estado;

    return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:4px;margin-bottom:6px">

async function downloadAssinadoModal(path, nome) {
  const { data, error } = await db.storage.from('contratos-assinados').download(path);

  const url = URL.createObjectURL(data);

  a.href = url; a.download = (nome || 'contrato') + '.pdf'; a.click();

  // URL absoluta correta (funciona em subpastas tipo /fleetpay/)

  toast(`✅ Convite enviado para ${m.email}`);

// Upload simples PRIO (formato fixo conhecido)
async function processarUploadPRIO(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const text = e.target.result;
    const sep = (text.split('\n')[0]||'').includes(';') ? ';' : ',';
    const linhas = text.split(/\r?\n/).filter(l => l.trim());
    if (linhas.length < 2) { toast('Ficheiro vazio ou sem dados','error'); return; }

    // Parser PRIO: header com nomes em PT
    const header = linhas[0].split(sep).map(c => c.trim().replace(/^"|"$/g,'').toLowerCase());
    const idxMatricula = header.findIndex(c => c.includes('matr') || c.includes('plate'));
    const idxData = header.findIndex(c => c.includes('data') || c.includes('date'));
    const idxValor = header.findIndex(c => c.includes('total') || c.includes('valor') || c.includes('montante'));
    const idxLitros = header.findIndex(c => c.includes('litro') || c.includes('quant'));

    if (idxMatricula < 0 || idxData < 0 || idxValor < 0) {
      toast('CSV não tem colunas Matrícula/Data/Valor — verifica formato PRIO','error');
      return;
    }

    const carregamentos = [];
    linhas.slice(1).forEach(linha => {
      const cols = linha.split(sep).map(c => c.trim().replace(/^"|"$/g,''));
      const matricula = (cols[idxMatricula]||'').replace(/[\s-]/g,'').toUpperCase();
      const dataRaw = cols[idxData]||'';
      const valor = parseFloat((cols[idxValor]||'').replace(',','.').replace(/[^\d.-]/g,''));
      if (!matricula || !valor || valor <= 0) return;

      // Data PT: DD/MM/YYYY
      let data = '';
      const partes = dataRaw.split(/[\/\- ]/);
      if (partes.length >= 3) {
        if (partes[0].length === 4) data = `${partes[0]}-${partes[1].padStart(2,'0')}-${partes[2].substring(0,2).padStart(2,'0')}`;
        else data = `${partes[2].substring(0,4)}-${partes[1].padStart(2,'0')}-${partes[0].padStart(2,'0')}`;
      }
      if (!data) data = new Date().toISOString().split('T')[0];

      const veiculo = veiculos.find(v => v.matricula.replace(/[\s-]/g,'').toUpperCase() === matricula);
      const litros = idxLitros >= 0 ? parseFloat((cols[idxLitros]||'').replace(',','.')) || null : null;

      carregamentos.push({
        empresa_id: empresa.id,
        motorista_id: veiculo?.motorista_id || null,
        matricula, data, valor,
        litros, semana_inicio: semanaAtual,
        fornecedor: 'prio'
      });
    });

    if (!carregamentos.length) { toast('Nenhum carregamento válido encontrado','error'); return; }

    const { error } = await db.from('prio_carregamentos').insert(carregamentos);
    if (error) { toast('Erro: '+error.message,'error'); console.error(error); return; }
    toast(`✅ ${carregamentos.length} carregamentos PRIO importados`);
    await carregarResumoCombustivel();
  };
  reader.readAsText(file, 'utf-8');
}

async function carregarResumoCombustivel() {
  const { data } = await db.from('prio_carregamentos').select('*, motoristas(nome)').eq('empresa_id',empresa.id).eq('semana_inicio',semanaAtual).order('data');
  cargasSemanaAtual = data || [];
  const wrap = document.getElementById('comb-resumo-wrap');
  if (!wrap) return;
  if (!cargasSemanaAtual.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⛽</div><div class="empty-state-text">Sem carregamentos esta semana</div></div>';
    return;
  }
  // Agrupar por motorista E por fornecedor
  const byMot = {};
  cargasSemanaAtual.forEach(r => {
    const n = r.motoristas?.nome||r.matricula;
    if(!byMot[n]) byMot[n]={nome:n,fornecedores:{},total:0,count:0};
    byMot[n].total+=Number(r.valor)||0;
    byMot[n].count++;
    const f = r.fornecedor||'prio';
    byMot[n].fornecedores[f] = (byMot[n].fornecedores[f]||0) + (Number(r.valor)||0);
  });
  const totalGeral = cargasSemanaAtual.reduce((s,r) => s+(Number(r.valor)||0), 0);
  wrap.innerHTML = `
    <div class="table-header">
      <div>
        <div class="table-title">Resumo — ${semanaLabel(semanaAtual)}</div>
        <div class="table-sub">${cargasSemanaAtual.length} carregamentos · <strong style="color:var(--gold)">${fmt(totalGeral)}</strong> total</div>
      </div>
    </div>
    <div style="padding:16px">
      ${Object.values(byMot).map(x => {
        const tags = Object.entries(x.fornecedores).map(([f,v]) => {
          const p = FORNECEDORES_PRESET[f] || { nome:f, icon:'💳' };
          return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:100px;font-size:10px;font-family:var(--mono);margin-right:4px">${p.icon} ${p.nome} ${fmt(v)}</span>`;
        }).join('');
        return `<div class="matricula-card">
          <div style="flex:1">
            <div class="matricula-label">${x.nome}</div>
            <div class="matricula-motorista">${x.count} carregamentos · ${tags}</div>
          </div>
          <div class="matricula-valor">${fmt(x.total)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

let _resolverMappingActual = null;
let _filaCsvCombustivel = [];      // ficheiros pendentes (multi-upload)
let _resumoMultiUpload = { ok:0, cancelados:0, erros:0, total:0 };

async function processarMultiplosCSVCombustivel(files) {
  if (!files || !files.length) return;
  _filaCsvCombustivel = Array.from(files);
  _resumoMultiUpload = { ok:0, cancelados:0, erros:0, total:_filaCsvCombustivel.length };
  if (_filaCsvCombustivel.length > 1) toast(`⏳ A processar ${_filaCsvCombustivel.length} ficheiros...`);
  await processarProximoCSV();
}

async function processarProximoCSV() {
  if (!_filaCsvCombustivel.length) {
    // Fim da fila
    if (_resumoMultiUpload.total > 1) {
      toast(`✅ Concluído · ${_resumoMultiUpload.ok} importados, ${_resumoMultiUpload.cancelados} cancelados, ${_resumoMultiUpload.erros} erros`);
    }
    await carregarMappingsCSV();
    await carregarResumoCombustivel();
    return;
  }
  const file = _filaCsvCombustivel.shift();
  try {
    const result = await processarUploadCombustivel(file);
    if (result?.ok) _resumoMultiUpload.ok++;
    else if (result?.cancelado) _resumoMultiUpload.cancelados++;
    else _resumoMultiUpload.erros++;
  } catch (e) {
    console.error('CSV erro:', e);
    _resumoMultiUpload.erros++;
  }
  // Próximo
  setTimeout(processarProximoCSV, 100);
}

async function processarUploadCombustivel(file) {
  return new Promise((resolve) => {
    if (!file) { resolve({ erro:true }); return; }
    const reader = new FileReader();
    reader.onload = async e => {
      const text = e.target.result;
      const firstLine = (text.split('\n')[0] || '');
      const sep = firstLine.includes(';') ? ';' : ',';
      const linhas = text.split(/\r?\n/).filter(l => l.trim());
      if (!linhas.length) { toast(`Ficheiro vazio: ${file.name}`,'error'); resolve({ erro:true }); return; }

      const header = linhas[0];
      const colunas = header.split(sep).map(c => c.trim().replace(/^"|"$/g,''));
      const dados = linhas.slice(1, 6).map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g,'')));

      // Tentar match com mapping existente
      const mappingExistente = csvMappings.find(m =>
        m.exemplo_header && m.exemplo_header.replace(/\s/g,'') === header.replace(/\s/g,'')
      );

      if (mappingExistente) {
        toast(`✅ ${file.name}: detectado ${mappingExistente.nome}`);
        await aplicarMappingCsv(text, mappingExistente, sep);
        resolve({ ok:true });
      } else {
        // Pedir mapping (modal)
        _resolverMappingActual = resolve;
        mostrarMappingManual(text, header, colunas, dados, sep, file.name);
      }
    };
    reader.onerror = () => { toast(`Erro a ler ${file.name}`,'error'); resolve({ erro:true }); };
    reader.readAsText(file, 'utf-8');
  });
}

async function confirmarMappingCsv() {
  const fornecedor_slug = document.getElementById('map-fornecedor').value;
  const nome = document.getElementById('map-nome').value.trim() || FORNECEDORES_PRESET[fornecedor_slug]?.nome || 'Custom';
  const colMatricula = document.getElementById('map-col-matricula').value;
  const colData = document.getElementById('map-col-data').value;
  const colValor = document.getElementById('map-col-valor').value;
  const colLitros = document.getElementById('map-col-litros').value;
  const colEstacao = document.getElementById('map-col-estacao').value;
  const colCombustivel = document.getElementById('map-col-combustivel').value;
  const fmtData = document.getElementById('map-data-fmt').value;

  if (colMatricula==='' || colData==='' || colValor==='') {
    toast('Matrícula, data e valor são obrigatórios','error'); return;
  }

  const mapping = {
    matricula: parseInt(colMatricula),
    data: parseInt(colData),
    valor: parseInt(colValor),
    litros: colLitros !== '' ? parseInt(colLitros) : null,
    estacao: colEstacao !== '' ? parseInt(colEstacao) : null,
    combustivel: colCombustivel !== '' ? parseInt(colCombustivel) : null
  };

  // Memorizar
  const { data: novoMapping, error: mErr } = await db.from('csv_mapeamentos').upsert({
    empresa_id: empresa.id,
    nome, fornecedor_slug, tipo: 'combustivel',
    mapping, separador: window._csvSepTemporario,
    formato_data: fmtData,
    exemplo_header: window._csvHeaderTemporario, ativo: true
  }, { onConflict: 'empresa_id,nome' }).select().single();

  if (mErr) { toast('Erro a memorizar mapping: '+mErr.message,'error'); return; }

  closeModal();
  await aplicarMappingCsv(window._csvTextoTemporario, novoMapping, window._csvSepTemporario);
  await carregarMappingsCSV();
  // Resolver Promise da fila multi-upload
  if (_resolverMappingActual) { _resolverMappingActual({ ok:true }); _resolverMappingActual = null; }
}

function cancelarMappingCsv() {
  closeModal();

}

async function aplicarMappingCsv(texto, mapping, sep) {
  const linhas = texto.split(/\r?\n/).filter(l => l.trim());
  const dados = linhas.slice(1).map(l => l.split(sep).map(c => c.trim().replace(/^"|"$/g,'')));

  const carregamentos = [];
  const fmtData = mapping.formato_data || 'DD/MM/YYYY';
  const m = mapping.mapping || mapping;  // pode vir do db (.mapping) ou direto

  dados.forEach(linha => {
    const matricula = (linha[m.matricula]||'').replace(/[\s-]/g,'').toUpperCase();
    const dataRaw = linha[m.data]||'';
    const valor = parseFloat((linha[m.valor]||'').replace(',','.').replace(/[^\d.-]/g,''));
    if (!matricula || !valor || valor <= 0) return;

    // Parse data
    let data = '';
    try {
      if (fmtData === 'DD/MM/YYYY' || fmtData === 'DD-MM-YYYY') {
        const partes = dataRaw.split(/[\/\- ]/);
        if (partes.length >= 3) data = `${partes[2].substring(0,4)}-${partes[1].padStart(2,'0')}-${partes[0].padStart(2,'0')}`;
      } else if (fmtData === 'YYYY-MM-DD') {
        data = dataRaw.substring(0,10);
      } else if (fmtData === 'MM/DD/YYYY') {
        const partes = dataRaw.split(/[\/\- ]/);
        if (partes.length >= 3) data = `${partes[2].substring(0,4)}-${partes[0].padStart(2,'0')}-${partes[1].padStart(2,'0')}`;
      }
    } catch(e) {}
    if (!data) data = new Date().toISOString().split('T')[0];

    const veiculo = veiculos.find(v => v.matricula.replace(/[\s-]/g,'').toUpperCase() === matricula);
    carregamentos.push({
      empresa_id: empresa.id,
      motorista_id: veiculo?.motorista_id || null,
      matricula,
      data,
      valor,
      semana_inicio: semanaAtual,
      fornecedor: mapping.fornecedor_slug || 'outro',
      litros: m.litros !== null && m.litros !== undefined ? parseFloat((linha[m.litros]||'').replace(',','.')) || null : null,
      estacao: m.estacao !== null && m.estacao !== undefined ? linha[m.estacao] || null : null,
      combustivel: m.combustivel !== null && m.combustivel !== undefined ? linha[m.combustivel] || null : null
    });
  });

async function carregarResumoVV() {
  const { data } = await db.from('viaverde_portagens').select('*, motoristas(nome)').eq('empresa_id',empresa.id).eq('semana_inicio',semanaAtual).order('data');
  const wrap = document.getElementById('vv-resumo-wrap');
  if (!wrap) return;
  if (!data?.length) { wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛣️</div><div class="empty-state-text">Sem portagens esta semana</div></div>'; return; }
  const byMot = {};
  data.forEach(r => { const n = r.motoristas?.nome||r.matricula; if(!byMot[n]) byMot[n]={nome:n,total:0,count:0}; byMot[n].total+=r.valor; byMot[n].count++; });
  wrap.innerHTML = `<div class="table-header"><div class="table-title">Resumo Via Verde — ${semanaLabel(semanaAtual)}</div></div><div style="padding:16px">${Object.values(byMot).map(x=>`<div class="matricula-card"><div><div class="matricula-label">${x.nome}</div><div class="matricula-motorista">${x.count} portagens</div></div><div class="matricula-valor">${fmt(x.total)}</div></div>`).join('')}</div>`;
}

function processViaVerde(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const rows = parseCSV(e.target.result);
    const portagens = [];
    rows.forEach(r => {
      const matricula = r['matrícula'] || r['matricula'] || r['plate'] || r['viatura'] || '';
      const valor = parseFloat((r['valor'] || r['amount'] || r['montante'] || '0').replace(',','.'));
      const data = r['data'] || r['date'] || '';
      if (!matricula || !valor) return;
      const veiculo = veiculos.find(v=>v.matricula.replace('-','').toUpperCase()===matricula.replace('-','').toUpperCase());
      portagens.push({ empresa_id:empresa.id, motorista_id:veiculo?.motorista_id||null, matricula, data:data||new Date().toISOString().split('T')[0], valor, descricao:r['descricao']||r['local']||'', semana_inicio:semanaAtual });
    });
    if (!portagens.length) { toast('Nenhuma portagem encontrada','error'); return; }
    const { error } = await db.from('viaverde_portagens').insert(portagens);
    if (error) { toast('Erro ao guardar Via Verde','error'); return; }
    toast(`🛣️ ${portagens.length} portagens importadas!`);
    carregarResumoVV();
  };
  reader.readAsText(file, 'latin1');
}

async function guardarContratoAssinado() {
  const motId = document.getElementById('ass-motorista').value;
  const tplId = document.getElementById('ass-template').value;
  const file = document.getElementById('ass-pdf').files[0];
  const dataAss = document.getElementById('ass-data').value;

  if (!motId || !tplId || !file) { toast('Preenche motorista, template e ficheiro','error'); return; }
  if (!file.name.match(/\.pdf$/i)) { toast('Só PDF aceite','error'); return; }

  const tpl = contratosTemplates.find(t => t.id === tplId);
  toast('A carregar PDF...');

  try {
    // 1. Insert registo para obter ID
    const { data: rec, error: insErr } = await db.from('contratos_assinados').insert({
      empresa_id: empresa.id,
      motorista_id: motId,
      template_id: tplId,
      template_nome: tpl?.nome,
      estado: 'assinado',
      assinado_em: dataAss + 'T00:00:00Z',
      ficheiro_path: 'pending'
    }).select().single();
    if (insErr) throw insErr;

    // 2. Upload ao Storage
    const path = `${empresa.id}/${rec.id}.pdf`;
    const { error: upErr } = await db.storage.from('contratos-assinados').upload(path, file, {
      contentType: 'application/pdf',
      upsert: true
    });
    if (upErr) {
      await db.from('contratos_assinados').delete().eq('id', rec.id);
      throw upErr;
    }

    // 3. Update path
    await db.from('contratos_assinados').update({ ficheiro_path: path }).eq('id', rec.id);

    closeModal();
    toast('✅ Contrato arquivado!');
    await carregarContratosAssinados();
    renderContratosTab();
  } catch (e) {
    console.error('Carregar assinado:', e);
    toast('Erro: ' + (e.message || 'desconhecido'),'error');
  }
}

async function downloadAssinado(id) {
  const c = contratosAssinados.find(x => x.id === id);
  if (!c?.ficheiro_path) { toast('Sem ficheiro','error'); return; }
  const { data, error } = await db.storage.from('contratos-assinados').download(c.ficheiro_path);
  if (error) { toast('Erro: ' + error.message,'error'); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${c.template_nome||'contrato'}_${(c.motoristas?.nome||'motorista').split(' ')[0]}.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}

  const { error } = await db.from('contratos_assinados').delete().eq('id', id);

}

function atualizarFormPlaceholders() {
  const tplId = document.getElementById('cont-template').value;
  const motId = document.getElementById('cont-motorista').value;
  const wrap = document.getElementById('cont-placeholders-wrap');
  if (!tplId || !motId) { wrap.style.display = 'none'; return; }

  const tpl = contratosTemplates.find(t => t.id === tplId);
  const mot = motoristas.find(m => m.id === motId);
  if (!tpl || !mot) return;

  // Buscar veículo do motorista (assume primeiro veículo ativo)
  const veiculo = veiculos.find(v => v.motorista_id === mot.id && v.estado !== 'inativo') || {};

  // Mapear placeholders → valores conhecidos
  const hoje = new Date().toLocaleDateString('pt-PT');
  const auto = {
    'MOTORISTA_NOME': mot.nome || '',
    'MOTORISTA_NIF': mot.nif || '',
    'MOTORISTA_MORADA': mot.morada || '',
    'MOTORISTA_EMAIL': mot.email || '',
    'MOTORISTA_DOC_ID': mot.doc_id || '',
    'MOTORISTA_DOC_VALIDADE': mot.doc_validade ? new Date(mot.doc_validade+'T00:00:00').toLocaleDateString('pt-PT') : '',
    'MOTORISTA_LICENCA_TVDE': mot.licenca_tvde || '',
    'MOTORISTA_IBAN': mot.iban || '',

async function enviarParaAssinatura() {
  const tplId = document.getElementById('cont-template').value;

  const tpl = contratosTemplates.find(t => t.id === tplId);
  const mot = motoristas.find(m => m.id === motId);
  if (!tpl || !mot) { toast('Selecionar motorista e template','error'); return; }

  // Recolher valores do form

    valores[inp.dataset.ph] = inp.value;

  toast('A criar link de assinatura...');
  try {
    // Gerar token UUID v4
    const token = (crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {

async function downloadContrato() {
  const tplId = document.getElementById('cont-template').value;
  const motId = document.getElementById('cont-motorista').value;
  const tpl = contratosTemplates.find(t => t.id === tplId);
  const mot = motoristas.find(m => m.id === motId);
  if (!tpl || !mot) { toast('Selecionar motorista e template','error'); return; }

  // Recolher valores do form
  const valores = {};
  document.querySelectorAll('#cont-form-fields input[data-ph]').forEach(inp => {
    valores[inp.dataset.ph] = inp.value;
  });

  toast('A gerar contrato...','success');

  try {
    // 1. Download template do Storage
    const { data: file, error: dlErr } = await db.storage.from('contratos-templates').download(tpl.ficheiro_path);
    if (dlErr) throw dlErr;

    // 2. Abrir como ZIP
    const zip = await JSZip.loadAsync(await file.arrayBuffer());
    const xmlEntry = zip.file('word/document.xml');
    if (!xmlEntry) throw new Error('Template inválido — sem document.xml');
    let xml = await xmlEntry.async('string');

    // 3. Substituir cada placeholder («KEY» e variantes XML escapadas)
    Object.keys(valores).forEach(key => {
      const val = String(valores[key]||'')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const variants = [
        '«' + key + '»',
        '&#xAB;' + key + '&#xBB;',
        '\u00AB' + key + '\u00BB'
      ];
      variants.forEach(v => { xml = xml.split(v).join(val); });
    });

    // 4. Re-zip + download
    zip.file('word/document.xml', xml);
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fname = `${tpl.nome.replace(/[^a-zA-Z0-9_-]/g,'_')}_${mot.nome.split(' ')[0]}.docx`;
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
    toast('✅ Contrato descarregado: ' + fname);
  } catch (e) {
    console.error('Gerar contrato:', e);
    toast('Erro: ' + (e.message || 'desconhecido'),'error');
  }
}

async function processarUploadTemplate(file) {
  if (!file) return;
  if (!file.name.endsWith('.docx')) { toast('Só ficheiros .docx','error'); return; }

  const nome = prompt('Nome do template:', file.name.replace(/\.docx$/i, ''));
  if (!nome) return;
  const tipo = prompt('Tipo (slug curto, ex: slot/comissao/comodato/declaracao/custom):', 'custom');
  if (!tipo) return;

  toast('A processar template...');

  try {
    // 1. Detectar placeholders no .docx (parse XML)
    const buf = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);
    const xmlEntry = zip.file('word/document.xml');
    if (!xmlEntry) throw new Error('Ficheiro .docx inválido');
    const xml = await xmlEntry.async('string');
    const matches = [...xml.matchAll(/«([A-Z_]+)»/g)];
    const placeholders = [...new Set(matches.map(m => '«'+m[1]+'»'))];

    // 2. Inserir registo na BD para obter ID
    const { data: tpl, error: insErr } = await db.from('contratos_templates').insert({
      empresa_id: empresa.id,
      tipo: tipo,
      nome: nome,
      placeholders: placeholders,
      ficheiro_path: 'pending'  // atualizamos depois
    }).select().single();
    if (insErr) throw insErr;

    // 3. Upload .docx ao Storage com path correto
    const path = `${empresa.id}/${tpl.id}.docx`;
    const { error: upErr } = await db.storage.from('contratos-templates').upload(path, file, {
      contentType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      upsert: true
    });
    if (upErr) {
      // rollback do registo
      await db.from('contratos_templates').delete().eq('id', tpl.id);
      throw upErr;
    }

    // 4. Atualizar path no registo
    await db.from('contratos_templates').update({ ficheiro_path: path }).eq('id', tpl.id);

    toast(`✅ Template "${nome}" carregado com ${placeholders.length} placeholders`);
    await carregarTemplates();
    renderContratosTab();
  } catch (e) {
    console.error('Upload template:', e);
    toast('Erro: ' + (e.message || 'desconhecido'),'error');
  }
}

async function toggleTemplateAtivo(id, novoEstado) {
  const { error } = await db.from('contratos_templates').update({ ativo: novoEstado }).eq('id', id);
  if (error) { toast('Erro a alterar estado','error'); return; }
  toast('✅ Template ' + (novoEstado?'ativado':'desativado'));
  await carregarTemplates();
  renderContratosTab();
}

async function eliminarTemplate(id) {
  const tpl = contratosTemplates.find(t => t.id === id);
  if (!tpl) return;
  if (!confirm(`Eliminar definitivamente o template "${tpl.nome}"? Os contratos já gerados não são afetados.`)) return;

  // Apagar do Storage primeiro
  if (tpl.ficheiro_path && tpl.ficheiro_path !== 'pending') {
    await db.storage.from('contratos-templates').remove([tpl.ficheiro_path]);
  }
  // Apagar registo
  const { error } = await db.from('contratos_templates').delete().eq('id', id);
  if (error) { toast('Erro a eliminar','error'); return; }
  toast('✅ Template eliminado');
  await carregarTemplates();
  renderContratosTab();
}
